<!doctype html>
<!--
  html/scene3d.html — Site & Pattern's built-in 3D design viewer (V1.62).

  Self-contained three.js scene driven entirely by the desktop host through
  three guarded hooks (all registered at module init):

    window.permaSetScene(scene)  — full rebuild from a Scene JSON dict
                                   (src/scene_contract.py, SCENE_VERSION 1;
                                   local metres: +x east, +y north)
    window.permaSetSun(az, alt)  — point the shadow-casting sun
                                   (azimuth deg CW from north, altitude deg)
    window.permaSetPlants(recs)  — legacy per-plant update (lat/lng records
                                   from src/scene3d.py); projected with the
                                   cosLat metric about the last scene origin

  Axis mapping (scene → three.js, Y-up): x_east → +x, y_north → −z,
  height → +y.

  three.js + Spark are vendored under html/vendor/ and served over a
  localhost http:// origin (src/web_assets.py), so the 3D view loads offline
  and is immune to CDN outages and bundled-Chromium module-loading changes.
  The offline/error notice now only appears if WebGL itself is unavailable or
  the bundled assets are missing.

  Plants render as instanced procedural archetypes: trees are Da Vinci
  branching skeletons (R^x = Σ r_i^x) merged into one BufferGeometry per
  archetype — conifers conical/monopodial, deciduous rounded/sympodial —
  with a vertex-colour canopy gradient and a GPU wind sway (the month drives
  seasonal foliage colour, bare branches in winter). Shrubs are bushy merged
  domes; herbs/vines are cones; groundcover flat discs; big plants get a soft
  contact-shadow stamp. Hundreds of plants stay two-digit draw calls.
  presence_opacity is encoded by fading the instance colour toward the sky
  tint (per-instance alpha isn't a thing for InstancedMesh).
-->
<html>
<head>
<meta charset="utf-8">
<title>Site &amp; Pattern 3D</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #cfe3f2; }
  #hud {
    position: absolute; top: 10px; left: 10px; z-index: 5;
    font-family: system-ui, sans-serif; font-size: 13px; color: #1b3a26;
    background: rgba(255,255,255,.82); border-radius: 8px; padding: 7px 12px;
    pointer-events: none; line-height: 1.45;
  }
  #offline {
    position: absolute; inset: 0; display: none; z-index: 10;
    align-items: center; justify-content: center; text-align: center;
    font-family: system-ui, sans-serif; color: #5d4037; background: #efebe9;
  }
</style>
</head>
<body>
<div id="hud">3D view — loading…</div>
<div id="offline"><div id="offline-msg"><b>3D viewer couldn't start</b><br>
The bundled 3D engine failed to load. The 2D map is unaffected.</div></div>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/three.module.js",
    "three/addons/": "./vendor/three/addons/",
    "@sparkjsdev/spark": "./vendor/spark/spark.module.js"
  }
}
</script>

<script>
  // Diagnostic checkpoint ping → the host logs it to ~/permadesign-debug.log,
  // so we can trace how far this page got even when the JS console never
  // reaches Python. Best-effort, never throws.
  window._pinglog = function (m) {
    try { fetch('/__log?m=' + encodeURIComponent(m)); } catch (e) {}
  };
  window._pinglog('page-script-running');
  // Fail loudly, not with a stuck "loading…": if the module graph didn't
  // initialise within 8s (a WebGL failure sets permaBootError; otherwise the
  // vendored three.js module failed to load/parse), say which.
  window.permaFatal = function (msg) {
    document.getElementById('offline-msg').innerHTML = msg;
    document.getElementById('offline').style.display = 'flex';
  };
  setTimeout(function () {
    if (!window.permaSetScene) {
      window._pinglog('TIMEOUT: permaSetScene never registered after 8s');
      window.permaFatal(window.permaBootError ||
        '<b>3D viewer couldn\'t start</b><br>' +
        'The bundled 3D engine failed to load. The 2D map is unaffected.');
    }
  }, 8000);
  // Users can't see the devtools console — surface uncaught errors. Until the
  // viewer has booted (permaSetScene registered), show the REAL error in the
  // full-screen overlay instead of the generic "couldn't start" notice, so a
  // boot failure tells us exactly what broke.
  function _showViewerError(detail) {
    detail = String(detail);
    window._pinglog('error: ' + detail.slice(0, 300));
    console.error('[scene3d] ' + detail);   // → stderr via the host's log page
    var hud = document.getElementById('hud');
    if (hud) hud.innerHTML = '3D viewer error: ' + detail.slice(0, 200);
    if (!window.permaSetScene) {
      window.permaFatal('<b>3D viewer error</b><br>' + detail.slice(0, 400)
        + '<br><br>The 2D map is unaffected.');
    }
  }
  // capture = true so module/resource load failures (which don't bubble) are
  // caught too, not just thrown exceptions.
  window.addEventListener('error', function (e) {
    var d = (e && (e.message || (e.error && e.error.message)))
      || (e && e.target && (e.target.src || e.target.href)
          ? 'failed to load ' + (e.target.src || e.target.href) : 'unknown error');
    _showViewerError(d);
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    var r = e && e.reason;
    _showViewerError((r && (r.message || r.stack)) || r || 'unhandled rejection');
  });
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
// If we got here, the static three.js imports resolved & executed. (If they
// hadn't, NO module code would run and this ping would be absent from the log.)
window._pinglog && window._pinglog('module-eval-start (three OK)');
// Spark — the OPTIONAL photoreal yard-scan backdrop (V1.65). Load it WITHOUT
// blocking module evaluation: a top-level `await` here would stall the entire
// viewer — window.permaSetScene is registered far below, so nothing past this
// point runs until the import settles, and if Spark were slow or hung the whole
// 3D view would silently never start. Fire-and-forget instead; SplatMesh /
// SparkRenderer fill in when ready and the splat code (all guarded, and the
// SparkRenderer is created lazily) simply no-ops until then. The core 3D view
// never waits on Spark.
let SplatMesh = null, SparkRenderer = null;
import('@sparkjsdev/spark')
  .then((m) => { SplatMesh = m.SplatMesh; SparkRenderer = m.SparkRenderer; })
  .catch((err) => console.warn('Spark splat backdrop unavailable:', err));

const SKY = 0xcfe3f2, GROUND = 0x8aa86f;

// ── wind + time ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const windUniforms = { uTime: { value: 0 } };

// ── seeded PRNG (mulberry32) ────────────────────────────────────────────────
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function hashPid(pid) {
  if (pid == null) return 0;
  if (typeof pid === 'number') return Math.abs(pid);
  let h = 0; const s = String(pid);
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ── seasonal color modifier ─────────────────────────────────────────────────
const _skyCol = new THREE.Color(SKY);

function seasonalColor(hex, foliageType, month) {
  const c = new THREE.Color(hex || '#66bb6a');
  const ft = (foliageType || '').toLowerCase();
  if (ft === 'evergreen') {
    if (month >= 11 || month <= 2) c.multiplyScalar(0.85);
    return c;
  }
  if (ft === 'deciduous' || ft === 'semi-evergreen') {
    if (month >= 4 && month <= 5)
      c.lerp(new THREE.Color('#c8e06a'), 0.3);
    else if (month >= 9 && month <= 10)
      c.lerp(new THREE.Color('#d4a030'), 0.55);
    else if (month >= 11 || month <= 3)
      c.set('#8b7355');
    return c;
  }
  if (month >= 11 || month <= 3) c.lerp(new THREE.Color('#a09060'), 0.5);
  return c;
}

let renderer;
try {
  // preserveDrawingBuffer lets the yard-photo bake read the canvas back with
  // toDataURL after an off-axis render (V1.65); negligible cost at this scale.
  renderer = new THREE.WebGLRenderer({ antialias: true,
                                       preserveDrawingBuffer: true });
} catch (e) {
  window.permaBootError = '<b>3D needs WebGL</b><br>This system\'s graphics '
    + 'stack doesn\'t offer WebGL, so the 3D preview can\'t render here. '
    + 'The 2D map is unaffected.';
  window.permaFatal(window.permaBootError);
  throw e;
}
// Cap the pixel ratio so 4K / Retina panels don't render 4× the fragments on
// modest GPUs (the visual gain past ~1.5× is negligible here).
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 400, 1400);

// Spark needs a SparkRenderer in the scene to draw splats with the normal
// THREE.WebGLRenderer (V1.65). Created LAZILY — only once Spark has loaded
// (background import above) AND a splat is actually added — so the core view
// never depends on Spark. Constructed defensively: if it fails, the design
// still renders, only the photoreal backdrop is unavailable.
let sparkRenderer = null;
function ensureSparkRenderer() {
  if (sparkRenderer || !SparkRenderer) return sparkRenderer;
  try {
    sparkRenderer = new SparkRenderer({ renderer });
    scene.add(sparkRenderer);
  } catch (e) {
    sparkRenderer = null;
  }
  return sparkRenderer;
}

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 4000);
camera.position.set(45, 38, 55);

const controls = new OrbitControls(camera, renderer.domElement);
controls.maxPolarAngle = Math.PI / 2 - 0.02;   // never go underground
controls.target.set(0, 0, 0);

scene.add(new THREE.HemisphereLight(0xdfeefc, 0x5d6e51, 0.75));
const sun = new THREE.DirectionalLight(0xfff4d6, 2.1);
sun.castShadow = true;
// 1024 is plenty: the crisp per-plant grounding comes from the cheap contact-
// shadow discs, not this map — halving it lightens the shadow pass for weak GPUs.
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun, sun.target);

// Everything rebuilt per scene push lives under one group.
let designGroup = null;
let lastOrigin = null;      // {lat, lng} for the legacy permaSetPlants hook
let lastMonth = 6;          // last scene month, for the legacy permaSetPlants hook
let lastYear = 0;           // last scene year, for the legacy permaSetPlants hook
let lastTerrain = null;     // last scene terrain, for the legacy permaSetPlants hook
let plantsGroup = null;     // sub-group holding plant instanced meshes
let framedOrigin = null;    // origin the camera was last auto-framed on
let lastBounds = null;      // last scene bounds, for permaResetView()

function sunVector(azDeg, altDeg) {
  // azimuth CW from north; scene: north = -z, east = +x.
  const az = azDeg * Math.PI / 180, alt = altDeg * Math.PI / 180;
  return new THREE.Vector3(
    Math.sin(az) * Math.cos(alt),    // east
    Math.sin(alt),                   // up
    -Math.cos(az) * Math.cos(alt),   // north → -z
  );
}

function setSun(azDeg, altDeg) {
  const v = sunVector(azDeg, altDeg).multiplyScalar(300);
  sun.position.copy(v);
  sun.target.position.set(0, 0, 0);
}
setSun(180, 55);   // sane default until the host pushes the real sun

// Resize the sun's shadow frustum to the scene — always safe to re-run.
function fitShadow(bounds) {
  const w = bounds.max_x - bounds.min_x, d = bounds.max_y - bounds.min_y;
  const r = Math.max(w, d) * 0.75;
  const cam = sun.shadow.camera;
  cam.left = -r; cam.right = r; cam.top = r; cam.bottom = -r;
  cam.near = 1; cam.far = 900;
  cam.updateProjectionMatrix();
}

// Point the camera + orbit target at the design. Only called on the first
// scene or when a different design is opened — never on a slider re-push — so
// the user's own orbit/zoom is preserved across Year/season changes.
function frameCamera(bounds) {
  if (!bounds) return;
  const w = bounds.max_x - bounds.min_x, d = bounds.max_y - bounds.min_y;
  const r = Math.max(w, d) * 0.75;
  const cx = (bounds.min_x + bounds.max_x) / 2;
  const cz = -(bounds.min_y + bounds.max_y) / 2;
  controls.target.set(cx, 0, cz);
  camera.position.set(cx + r * 0.9, r * 0.85, cz + r * 1.1);
  controls.update();
}

function fadeToward(hex, opacity) {
  // presence_opacity < 1 → blend the colour toward the sky tint.
  const c = new THREE.Color(hex || '#66bb6a');
  return c.lerp(new THREE.Color(SKY), 1 - Math.max(0, Math.min(1, opacity ?? 1)));
}

// ── terrain / ground ────────────────────────────────────────────────────────

function buildGround(group, sc) {
  const b = sc.bounds, t = sc.terrain;
  if (t && t.rows > 1 && t.cols > 1) {
    const w = t.max_x - t.min_x, d = t.max_y - t.min_y;
    const geo = new THREE.PlaneGeometry(w, d, t.cols - 1, t.rows - 1);
    // PlaneGeometry grid: row 0 = +y edge (north after rotation) — matches
    // the contract's "heights row 0 = north".
    const pos = geo.attributes.position;
    for (let r = 0; r < t.rows; r++)
      for (let c = 0; c < t.cols; c++)
        pos.setZ(r * t.cols + c, t.heights[r][c]);
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      color: GROUND, roughness: 1 }));
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(t.min_x + w / 2, 0, -(t.min_y + d / 2));
    mesh.receiveShadow = true;
    group.add(mesh);
  }
  // A wide flat apron under/around everything (also the only ground when
  // no terrain came with the scene).
  const aw = (b.max_x - b.min_x) * 3, ad = (b.max_y - b.min_y) * 3;
  const apron = new THREE.Mesh(
    new THREE.PlaneGeometry(aw, ad),
    new THREE.MeshStandardMaterial({ color: GROUND, roughness: 1 }));
  apron.rotation.x = -Math.PI / 2;
  apron.position.set((b.min_x + b.max_x) / 2, -0.02, -(b.min_y + b.max_y) / 2);
  apron.receiveShadow = true;
  group.add(apron);
}

function buildBoundary(group, ring) {
  if (!ring || ring.length < 3) return;
  const pts = ring.concat([ring[0]]).map(p => new THREE.Vector3(p[0], 0.12, -p[1]));
  const line = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0xf9a825 }));
  group.add(line);
}

// ── buildings / footprints ─────────────────────────────────────────────────

// Static footprints (spec idea 2): extrude each ring, then merge all same-kind
// geometries into one mesh so N buildings cost ≤2 draw calls. The −90° rotation
// is baked into each geometry (so merged parts share orientation) rather than
// set on the mesh: shape (x,y) → (x, −z), extrude depth → +y.
function buildBuildings(group, buildings) {
  const byKind = { building: [], canopy: [] };
  for (const bld of buildings || []) {
    const ring = bld.ring || [];
    if (ring.length < 3) continue;
    const shape = new THREE.Shape(ring.map(p => new THREE.Vector2(p[0], p[1])));
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: Math.max(0.3, bld.height_m || 3), bevelEnabled: false });
    geo.rotateX(-Math.PI / 2);
    byKind[bld.kind === 'canopy' ? 'canopy' : 'building'].push(geo);
  }
  const mats = {
    building: new THREE.MeshStandardMaterial({ color: 0xb0a18c, roughness: 0.9 }),
    canopy: new THREE.MeshStandardMaterial({ color: 0x4e6e52, roughness: 1,
                                             transparent: true, opacity: 0.85 }),
  };
  for (const kind of ['building', 'canopy']) {
    const geos = byKind[kind];
    if (!geos.length) continue;
    const merged = geos.length === 1 ? geos[0] : mergeGeometries(geos, false);
    const mesh = new THREE.Mesh(merged, mats[kind]);
    mesh.castShadow = mesh.receiveShadow = true;
    group.add(mesh);
  }
}

// ── plants (procedural instanced archetypes) ───────────────────────────────

const _m = new THREE.Matrix4(), _q = new THREE.Quaternion(),
      _s = new THREE.Vector3(), _v = new THREE.Vector3();
const _yAxis = new THREE.Vector3(0, 1, 0);
const _white = new THREE.Color(0xffffff);

function instancedMesh(geo, count, mat, shadow = true) {
  const mesh = new THREE.InstancedMesh(geo, mat, count);
  mesh.castShadow = mesh.receiveShadow = shadow;
  return mesh;
}

// Sample terrain height (world Y) at a plant's scene position (sceneX, sceneY).
// Uses bilinear interpolation over the terrain grid; returns 0 when no terrain.
// terrain.heights[r][c]: r=0 is north edge (max sceneY), r=rows-1 is south (min sceneY).
function terrainHeightAt(sceneX, sceneY, terrain) {
  if (!terrain || terrain.rows < 2 || terrain.cols < 2) return 0;
  const t = terrain;
  const col = (sceneX - t.min_x) / (t.max_x - t.min_x) * (t.cols - 1);
  const row = (t.max_y - sceneY) / (t.max_y - t.min_y) * (t.rows - 1);
  const c0 = Math.max(0, Math.min(t.cols - 2, Math.floor(col)));
  const r0 = Math.max(0, Math.min(t.rows - 2, Math.floor(row)));
  const fc = col - c0, fr = row - r0;
  const h00 = t.heights[r0][c0],     h01 = t.heights[r0][c0 + 1];
  const h10 = t.heights[r0 + 1][c0], h11 = t.heights[r0 + 1][c0 + 1];
  return (h00 * (1 - fc) + h01 * fc) * (1 - fr) + (h10 * (1 - fc) + h11 * fc) * fr;
}

// Compose a per-instance matrix with a Y rotation and set a pre-computed colour.
function setInst2(mesh, i, x, h0, z, sx, sy, sz, rotY, color) {
  _v.set(x, h0, z); _s.set(sx, sy, sz);
  _q.setFromAxisAngle(_yAxis, rotY);
  _m.compose(_v, _q, _s);
  mesh.setMatrixAt(i, _m);
  if (color) mesh.setColorAt(i, color);
}

function fadeColor(col, opacity) {
  const o = Math.max(0, Math.min(1, opacity ?? 1));
  return col.clone().lerp(_skyCol, 1 - o);
}

// MeshStandardMaterial with an optional GPU wind sway injected into the
// vertex stage (the first custom shader work in the app). Lighting, shadows
// and instancing all stay intact — we only nudge `transformed` in local space
// (so the per-instance matrix scales the sway by canopy size) before three
// applies the instance/model matrices in <project_vertex>.
function plantMaterial(opts = {}) {
  const mat = new THREE.MeshStandardMaterial({
    roughness: opts.roughness ?? 0.9,
    vertexColors: !!opts.vertexColors,
  });
  const strength = opts.wind || 0;
  if (strength > 0) {
    mat.onBeforeCompile = (shader) => {
      shader.uniforms.uTime = windUniforms.uTime;
      shader.vertexShader = 'uniform float uTime;\n' + shader.vertexShader;
      shader.vertexShader = shader.vertexShader.replace(
        '#include <begin_vertex>',
        [
          '#include <begin_vertex>',
          '{',
          '  #ifdef USE_INSTANCING',
          '  vec3 iPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);',
          '  #else',
          '  vec3 iPos = vec3(0.0);',
          '  #endif',
          '  float hf = clamp(transformed.y, 0.0, 1.2);',           // taller verts sway more
          '  float ph = iPos.x * 0.35 + iPos.z * 0.35;',            // per-plant phase
          '  float wv = sin(uTime * 1.3 + ph + position.x * 1.1 + position.z * 0.8) * 0.6',
          '           + sin(uTime * 2.6 + ph * 1.7) * 0.4;',
          '  float amp = ' + strength.toFixed(4) + ' * hf * hf;',
          '  transformed.x += wv * amp;',
          '  transformed.z += wv * 0.7 * amp;',
          '}',
        ].join('\n'));
    };
    mat.customProgramCacheKey = () =>
      'windplant' + strength.toFixed(4) + (opts.vertexColors ? 'c' : '');
  }
  return mat;
}

// A soft radial "contact shadow" stamp — a dark blob under big plants that
// grounds them without leaning on the directional shadow map's resolution.
function makeShadowTexture() {
  const s = 128, cv = document.createElement('canvas');
  cv.width = cv.height = s;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  g.addColorStop(0, 'rgba(0,0,0,0.55)');
  g.addColorStop(0.55, 'rgba(0,0,0,0.28)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(cv);
}

// ── Da Vinci procedural trees ───────────────────────────────────────────────
// Part 1 of the spec: a parent branch of radius R splitting into children
// r_i obeys R^x = Σ r_i^x (area conservation; x is species-ish), and child
// length scales as (r_child / R)^lengthScaling. We build an abstract skeleton
// first, then turn it into one merged BufferGeometry — so a whole forest is a
// handful of InstancedMesh draw calls.

const DECID_CFG = {
  // Lower cutoff than the trunk start ⇒ branches recurse to finer twigs, so
  // even narrow-crowned forms carry enough tips for a full canopy.
  davinciExponent: 2.0, lengthScaling: 0.7, branchAngleBase: 0.62,
  maxDepth: 4, minRadiusCutoff: 0.018, conifer: false,
};

// Crown form is chosen from the plant's real height/canopy aspect ratio rather
// than an arbitrary id hash, so a tall-narrow species (aspen/poplar/birch)
// renders slender and a broad one (oak/maple) renders spreading — the trees
// look the way their own dimensions say they should.
//   slender  : narrow upright crown, short side limbs, high clear bole
//   oval     : balanced upright
//   spreading: broad rounded crown (the look the user already liked on oak)
// `clearBole` is the fraction of crown height kept leaf-free at the bottom
// (a real tree's clean trunk); `foliageScale` shrinks slender trees' leaf
// clusters so a fine-leaved aspen crown doesn't read as heavy blobs.
const DECID_FORMS = {
  slender:   { branchAngleBase: 0.46, lengthScaling: 0.84, davinciExponent: 2.0,
               clearBole: 0.52, foliageScale: 0.72 },
  oval:      { branchAngleBase: 0.62, lengthScaling: 0.70, davinciExponent: 2.0,
               clearBole: 0.38, foliageScale: 0.9 },
  spreading: { branchAngleBase: 0.85, lengthScaling: 0.64, davinciExponent: 1.85,
               clearBole: 0.28, foliageScale: 1.0 },
};
// Conifer skirt profiles (Phase 1): conifers are clean stacked cones, not
// branch skeletons. `tiersAdd` shifts the tier count off the maturity base,
// `baseR` the bottom-tier radius, `droop` how far each shelf sweeps down.
const CONIFER_FORMS = {
  slender:   { baseR: 0.38, tiersAdd: 2, droop: 0.10 },   // spire (spruce)
  oval:      { baseR: 0.46, tiersAdd: 1, droop: 0.14 },   // standard
  spreading: { baseR: 0.55, tiersAdd: -1, droop: 0.20 },  // broad / open fir
};
// Maturity-tier branch depth [sapling, young, mature] — a young tree renders
// with fewer structural forks (spec idea 4: maturity drives recursive depth).
const DECID_DEPTH = [2, 3, 4];
const CONIFER_TIERS = [3, 5, 8];   // skirt count by maturity tier

const _FORM_SEED = { slender: 0, oval: 17, spreading: 31 };

// Crown form from the (already-scaled) height/canopy aspect ratio.
function formOf(p) {
  const c = Math.max(0.1, p.canopy_m || 1), h = Math.max(0.1, p.height_m || 1);
  const aspect = h / c;
  return aspect >= 2.0 ? 'slender' : (aspect <= 1.1 ? 'spreading' : 'oval');
}

function decidCfg(form, tier) {
  return Object.assign({}, DECID_CFG, DECID_FORMS[form], { maxDepth: DECID_DEPTH[tier] });
}

function generateDaVinciTree(radius, length, depth, cfg, rng) {
  if (depth >= cfg.maxDepth || radius < cfg.minRadiusCutoff) {
    return { radiusBottom: radius, radiusTop: radius * 0.6, length, depth, children: [] };
  }
  const node = { radiusBottom: radius, length, depth, children: [] };
  let numSplits;
  if (cfg.conifer) {
    const lo = cfg.splitMin ?? 3, hi = cfg.splitMax ?? 4;  // whorls
    numSplits = lo + Math.floor(rng() * (hi - lo + 1));
  } else {
    numSplits = rng() < (cfg.splitBias ?? 0.2) ? 3 : 2;    // forks
  }
  const leaderShare = cfg.leaderShare ?? 0.6;

  const cap = Math.pow(radius, cfg.davinciExponent);
  let remaining = cap;
  const childRadii = [];
  for (let i = 0; i < numSplits; i++) {
    if (i === numSplits - 1) {
      childRadii.push(Math.pow(Math.max(0, remaining), 1 / cfg.davinciExponent));
    } else if (cfg.conifer && i === 0) {
      const a = remaining * leaderShare;                  // central leader (monopodial)
      childRadii.push(Math.pow(a, 1 / cfg.davinciExponent)); remaining -= a;
    } else {
      const share = cfg.conifer ? (0.15 + rng() * 0.1) : (0.3 + rng() * 0.25);
      const a = remaining * share;
      childRadii.push(Math.pow(a, 1 / cfg.davinciExponent)); remaining -= a;
    }
  }
  node.radiusTop = Math.pow(
    childRadii.reduce((s, r) => s + Math.pow(r, cfg.davinciExponent), 0),
    1 / cfg.davinciExponent);

  for (let i = 0; i < numSplits; i++) {
    const cr = childRadii[i];
    const cl = length * Math.pow(Math.max(0.05, cr / radius), cfg.lengthScaling);
    const child = generateDaVinciTree(cr, cl, depth + 1, cfg, rng);
    if (cfg.conifer && i === 0) {
      child.angleSpread = cfg.branchAngleBase * 0.08 * (rng() - 0.5);
      child.angleRotation = rng() * Math.PI * 2;
    } else {
      child.angleSpread = cfg.branchAngleBase * (0.8 + rng() * 0.4);
      child.angleRotation = (i * (Math.PI * 2 / numSplits)) + rng() * 0.5;
    }
    node.children.push(child);
  }
  return node;
}

// Walk a skeleton into two merged geometries: woody branches and leaf clusters.
// The canopy is built from many overlapping blobs (rather than one blob per
// tip) so the merged foliage reads as a continuous leaf mass — denser near the
// structural scaffold, finer toward the outer twigs (blob size tapers with
// branch depth).
function treeToGeometry(root, cfg, rng) {
  const branchGeos = [];
  const blobs = [];        // {geo, y} foliage candidates, gated by clear-bole
  const fScale = cfg.foliageScale ?? 1.0;

  function addSeg(node, mat) {
    const seg = new THREE.CylinderGeometry(
      Math.max(0.004, node.radiusTop), Math.max(0.006, node.radiusBottom),
      node.length, 5, 1);
    seg.translate(0, node.length / 2, 0);
    seg.applyMatrix4(mat);
    branchGeos.push(seg);
  }
  // Deciduous: a balloon of 3–5 overlapping flattened spheres at each twig tip
  // (and 1–2 smaller ones at interior junctions) → a full rounded crown. Each
  // blob is tagged with its world Y so the clear-bole pass can strip foliage
  // off the lower trunk after the crown height is known.
  function addDeciduousCluster(tipMat, depth, terminal) {
    const tipY = tipMat.elements[13];
    const depthScale = Math.max(0.65, 1.0 - depth * 0.08);
    const n = terminal ? 3 + Math.floor(rng() * 3) : 1 + Math.floor(rng() * 2);
    const base = (terminal ? 0.20 : 0.15) * depthScale * fScale;
    const spread = (terminal ? 0.22 : 0.16) * fScale;
    for (let i = 0; i < n; i++) {
      const r = base + rng() * 0.14 * depthScale * fScale;
      const s = new THREE.SphereGeometry(r, 5, 4);
      s.scale(1, 0.72 + rng() * 0.2, 1);
      s.translate((rng() - 0.5) * spread, r * 0.4 + (rng() - 0.2) * 0.1,
                  (rng() - 0.5) * spread);
      s.applyMatrix4(tipMat);
      blobs.push({ geo: s, y: tipY });
    }
  }
  function walk(node, mat) {
    addSeg(node, mat);
    const tip = mat.clone().multiply(new THREE.Matrix4().makeTranslation(0, node.length, 0));
    const terminal = !node.children.length;
    if (terminal) addDeciduousCluster(tip, node.depth, true);
    else if (node.depth >= 2) addDeciduousCluster(tip, node.depth, false);  // interior fill
    if (terminal) return;
    for (const child of node.children) {
      const rot = new THREE.Matrix4().makeRotationY(child.angleRotation)
        .multiply(new THREE.Matrix4().makeRotationX(child.angleSpread));
      walk(child, tip.clone().multiply(rot));
    }
  }
  walk(root, new THREE.Matrix4());

  // Clear bole: drop leaf clusters below clearBole × crown height so the trunk
  // shows (strongest on slender/aspen forms) — disposing the rejects' buffers.
  const maxY = blobs.reduce((m, b) => Math.max(m, b.y), 0);
  const gate = (cfg.clearBole ?? 0) * maxY;
  const foliageGeos = [];
  for (const b of blobs) {
    if (b.y >= gate) foliageGeos.push(b.geo);
    else b.geo.dispose();
  }

  const branchGeo = branchGeos.length ? mergeGeometries(branchGeos, false) : null;
  const foliageGeo = foliageGeos.length ? mergeGeometries(foliageGeos, false) : null;
  normalizeUnit([branchGeo, foliageGeo]);
  if (foliageGeo) applyFoliageGradient(foliageGeo);
  return { branchGeo, foliageGeo };
}

// Conifer crown (Phase 1): a clean stack of apex-up cone "skirts" up a thin
// central trunk — radius tapering to a spire — instead of a branch skeleton
// with cones at every whorl. Reads as a natural cone, not a spiky star, and is
// markedly lower-poly. Form sets base radius / tier count / droop; tier sets
// the maturity skirt count.
function buildConiferGeo(form, tier, rng) {
  const fp = CONIFER_FORMS[form] || CONIFER_FORMS.oval;
  const M = Math.max(2, CONIFER_TIERS[tier] + fp.tiersAdd);
  const branchGeos = [], foliageGeos = [];
  const H = 1.0, y0 = 0.05, yTop = 0.93;

  const trunk = new THREE.CylinderGeometry(0.012, 0.05, H, 5, 1);
  trunk.translate(0, H / 2, 0);
  branchGeos.push(trunk);

  for (let i = 0; i < M; i++) {
    const f = M === 1 ? 0 : i / (M - 1);            // 0 base … 1 top
    const y = y0 + (yTop - y0) * f;
    const r = (fp.baseR * Math.pow(1 - f, 0.85) + 0.03) * (0.9 + rng() * 0.2);
    const hh = (0.20 + 0.12 * (1 - f)) * (1 + fp.droop);
    const skirt = new THREE.ConeGeometry(r, hh, 8, 1);
    skirt.translate(0, y - hh * (0.5 - fp.droop), 0);  // flare base down (droop)
    skirt.rotateY(rng() * Math.PI);
    foliageGeos.push(skirt);
  }
  const spire = new THREE.ConeGeometry(0.045, 0.15, 6, 1);
  spire.translate(0, yTop + 0.05, 0);
  foliageGeos.push(spire);

  const branchGeo = mergeGeometries(branchGeos, false);
  const foliageGeo = mergeGeometries(foliageGeos, false);
  normalizeUnit([branchGeo, foliageGeo]);
  applyFoliageGradient(foliageGeo);
  return { branchGeo, foliageGeo };
}

// Rescale a set of geometries (in place, sharing one frame) to base y = 0,
// height 1, horizontal half-width 0.5 — so per-instance scale is [canopy,
// height, canopy], matching the rest of the plant pipeline.
function normalizeUnit(geos) {
  const box = new THREE.Box3();
  for (const g of geos) {
    if (!g) continue;
    g.computeBoundingBox(); box.union(g.boundingBox);
  }
  const sizeY = Math.max(1e-3, box.max.y - box.min.y);
  const halfXZ = Math.max(1e-3, Math.abs(box.min.x), Math.abs(box.max.x),
                          Math.abs(box.min.z), Math.abs(box.max.z));
  const sy = 1 / sizeY, sxz = 0.5 / halfXZ;
  for (const g of geos) {
    if (!g) continue;
    g.translate(0, -box.min.y, 0);
    g.scale(sxz, sy, sxz);
    g.computeVertexNormals();
  }
}

// Multi-tone canopy gradient (spec idea 8): a warm, brighter sunlit crown up
// top fading to a cool, desaturated self-shadowed interior below. Baked as a
// vertex-colour multiplier (values >1 push the sunlit highlight) so the
// per-instance seasonal colour still shows through. A smoothstep curve gives
// more contrast than a flat lerp.
function applyFoliageGradient(geo) {
  const pos = geo.attributes.position;
  const col = new Float32Array(pos.count * 3);
  const bot = [0.40, 0.50, 0.46], top = [1.10, 1.04, 0.80];
  for (let i = 0; i < pos.count; i++) {
    const t = Math.min(1, Math.max(0, pos.getY(i)));
    const tt = t * t * (3 - 2 * t);   // smoothstep → deeper shadow low, hotter top
    col[i * 3] = bot[0] + (top[0] - bot[0]) * tt;
    col[i * 3 + 1] = bot[1] + (top[1] - bot[1]) * tt;
    col[i * 3 + 2] = bot[2] + (top[2] - bot[2]) * tt;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
}

// A bushy shrub: several overlapping spheres merged, normalised, gradient-tinted.
function buildShrubGeo(rng) {
  const geos = [];
  const n = 3 + Math.floor(rng() * 5);   // 3–7 sub-domes for visual variety
  const spread = 0.4 + rng() * 0.3;
  for (let i = 0; i < n; i++) {
    const r = 0.24 + rng() * 0.18;
    const s = new THREE.SphereGeometry(r, 6, 5);
    s.translate((rng() - 0.5) * spread, rng() * 0.35 + r * 0.5, (rng() - 0.5) * spread);
    geos.push(s);
  }
  const g = mergeGeometries(geos, false);
  normalizeUnit([g]);
  applyFoliageGradient(g);
  return g;
}

// A perennial clump: several thin stems fanning out from a base, each topped
// with a small leaf rosette, over a low basal foliage mound — the "clump with
// several stems" look that a single cone can't convey.
function buildPerennialGeo(rng) {
  const geos = [];
  const stems = 4 + Math.floor(rng() * 4);   // 4–7 stems
  for (let i = 0; i < stems; i++) {
    const h = 0.6 + rng() * 0.4;
    const r = 0.012 + rng() * 0.01;
    const tilt = 0.17 + rng() * 0.26;         // ~10–25° from vertical
    const az = (i / stems) * Math.PI * 2 + rng() * 0.6;
    const m = new THREE.Matrix4().makeRotationY(az)
      .multiply(new THREE.Matrix4().makeRotationX(tilt));
    const stem = new THREE.CylinderGeometry(r * 0.5, r, h, 4, 1);
    stem.translate(0, h / 2, 0);
    stem.applyMatrix4(m);
    geos.push(stem);
    const tip = new THREE.Vector3(0, h, 0).applyMatrix4(m);
    const lr = 0.06 + rng() * 0.06;
    const leaf = new THREE.SphereGeometry(lr, 5, 4);
    leaf.scale(1.3, 0.7, 1.3);
    leaf.translate(tip.x, tip.y, tip.z);
    geos.push(leaf);
  }
  const mounds = 2 + Math.floor(rng() * 2);
  for (let i = 0; i < mounds; i++) {
    const r = 0.08 + rng() * 0.07;
    const s = new THREE.SphereGeometry(r, 5, 4);
    s.scale(1, 0.7, 1);
    s.translate((rng() - 0.5) * 0.2, r * 0.4, (rng() - 0.5) * 0.2);
    geos.push(s);
  }
  const g = mergeGeometries(geos, false);
  normalizeUnit([g]);
  applyFoliageGradient(g);
  return g;
}

// A groundcover mat: a scatter of small low domes filling a unit circle — a
// textured plant carpet rather than a flat disc.
function buildGroundcoverGeo(rng) {
  const geos = [];
  const n = 5 + Math.floor(rng() * 4);   // 5–8 tufts
  for (let i = 0; i < n; i++) {
    const r = 0.08 + rng() * 0.07;
    const ang = rng() * Math.PI * 2, rad = rng() * 0.42;
    const ys = 0.5 + rng() * 0.5;
    const s = new THREE.SphereGeometry(r, 5, 3);
    s.scale(1, ys, 1);
    s.translate(Math.cos(ang) * rad, r * ys * 0.5, Math.sin(ang) * rad);
    geos.push(s);
  }
  const g = mergeGeometries(geos, false);
  normalizeUnit([g]);
  applyFoliageGradient(g);
  return g;
}

// Built once, reused across every scene rebuild (deterministic seeds).
// ARCH holds the cheap shrub/peren/ground variant arrays; trees are built
// lazily and memoised by (class, form, tier, sub) in TREE_CACHE.
let ARCH = null;
let MATS = null;     // shared plant materials (per-instance colour does the rest)
let SHADOW_TEX = null;
const TREE_SUBVARS = 3;    // distinct random branchings per species, so a stand
                           // of one species reads as individuals, not clones

// scale_factor (0.1–1.0 growth maturity) → structural tier.
function tierFor(scaleFactor) {
  const s = scaleFactor == null ? 1 : scaleFactor;
  return s < 0.35 ? 0 : (s < 0.7 ? 1 : 2);
}

// Per-individual sub-variation from position (+ species id): two trees of the
// same species standing apart get different branchings, so a grove looks
// natural rather than procedurally stamped.
function indHash(p) {
  const xi = Math.round((p.x || 0) * 10), zi = Math.round((p.y || 0) * 10);
  return Math.abs(((xi * 73856093) ^ (zi * 19349663) ^ hashPid(p.plant_id)) | 0);
}

// Lazily build + cache one tree archetype, keyed by (class, form, tier, sub).
// Only the combinations a scene actually uses are generated. Conifers are
// clean cone stacks; deciduous are Da Vinci crowns shaped by their form.
const TREE_CACHE = new Map();
function getTreeArch(cls, form, tier, sub) {
  const key = cls + '_' + form + '_' + tier + '_' + sub;
  let a = TREE_CACHE.get(key);
  if (a) return a;
  if (cls === 'conifer') {
    const seed = 5000 + (_FORM_SEED[form] || 0) + tier * 11 + sub * 191;
    a = buildConiferGeo(form, tier, mulberry32(seed));
  } else {
    const cfg = decidCfg(form, tier);
    const seed = 100 + (_FORM_SEED[form] || 0) + tier * 11 + sub * 191;
    a = treeToGeometry(generateDaVinciTree(0.06, 0.42, 0, cfg, mulberry32(seed)),
                       cfg, mulberry32(seed + 7));
  }
  TREE_CACHE.set(key, a);
  return a;
}

function buildArchetypes() {
  if (ARCH) return;
  const shrub = [], peren = [], ground = [];
  for (const sd of [11, 41, 73, 97]) shrub.push(buildShrubGeo(mulberry32(sd)));
  for (const sd of [211, 251, 307]) peren.push(buildPerennialGeo(mulberry32(sd)));
  for (const sd of [331, 379]) ground.push(buildGroundcoverGeo(mulberry32(sd)));
  ARCH = { shrub, peren, ground };
}

function ensurePlantMats() {
  if (MATS) return;
  if (!SHADOW_TEX) SHADOW_TEX = makeShadowTexture();
  MATS = {
    branch:  plantMaterial({ roughness: 0.92, wind: 0.015 }),
    foliage: plantMaterial({ roughness: 0.85, wind: 0.07, vertexColors: true }),
    shrub:   plantMaterial({ roughness: 0.85, wind: 0.06, vertexColors: true }),
    simple:  plantMaterial({ roughness: 0.9, wind: 0.06 }),
    ground:  plantMaterial({ roughness: 0.95, wind: 0.02, vertexColors: true }),
    shadow:  new THREE.MeshBasicMaterial({ map: SHADOW_TEX, transparent: true,
               depthWrite: false, color: 0x2b3a20, opacity: 0.85 }),
  };
}

// Unit geometries (height 1, half-width 0.5) for the simpler layers.
const GEO = {
  cone:   new THREE.ConeGeometry(0.5, 1, 7).translate(0, 0.5, 0),
  shadow: new THREE.PlaneGeometry(1, 1).rotateX(-Math.PI / 2),
};

const _isDecid = (ft) => ft !== 'evergreen';   // unknown ⇒ deciduous-ish
const _bareMonth = (m) => (m >= 11 || m <= 3);

// Spread visualisation (F35): a self-sowing / rhizomatous plant scatters
// offspring around the parent that keep accumulating as the years advance — a
// colony creeping outward, not a one-time burst. Offspring positions are
// deterministic per (plant, k) — a golden-angle spiral with sqrt-spaced radii
// for even areal density — so as `year` reveals more of them (K below), the
// ones already shown stay put and new ones appear at the growing frontier.
// Returns {dx, dz (scene metres from the plant), mul (archetype scale)} per
// instance; non-spreaders get a single full-size placement.
const _NO_SPREAD = [{ dx: 0, dz: 0, mul: 1 }];
const _GOLDEN = Math.PI * (3 - Math.sqrt(5));   // golden angle ≈ 137.5°
function spreadPlacements(p, year) {
  const rate = p.spread_rate || 0;              // 0 none · 0.3 slow · 0.6 self-seed · 1 aggressive
  if (rate <= 0.01) return _NO_SPREAD;
  const cap = p.plant_type === 'groundcover' ? 14 : 10;   // bound instance count
  // ~one new offspring every (3 / rate) years → continuous, year-driven spread.
  const K = Math.min(cap, Math.round(rate * (year || 0) / 3));
  if (K <= 0) return _NO_SPREAD;
  const c = Math.max(0.3, p.canopy_m);
  const reach = c * (1.4 + rate * 2.2);         // frontier grows with aggressiveness
  const base = hashPid(p.plant_id) % 97;
  const phase = (hashPid(p.plant_id) % 360) * Math.PI / 180;
  const out = [{ dx: 0, dz: 0, mul: 1 }];
  for (let k = 1; k <= K; k++) {
    const f = k / cap;                          // 0 near … 1 frontier (stable per k)
    const j = Math.sin((k + base) * 12.9898) * 43758.5453;
    const jr = 0.78 + 0.22 * (j - Math.floor(j));   // deterministic radial jitter
    const rr = reach * Math.sqrt(f) * jr;
    const ang = phase + k * _GOLDEN;
    out.push({ dx: Math.cos(ang) * rr, dz: Math.sin(ang) * rr,
               mul: 0.72 - 0.34 * f });          // newer/outer offspring are smaller
  }
  return out;
}

// Build one simple plant layer: bucket items across `variants` archetypes,
// instance each bucket (including spread offspring), scale per item via
// scaleOf(p) → [sx, sy, sz]. `noRot` keeps groundcover flat with no Y spin.
function buildLayer(list, variants, mat, archOf, scaleOf, month, year, noRot, terrain) {
  if (!list || !list.length) return;
  const buckets = Array.from({ length: variants }, () => []);
  for (const p of list) buckets[hashPid(p.plant_id) % variants].push(p);
  buckets.forEach((items, v) => {
    if (!items.length) return;
    const places = items.map(p => spreadPlacements(p, year));
    const total = places.reduce((s, pl) => s + pl.length, 0);
    const mesh = instancedMesh(archOf(v), total, mat);
    let idx = 0;
    items.forEach((p, ii) => {
      const [sx, sy, sz] = scaleOf(p);
      const rotY0 = noRot ? 0 : (indHash(p) % 628) / 100;
      const col = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
      places[ii].forEach((pl, k) => {
        const m = pl.mul;
        const wx = p.x + pl.dx, wy = p.y + pl.dz;
        const rotY = noRot ? 0 : rotY0 + (k ? pl.dx : 0);
        const gy = terrainHeightAt(wx, wy, terrain);
        setInst2(mesh, idx, wx, gy, -wy,
                 sx * m, sy * (noRot ? 1 : m), sz * m, rotY, col);
        idx++;
      });
    });
    plantsGroup.add(mesh);
  });
}

function buildPlants(group, plants, month, year, terrain) {
  if (plantsGroup) { disposeDesignGroup(plantsGroup); group.remove(plantsGroup); }
  plantsGroup = new THREE.Group();
  group.add(plantsGroup);
  buildArchetypes();
  ensurePlantMats();
  month = month || 6;
  year = year || 0;

  const byKind = { tree: [], shrub: [], vine: [], groundcover: [], herb: [] };
  for (const p of plants || []) {
    const k = byKind[p.plant_type] ? p.plant_type : 'herb';
    byKind[k].push(p);
  }

  // Trees — bucketed by crown class (conifer vs deciduous) × crown form (from
  // the plant's aspect ratio: slender/oval/spreading) × maturity tier (young
  // trees are simpler) × per-individual sub-variation (so repeats of one
  // species aren't identical clones).
  if (byKind.tree.length) {
    const buckets = {};
    for (const p of byKind.tree) {
      const cls = p.foliage_type === 'evergreen' ? 'conifer' : 'deciduous';
      const form = formOf(p);
      const t = tierFor(p.scale_factor);
      const sub = indHash(p) % TREE_SUBVARS;
      const key = cls + '_' + form + '_' + t + '_' + sub;
      (buckets[key] = buckets[key] || { cls, form, t, sub, items: [] }).items.push(p);
    }
    for (const key in buckets) {
      const { cls, form, t, sub, items } = buckets[key];
      const arch = getTreeArch(cls, form, t, sub);
      const places = items.map(p => spreadPlacements(p, year));
      const total = places.reduce((s, pl) => s + pl.length, 0);
      const branch = instancedMesh(arch.branchGeo, total, MATS.branch);
      const foliage = instancedMesh(arch.foliageGeo, total, MATS.foliage);
      let idx = 0;
      items.forEach((p, ii) => {
        const h = Math.max(0.4, p.height_m), c = Math.max(0.4, p.canopy_m);
        const rotY0 = (indHash(p) % 628) / 100;
        const bare = _isDecid(p.foliage_type) && _bareMonth(month);
        const bcol = fadeToward('#5d4433', p.opacity);
        const fcol = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
        places[ii].forEach((pl, k) => {
          const m = pl.mul, x = p.x + pl.dx, wy = p.y + pl.dz, z = -wy;
          const rotY = rotY0 + (k ? pl.dx + pl.dz : 0);
          const gy = terrainHeightAt(x, wy, terrain);
          setInst2(branch, idx, x, gy, z, c * m, h * m, c * m, rotY, bcol);
          if (bare) setInst2(foliage, idx, x, gy, z, 0.001, 0.001, 0.001, rotY, _white);
          else setInst2(foliage, idx, x, gy, z, c * m, h * m, c * m, rotY, fcol);
          idx++;
        });
      });
      plantsGroup.add(branch, foliage);
    }
  }

  // Shrubs — bushy gradient domes, one InstancedMesh per archetype variant.
  buildLayer(byKind.shrub, 4, MATS.shrub, (v) => ARCH.shrub[v],
             (p) => [Math.max(0.25, p.canopy_m), Math.max(0.2, p.height_m),
                     Math.max(0.25, p.canopy_m)], month, year, false, terrain);

  // Perennials/herbs — multi-stem clumps; vines — slim swaying cones.
  buildLayer(byKind.herb, 3, MATS.shrub, (v) => ARCH.peren[v],
             (p) => [Math.max(0.15, p.canopy_m), Math.max(0.08, p.height_m),
                     Math.max(0.15, p.canopy_m)], month, year, false, terrain);
  if (byKind.vine.length) {
    const list = byKind.vine;
    const places = list.map(p => spreadPlacements(p, year));
    const total = places.reduce((s, pl) => s + pl.length, 0);
    const mesh = instancedMesh(GEO.cone, total, MATS.simple);
    let idx = 0;
    list.forEach((p, ii) => {
      const h = Math.max(0.08, p.height_m), c = Math.max(0.25, p.canopy_m * 0.6);
      const rotY = (hashPid(p.plant_id) % 628) / 100;
      const col = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
      places[ii].forEach((pl) => {
        const m = pl.mul, cc = Math.max(0.2, c * m);
        const wx = p.x + pl.dx, wy = p.y + pl.dz;
        const gy = terrainHeightAt(wx, wy, terrain);
        setInst2(mesh, idx, wx, gy, -wy, cc, h * m, cc, rotY, col);
        idx++;
      });
    });
    plantsGroup.add(mesh);
  }

  // Groundcover — low textured dome mats (no flat discs), gentle sway.
  buildLayer(byKind.groundcover, 2, MATS.ground, (v) => ARCH.ground[v],
             (p) => [Math.max(0.18, p.canopy_m),
                     Math.min(0.18, Math.max(0.05, p.height_m)),
                     Math.max(0.18, p.canopy_m)], month, year, true, terrain);

  // Contact shadows under trees and tall shrubs (skip near-vanished plants).
  const shadowed = byKind.tree
    .concat(byKind.shrub.filter(p => (p.height_m || 0) > 1.2))
    .filter(p => (p.opacity ?? 1) >= 0.2);
  if (shadowed.length) {
    const sh = instancedMesh(GEO.shadow, shadowed.length, MATS.shadow, false);
    shadowed.forEach((p, i) => {
      const c = Math.max(0.4, p.canopy_m) * 1.35;
      _v.set(p.x, 0.03, -p.y); _s.set(c, 1, c); _q.identity();
      _m.compose(_v, _q, _s);
      sh.setMatrixAt(i, _m);
    });
    plantsGroup.add(sh);
  }
}

function buildScanPoints(group, pts) {
  // The imported yard scan as a height-tinted point layer — ground truth
  // behind the proposed design. Sampled host-side (≤ ~120k points).
  if (!pts || !pts.length) return;
  const pos = new Float32Array(pts.length * 3);
  const col = new Float32Array(pts.length * 3);
  const lo = new THREE.Color(0x4e5d52), hi = new THREE.Color(0xe8f0d8);
  const c = new THREE.Color();
  for (let i = 0; i < pts.length; i++) {
    const [x, y, z] = pts[i];
    pos[i * 3] = x; pos[i * 3 + 1] = z; pos[i * 3 + 2] = -y;
    c.copy(lo).lerp(hi, Math.max(0, Math.min(1, z / 6)));
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  group.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.08, vertexColors: true })));
}

function buildStructures(group, structures) {
  for (const s of structures || []) {
    const size = Math.max(0.3, s.size_m || 1), h = Math.max(0.3, s.height_m || 1);
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(size, h, size),
      new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.9 }));
    mesh.position.set(s.x, h / 2, -s.y);
    mesh.castShadow = mesh.receiveShadow = true;
    group.add(mesh);
  }
}

// ── Gaussian-splat backdrop (Spark) ─────────────────────────────────────────
// The splat lives OUTSIDE designGroup so a year-slider scene rebuild never
// reloads it (a yard splat is tens of MB). It is keyed by URL: ensureSplat
// only re-fetches when the file changes, otherwise just refreshes its world
// matrix + opacity from the latest scene push.

let splatMesh = null;
let splatUrl = null;

function applySplatMatrix(mesh, mat16) {
  // mat16 is column-major (three.js order) from src/splat_backdrop.world_matrix.
  mesh.matrixAutoUpdate = false;
  mesh.matrix.fromArray(mat16);
}

function ensureSplat(spec) {
  if (!spec || !spec.url) { removeSplat(); return; }
  if (!SplatMesh) return;          // Spark not loaded (yet) — skip silently
  ensureSparkRenderer();
  if (spec.url !== splatUrl) {
    removeSplat();
    try {
      splatMesh = new SplatMesh({ url: spec.url });
    } catch (e) {
      splatMesh = null; splatUrl = null;
      return;   // bad splat — design still renders
    }
    splatUrl = spec.url;
    scene.add(splatMesh);
  }
  if (splatMesh) {
    applySplatMatrix(splatMesh, spec.matrix);
    if (typeof spec.opacity === 'number' && 'opacity' in splatMesh) {
      splatMesh.opacity = spec.opacity;
    }
  }
}

function removeSplat() {
  if (splatMesh) { scene.remove(splatMesh); }
  splatMesh = null; splatUrl = null;
}

window.permaClearSplat = function () { removeSplat(); };

// Bake a north-up orthographic photo of the splat for the 2D "yard photo"
// map layer. Returns a PNG data URL synchronously (the host calls this once
// the splat has streamed in) — opts frames an exact scene-metre rectangle so
// the image maps 1:1 onto the splat's lat/lng bbox. Returns '' if not ready.
window.permaCaptureOrtho = function (opts) {
  if (!splatMesh || !opts) return '';
  const wx = Math.max(1e-3, opts.max_x - opts.min_x);
  const dz = Math.max(1e-3, opts.max_y - opts.min_y);   // north span
  const cx = (opts.min_x + opts.max_x) / 2;
  const cz = -(opts.min_y + opts.max_y) / 2;            // north → −z centre
  const cam = new THREE.OrthographicCamera(-wx / 2, wx / 2, dz / 2, -dz / 2,
                                           0.1, 2000);
  cam.position.set(cx, 800, cz);
  cam.up.set(0, 0, -1);          // north (−z) points up in the image
  cam.lookAt(cx, 0, cz);

  // Splat-only frame: hide the design + sky so the layer is just the yard.
  const designVis = designGroup ? designGroup.visible : false;
  if (designGroup) designGroup.visible = false;
  const bg = scene.background; scene.background = null;

  const longest = Math.round(Math.max(1, Math.min(4096, opts.width || 2048)));
  const px = wx >= dz ? longest : Math.round(longest * (wx / dz));
  const py = wx >= dz ? Math.round(longest * (dz / wx)) : longest;
  const prev = new THREE.Vector2(); renderer.getSize(prev);
  renderer.setSize(px, py, false);
  renderer.render(scene, cam);
  let url = '';
  try { url = renderer.domElement.toDataURL('image/png'); } catch (e) { url = ''; }

  // Restore the live view.
  renderer.setSize(prev.x, prev.y, false);
  scene.background = bg;
  if (designGroup) designGroup.visible = designVis;
  renderer.render(scene, camera);
  return url;
};

// ── hooks ───────────────────────────────────────────────────────────────────

// Free the GPU resources a scene rebuild leaves behind. Without this the
// per-rebuild instance buffers and fresh ground/boundary/building geometries
// pile up in VRAM on every slider move until a weak GPU runs out and crashes.
// Shared archetype geometry (TREE_CACHE/ARCH/GEO) and materials (MATS) are
// reused across rebuilds, so they are skipped.
function disposeDesignGroup(group) {
  if (!group) return;
  const sharedGeo = new Set();
  for (const a of TREE_CACHE.values()) {
    if (a.branchGeo) sharedGeo.add(a.branchGeo);
    if (a.foliageGeo) sharedGeo.add(a.foliageGeo);
  }
  if (ARCH) [...ARCH.shrub, ...ARCH.peren, ...ARCH.ground].forEach(g => sharedGeo.add(g));
  for (const k in GEO) sharedGeo.add(GEO[k]);
  const sharedMat = new Set(MATS ? Object.values(MATS) : []);
  group.traverse(obj => {
    if (obj.isInstancedMesh) obj.dispose();             // frees instance buffers only
    if (obj.geometry && !sharedGeo.has(obj.geometry)) obj.geometry.dispose();
    const m = obj.material;
    if (m) for (const mm of (Array.isArray(m) ? m : [m]))
      if (mm && !sharedMat.has(mm)) mm.dispose();
  });
}

// Reaching here means the whole module body executed without throwing — the
// hooks are about to register and the 8s "couldn't start" timeout will be
// cancelled. If the log shows 'module-eval-start' but not this line, something
// between the two threw (and should have surfaced via the error handler).
window._pinglog && window._pinglog('registering hooks (boot OK)');

window.permaSetScene = function (sc) {
  if (!sc || !sc.bounds) return;
  if (designGroup) { disposeDesignGroup(designGroup); scene.remove(designGroup); }
  designGroup = new THREE.Group();
  scene.add(designGroup);
  lastOrigin = sc.origin || null;
  lastMonth = sc.month || 6;
  lastYear = sc.year || 0;
  lastBounds = sc.bounds;
  lastTerrain = sc.terrain || null;

  buildGround(designGroup, sc);
  buildBoundary(designGroup, sc.boundary);
  buildBuildings(designGroup, sc.buildings);
  buildPlants(designGroup, sc.plants, sc.month, sc.year, sc.terrain);
  buildStructures(designGroup, sc.structures);
  buildScanPoints(designGroup, sc.scan_points);
  ensureSplat(sc.splat);
  if (sc.sun) setSun(sc.sun.azimuth_deg, sc.sun.altitude_deg);
  fitShadow(sc.bounds);

  // Frame the camera only on first load or when a genuinely different design is
  // opened (origin moved) — a slider re-push of the same design keeps the
  // user's current orbit/zoom.
  const o = sc.origin;
  const moved = !framedOrigin ||
    (o && (Math.abs(o.lat - framedOrigin.lat) > 1e-6 ||
           Math.abs(o.lng - framedOrigin.lng) > 1e-6));
  if (moved) {
    frameCamera(sc.bounds);
    framedOrigin = o ? { lat: o.lat, lng: o.lng } : { lat: 0, lng: 0 };
  }

  const n = (sc.plants || []).length;
  document.getElementById('hud').innerHTML =
    `<b>Year ${sc.year}</b> &nbsp;·&nbsp; ${n} plant${n === 1 ? '' : 's'}`
    + ((sc.buildings || []).length ? ` &nbsp;·&nbsp; ${sc.buildings.length} structure footprint(s)` : '')
    + (sc.terrain ? ' &nbsp;·&nbsp; terrain' : '');
};

window.permaSetSun = function (azDeg, altDeg) { setSun(azDeg, altDeg); };

// Re-center the camera on the design on demand (the "Reset view" button) —
// the counterpart to keeping the view fixed across slider moves.
window.permaResetView = function () { frameCamera(lastBounds); };

// Legacy hook: scene3d.placed_plants_3d_state records carry lat/lng — project
// them with the cosLat metric about the last scene origin.
window.permaSetPlants = function (records) {
  if (!designGroup || !lastOrigin) return;
  const mPerDegLat = 111320.0;
  const cosLat = Math.max(1e-9, Math.cos(lastOrigin.lat * Math.PI / 180));
  const plants = (records || []).map(r => ({
    x: (r.lng - lastOrigin.lng) * mPerDegLat * cosLat,
    y: (r.lat - lastOrigin.lat) * mPerDegLat,
    height_m: r.height_m, canopy_m: r.canopy_m,
    plant_type: r.plant_type, foliage_type: r.foliage_type,
    scale_factor: r.scale_factor, spread_factor: r.spread_factor,
    spread_rate: r.spread_rate,
    color: r.color, opacity: r.presence_opacity,
  }));
  buildPlants(designGroup, plants, lastMonth, lastYear, lastTerrain);
};

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Cap rendering at ~30 fps and skip entirely while the tab/window is hidden, so
// the always-on wind sway doesn't peg a weak GPU or drain a laptop battery.
let _lastFrame = 0;
const _FRAME_MS = 1000 / 30;
renderer.setAnimationLoop((t) => {
  if (document.hidden || (t - _lastFrame) < _FRAME_MS) return;
  _lastFrame = t;
  windUniforms.uTime.value = clock.getElapsedTime();
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
