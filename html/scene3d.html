  const cap = p.plant_type === 'groundcover' ? 14 : 10;   // bound instance count
  // ~one new offspring every (3 / rate) years → continuous, year-driven spread.
  const K = Math.min(cap, Math.round(rate * (year || 0) / 3));
  if (K <= 0) return _NO_SPREAD;
  const c = Math.max(0.3, p.canopy_m);
  const reach = c * (1.4 + rate * 2.2);         // frontier grows with aggressiveness
  const base = hashPid(p.plant_id) % 97;
  const phase = (hashPid(p.plant_id) % 360) * Math.PI / 180;
  const out = [{ dx: 0, dz: 0, mul: 1 }];
  for (let k = 1; k <= K; k++) {
    const f = k / cap;                          // 0 near … 1 frontier (stable per k)
    const j = Math.sin((k + base) * 12.9898) * 43758.5453;
    const jr = 0.78 + 0.22 * (j - Math.floor(j));   // deterministic radial jitter
    const rr = reach * Math.sqrt(f) * jr;
    const ang = phase + k * _GOLDEN;
    out.push({ dx: Math.cos(ang) * rr, dz: Math.sin(ang) * rr,
               mul: 0.72 - 0.34 * f });          // newer/outer offspring are smaller
  }
  return out;
}

// Build one simple plant layer: bucket items across `variants` archetypes,
// instance each bucket (including spread offspring), scale per item via
// scaleOf(p) → [sx, sy, sz]. `noRot` keeps groundcover flat with no Y spin.
function buildLayer(list, variants, mat, archOf, scaleOf, month, year, noRot, terrain) {
  if (!list || !list.length) return;
  const buckets = Array.from({ length: variants }, () => []);
  for (const p of list) buckets[hashPid(p.plant_id) % variants].push(p);
  buckets.forEach((items, v) => {
    if (!items.length) return;
    const places = items.map(p => spreadPlacements(p, year));
    const total = places.reduce((s, pl) => s + pl.length, 0);
    const mesh = instancedMesh(archOf(v), total, mat);
    const names = new Array(total);
    let idx = 0;
    items.forEach((p, ii) => {
      const [sx, sy, sz] = scaleOf(p);
      const rotY0 = noRot ? 0 : (indHash(p) % 628) / 100;
      const col = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
      places[ii].forEach((pl, k) => {
        const m = pl.mul;
        const wx = p.x + pl.dx, wy = p.y + pl.dz;
        const rotY = noRot ? 0 : rotY0 + (k ? pl.dx : 0);
        const gy = terrainHeightAt(wx, wy, terrain);
        setInst2(mesh, idx, wx, gy, -wy,
                 sx * m, sy * (noRot ? 1 : m), sz * m, rotY, col);
        names[idx] = p.common_name || '';
        idx++;
      });
    });
    mesh.userData.pick = names;
    plantsGroup.add(mesh);
  });
}

// Shrub archetypes are profile-specific (growth form, red-stem dogwood…), so
// they're cached by (profile × variant × quality) like trees rather than the
// flat ARCH.shrub array. buildShrubGeo returns {foliageGeo, stemGeo} — the
// faceted leaf masses and the woody stems, each shaded/coloured separately.
const SHRUB_VARIANTS = 3;
const SHRUB_CACHE = new Map();
function getShrubArch(prof, v) {
  const key = prof.id + '_' + v + '_q' + QUALITY;
  let a = SHRUB_CACHE.get(key);
  if (a) return a;
  a = buildShrubGeo(mulberry32(13 + v * 97 + prof.id.charCodeAt(0) * 7), prof);
  SHRUB_CACHE.set(key, a);
  return a;
}

// Herb archetypes are growth-form specific (HERB_CACHE), cached by
// (form × variant × quality). One green geometry per form (leaves + stems +
// stalks are all herbaceous).
const HERB_VARIANTS = 3;
const HERB_CACHE = new Map();
function getHerbArch(formName, v) {
  const key = formName + '_' + v + '_q' + QUALITY;
  let a = HERB_CACHE.get(key);
  if (a) return a;
  a = buildPerennialGeo(mulberry32(29 + v * 89 + formName.charCodeAt(0) * 7),
                        HERB_FORMS[formName]);
  HERB_CACHE.set(key, a);
  return a;
}

function buildHerbLayer(list, month, year, terrain) {
  if (!list || !list.length) return;
  const buckets = {};
  for (const p of list) {
    const formName = herbFormFor(p);
    const v = hashPid(p.plant_id) % HERB_VARIANTS;
    (buckets[formName + '_' + v] = buckets[formName + '_' + v]
      || { formName, v, items: [] }).items.push(p);
  }
  for (const key in buckets) {
    const { formName, v, items } = buckets[key];
    const arch = getHerbArch(formName, v);
    const places = items.map(p => spreadPlacements(p, year));
    const total = places.reduce((s, pl) => s + pl.length, 0);
    const mesh = instancedMesh(arch, total, MATS.leaf);
    const names = new Array(total);
    let idx = 0;
    items.forEach((p, ii) => {
      const c = Math.max(0.15, p.canopy_m), h = Math.max(0.08, p.height_m);
      const rotY0 = (indHash(p) % 628) / 100;
      const col = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
      places[ii].forEach((pl, k) => {
        const m = pl.mul, x = p.x + pl.dx, wy = p.y + pl.dz;
        const rotY = rotY0 + (k ? pl.dx : 0);
        const gy = terrainHeightAt(x, wy, terrain);
        setInst2(mesh, idx, x, gy, -wy, c * m, h * m, c * m, rotY, col);
        names[idx] = p.common_name || '';
        idx++;
      });
    });
    mesh.userData.pick = names;
    plantsGroup.add(mesh);
  }
}

function buildShrubLayer(list, month, year, terrain) {
  if (!list || !list.length) return;
  const buckets = {};
  for (const p of list) {
    const prof = shrubProfileFor(p);
    const v = hashPid(p.plant_id) % SHRUB_VARIANTS;
    (buckets[prof.id + '_' + v] = buckets[prof.id + '_' + v]
      || { prof, v, items: [] }).items.push(p);
  }
  for (const key in buckets) {
    const { prof, v, items } = buckets[key];
    const arch = getShrubArch(prof, v);
    const places = items.map(p => spreadPlacements(p, year));
    const total = places.reduce((s, pl) => s + pl.length, 0);
    const foliage = instancedMesh(arch.foliageGeo, total, MATS.shrubFoliage);
    const stems = arch.stemGeo ? instancedMesh(arch.stemGeo, total, MATS.branch) : null;
    // Woody stems are bark-brown, except red-osier dogwood's signature red.
    const stemHex = prof.redStems ? '#b5402e' : '#6b5236';
    const names = new Array(total);
    let idx = 0;
    items.forEach((p, ii) => {
      const c = Math.max(0.25, p.canopy_m), h = Math.max(0.2, p.height_m);
      const rotY0 = (indHash(p) % 628) / 100;
      const col = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
      const scol = fadeToward(stemHex, p.opacity);
      places[ii].forEach((pl, k) => {
        const m = pl.mul, x = p.x + pl.dx, wy = p.y + pl.dz;
        const rotY = rotY0 + (k ? pl.dx : 0);
        const gy = terrainHeightAt(x, wy, terrain);
        setInst2(foliage, idx, x, gy, -wy, c * m, h * m, c * m, rotY, col);
        if (stems) setInst2(stems, idx, x, gy, -wy, c * m, h * m, c * m, rotY, scol);
        names[idx] = p.common_name || '';
        idx++;
      });
    });
    foliage.userData.pick = names;
    plantsGroup.add(foliage);
    if (stems) plantsGroup.add(stems);
  }
}

function buildPlants(group, plants, month, year, terrain) {
  if (plantsGroup) { disposeDesignGroup(plantsGroup); group.remove(plantsGroup); }
  plantsGroup = new THREE.Group();
  group.add(plantsGroup);
  buildArchetypes();
  ensurePlantMats();
  month = month || 6;
  year = year || 0;

  const byKind = { tree: [], shrub: [], vine: [], groundcover: [], grass: [],
                   aquatic: [], herb: [] };
  for (const p of plants || []) {
    let t = p.plant_type;
    if (t === 'sedge' || t === 'rush') t = 'grass';   // graminoids share blades
    const k = byKind[t] ? t : 'herb';
    byKind[k].push(p);
  }

  // Trees — bucketed by crown class (conifer vs deciduous) × crown form (from
  // the plant's aspect ratio: slender/oval/spreading) × maturity tier (young
  // trees are simpler) × per-individual sub-variation (so repeats of one
  // species aren't identical clones).
  if (byKind.tree.length) {
    const buckets = {};
    for (const p of byKind.tree) {
      const prof = profileFor(p);
      // A genus profile may force a needle crown (larch keeps deciduous needle-
      // drop) or a crown form, so a species reads right regardless of dimensions.
      const cls = (p.foliage_type === 'evergreen' || prof.conifer) ? 'conifer' : 'deciduous';
      const form = prof.formBias || formOf(p);
      const t = tierFor(p.scale_factor);
      const sub = indHash(p) % TREE_SUBVARS;
      const ck = cls === 'conifer' ? (prof.conifer || 'standard') : 'd';
      const key = cls + '_' + ck + '_' + prof.id + '_' + form + '_' + t + '_' + sub;
      (buckets[key] = buckets[key] || { cls, prof, form, t, sub, items: [] }).items.push(p);
    }
    for (const key in buckets) {
      const { cls, prof, form, t, sub, items } = buckets[key];
      const arch = getTreeArch(cls, prof, form, t, sub);
      const places = items.map(p => spreadPlacements(p, year));
      const total = places.reduce((s, pl) => s + pl.length, 0);
      const branch = instancedMesh(arch.branchGeo, total, MATS.branch);
      const foliage = instancedMesh(arch.foliageGeo, total, MATS.foliage);
      const names = new Array(total);
      let idx = 0;
      items.forEach((p, ii) => {
        const h = Math.max(0.4, p.height_m), c = Math.max(0.4, p.canopy_m);
        const rotY0 = (indHash(p) % 628) / 100;
        const bare = _isDecid(p.foliage_type) && _bareMonth(month);
        const bcol = fadeToward(prof.bark || '#5d4433', p.opacity);
        const fcol = fadeColor(seasonalColor(p.color, p.foliage_type, month), p.opacity);
        places[ii].forEach((pl, k) => {
          const m = pl.mul, x = p.x + pl.dx, wy = p.y + pl.dz, z = -wy;
          const rotY = rotY0 + (k ? pl.dx + pl.dz : 0);
          const gy = terrainHeightAt(x, wy, terrain);
          setInst2(branch, idx, x, gy, z, c * m, h * m, c * m, rotY, bcol);
          if (bare) setInst2(foliage, idx, x, gy, z, 0.001, 0.001, 0.001, rotY, _white);
          else setInst2(foliage, idx, x, gy, z, c * m, h * m, c * m, rotY, fcol);
          names[idx] = p.common_name || '';
          idx++;
        });
      });
      // Pick from the trunk too, so a bare-winter tree still names on hover.
      branch.userData.pick = names; foliage.userData.pick = names;
      plantsGroup.add(branch, foliage);
    }
  }

  // Shrubs — bucketed by genus profile so dogwood shows red stems, willow stands
  // upright, etc. (V1.94). One InstancedMesh per (profile × variant).
  buildShrubLayer(byKind.shrub, month, year, terrain);

  // Herbaceous plants (wildflower / herb / fern) — built to each species' growth
  // form (V1.98): fireweed erect, yarrow ferny, fleabane rosette, etc.
  buildHerbLayer(byKind.herb, month, year, terrain);

  // Grasses / sedges / rushes — dense flat-blade tufts (V1.92).
  buildLayer(byKind.grass, 3, MATS.blade, (v) => ARCH.grass[v],
             (p) => [Math.max(0.16, p.canopy_m), Math.max(0.3, p.height_m),
                     Math.max(0.16, p.canopy_m)], month, year, false, terrain);

  // Aquatic / emergent marsh plants — tall erect reed/strap-leaf clumps; the
  // cattail's brown spike comes from the flower layer (V1.92).
  buildLayer(byKind.aquatic, 3, MATS.blade, (v) => ARCH.aquatic[v],
             (p) => [Math.max(0.18, p.canopy_m), Math.max(0.5, p.height_m),
                     Math.max(0.18, p.canopy_m)], month, year, false, terrain);
  // Vines — sprawling/twining leafy stems (V1.99), not a cone.
  buildLayer(byKind.vine, 3, MATS.leaf, (v) => ARCH.vine[v],
             (p) => [Math.max(0.25, p.canopy_m), Math.max(0.2, p.height_m),
                     Math.max(0.25, p.canopy_m)], month, year, false, terrain);

  // Groundcover — low textured dome mats (no flat discs), gentle sway.
  buildLayer(byKind.groundcover, 2, MATS.ground, (v) => ARCH.ground[v],
             (p) => [Math.max(0.18, p.canopy_m),
                     Math.min(0.18, Math.max(0.05, p.height_m)),
                     Math.max(0.18, p.canopy_m)], month, year, true, terrain);

  // Contact shadows under trees and tall shrubs (skip near-vanished plants).
  const shadowed = byKind.tree
    .concat(byKind.shrub.filter(p => (p.height_m || 0) > 1.2))
    .filter(p => (p.opacity ?? 1) >= 0.2);
  if (shadowed.length) {
    const sh = instancedMesh(GEO.shadow, shadowed.length, MATS.shadow, false);
    shadowed.forEach((p, i) => {
      const c = Math.max(0.4, p.canopy_m) * 1.35;
      _v.set(p.x, 0.03, -p.y); _s.set(c, 1, c); _q.identity();
      _m.compose(_v, _q, _s);
      sh.setMatrixAt(i, _m);
    });
    plantsGroup.add(sh);
  }

  // Flowers — real-coloured blooms on plants in flower for this month (V1.90).
  buildFlowers(plants, month, terrain);
  // Fruit — berries on fleshy-fruited plants in their fruit season (V2.0).
  buildFruit(plants, month, terrain);
}

// ── Flowers (V1.90) ──────────────────────────────────────────────────────────
// Camera-facing point sprites in each plant's real flower colour, shaped by a
// per-form canvas texture so different flowers read differently. Shown only when
// the scene's month falls inside the plant's bloom window.
const FLOWER_FORMS = ['daisy', 'rays', 'spike', 'plume', 'umbel', 'globe',
                      'cluster', 'bell', 'trumpet', 'cattail', 'pea', 'whorl',
                      'star', 'cross', 'lily'];
let FLOWER_TEX = null;

function makeFlowerTexture(form) {
  const s = 64, cv = document.createElement('canvas');
  cv.width = cv.height = s;
  const g = cv.getContext('2d');
  g.clearRect(0, 0, s, s);
  g.fillStyle = '#ffffff';
  const cx = s / 2, cy = s / 2;
  const dot = (x, y, r) => { g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.fill(); };
  if (form === 'daisy') {
    const petals = 10, R = s * 0.30;          // aster ray florets
    for (let i = 0; i < petals; i++) {
      const a = i / petals * Math.PI * 2;
      g.save(); g.translate(cx + Math.cos(a) * R * 0.6, cy + Math.sin(a) * R * 0.6);
      g.rotate(a); g.beginPath();
      g.ellipse(0, 0, s * 0.20, s * 0.075, 0, 0, Math.PI * 2); g.fill(); g.restore();
    }
    g.fillStyle = 'rgba(255,255,255,0.7)'; dot(cx, cy, s * 0.12);   // dim eye
  } else if (form === 'umbel') {
    for (let i = 0; i < 16; i++) {
      const a = i * 2.39996, rr = Math.sqrt(i / 16) * s * 0.40;
      dot(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr * 0.55, s * 0.055);
    }
  } else if (form === 'spike') {
    for (let i = 0; i < 7; i++) {
      const yy = s * 0.12 + i * s * 0.115;
      const w = s * (0.16 - 0.012 * i);
      g.beginPath(); g.ellipse(cx, yy, w, s * 0.075, 0, 0, Math.PI * 2); g.fill();
    }
  } else if (form === 'bell') {
    g.beginPath();
    g.moveTo(cx - s * 0.20, cy - s * 0.18);
    g.bezierCurveTo(cx - s * 0.24, cy + s * 0.30, cx + s * 0.24, cy + s * 0.30,
                    cx + s * 0.20, cy - s * 0.18);
    g.closePath(); g.fill();
    for (let i = 0; i < 3; i++) dot(cx - s * 0.12 + i * s * 0.12, cy + s * 0.24, s * 0.05);
  } else if (form === 'rays') {            // big sunflower-style composite
    const petals = 16, R = s * 0.40;
    for (let i = 0; i < petals; i++) {
      const a = i / petals * Math.PI * 2;
      g.save(); g.translate(cx + Math.cos(a) * R * 0.5, cy + Math.sin(a) * R * 0.5);
      g.rotate(a); g.beginPath();
      g.ellipse(0, 0, s * 0.24, s * 0.07, 0, 0, Math.PI * 2); g.fill(); g.restore();
    }
    g.fillStyle = 'rgba(255,255,255,0.6)'; dot(cx, cy, s * 0.19);   // dark disc hint
  } else if (form === 'plume') {           // feathery tapering spray (goldenrod, grass)
    for (let i = 0; i < 26; i++) {
      const t = i / 26, yy = s * 0.08 + t * s * 0.84;
      const spread = s * 0.22 * (1 - t) + s * 0.03;
      dot(cx + Math.sin(i * 1.7) * spread, yy, s * 0.045 * (1 - 0.4 * t));
    }
  } else if (form === 'globe') {           // dense spherical head (allium)
    for (let i = 0; i < 22; i++) {
      const a = i * 2.39996, rr = Math.sqrt(i / 22) * s * 0.36;
      dot(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr, s * 0.055);
    }
  } else if (form === 'trumpet') {         // 5-point tubular star (columbine, honeysuckle)
    const pts = 5, Ro = s * 0.40, Ri = s * 0.16;
    g.beginPath();
    for (let i = 0; i < pts * 2; i++) {
      const a = -Math.PI / 2 + i * Math.PI / pts, r = (i % 2 ? Ri : Ro);
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i ? g.lineTo(x, y) : g.moveTo(x, y);
    }
    g.closePath(); g.fill();
    g.fillStyle = 'rgba(255,255,255,0.7)'; dot(cx, cy, s * 0.10);
  } else if (form === 'cattail') {         // brown emergent spike (Typha)
    // slim upper male spike tapering to a point
    g.beginPath();
    g.moveTo(cx - s * 0.035, s * 0.30);
    g.lineTo(cx + s * 0.035, s * 0.30);
    g.lineTo(cx + s * 0.016, s * 0.07);
    g.lineTo(cx - s * 0.016, s * 0.07);
    g.closePath(); g.fill();
    // fat female sausage with rounded ends
    const x0 = cx - s * 0.085;
    g.fillRect(x0, s * 0.34, s * 0.17, s * 0.50);
    dot(cx, s * 0.34, s * 0.085);
    dot(cx, s * 0.84, s * 0.085);
    // thin supporting stalk below
    g.fillRect(cx - s * 0.012, s * 0.84, s * 0.024, s * 0.15);
  } else if (form === 'pea') {             // legume raceme (lupine, vetch, milkvetch)
    const rows = 6;
    for (let i = 0; i < rows; i++) {
      const t = i / (rows - 1);
      const yy = s * 0.15 + t * s * 0.70;
      const w = s * (0.17 - 0.05 * t);     // wider toward the base
      g.beginPath(); g.ellipse(cx, yy - s * 0.03, w, s * 0.065, 0, 0, Math.PI * 2); g.fill();
      dot(cx - w * 0.5, yy + s * 0.03, s * 0.042);   // wings / keel
      dot(cx + w * 0.5, yy + s * 0.03, s * 0.042);
    }
  } else if (form === 'whorl') {           // tubular whorl (bee balm / Monarda)
    const florets = 14;
    for (let i = 0; i < florets; i++) {
      const a = i / florets * Math.PI * 2 + 0.2;
      const rr = s * 0.30 * (0.72 + 0.28 * (((i * 7) % 5) / 5));
      g.save(); g.translate(cx, cy); g.rotate(a); g.beginPath();
      g.ellipse(rr * 0.5, 0, s * 0.17, s * 0.032, 0, 0, Math.PI * 2); g.fill(); g.restore();
    }
    g.fillStyle = 'rgba(255,255,255,0.85)'; dot(cx, cy, s * 0.09);
  } else if (form === 'star') {            // 5 broad rounded petals (flax, geranium, phlox)
    const petals = 5, R = s * 0.34;
    for (let i = 0; i < petals; i++) {
      const a = -Math.PI / 2 + i / petals * Math.PI * 2;
      g.save(); g.translate(cx + Math.cos(a) * R * 0.52, cy + Math.sin(a) * R * 0.52);
      g.rotate(a + Math.PI / 2); g.beginPath();
      g.ellipse(0, 0, s * 0.135, s * 0.2, 0, 0, Math.PI * 2); g.fill(); g.restore();
    }
    g.fillStyle = 'rgba(255,255,255,0.6)'; dot(cx, cy, s * 0.085);
  } else if (form === 'cross') {           // 4 petals (mustard family — draba)
    const petals = 4, R = s * 0.3;
    for (let i = 0; i < petals; i++) {
      const a = i / petals * Math.PI * 2;
      g.save(); g.translate(cx + Math.cos(a) * R * 0.55, cy + Math.sin(a) * R * 0.55);
      g.rotate(a); g.beginPath();
      g.ellipse(0, 0, s * 0.17, s * 0.115, 0, 0, Math.PI * 2); g.fill(); g.restore();
    }
    dot(cx, cy, s * 0.06);
  } else if (form === 'lily') {            // 6 pointed tepals (lily, blue-eyed grass, camas)
    const tepals = 6, R = s * 0.44;
    for (let i = 0; i < tepals; i++) {
      const a = -Math.PI / 2 + i / tepals * Math.PI * 2;
      g.save(); g.translate(cx, cy); g.rotate(a);
      g.beginPath();
      g.moveTo(0, 0); g.lineTo(s * 0.07, -s * 0.13);
      g.lineTo(0, -R); g.lineTo(-s * 0.07, -s * 0.13);
      g.closePath(); g.fill(); g.restore();
    }
    g.fillStyle = 'rgba(255,255,255,0.55)'; dot(cx, cy, s * 0.08);
  } else { // cluster
    for (let i = 0; i < 11; i++) {
      const a = i * 2.39996, rr = Math.sqrt(i / 11) * s * 0.34;
      dot(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr, s * 0.10);
    }
  }
  const t = new THREE.CanvasTexture(cv);
  if (THREE.SRGBColorSpace) t.colorSpace = THREE.SRGBColorSpace;
  t.needsUpdate = true;
  return t;
}

// Clamp a point sprite's on-screen size (V2.12). sizeAttenuation has no cap,
// so a bloom right at the bee camera's nose would otherwise fill the screen as
// a giant washed-out disc. String-replace on the stock points chunk — if the
// chunk ever changes in a three bump, the material just runs unclamped.
function clampPointSize(mat, px) {
  mat.onBeforeCompile = (shader) => {
    shader.vertexShader = shader.vertexShader.replace(
      'gl_PointSize *= ( scale / - mvPosition.z );',
      'gl_PointSize *= ( scale / - mvPosition.z ); '
      + 'gl_PointSize = min( gl_PointSize, ' + px.toFixed(1) + ' );');
  };
  mat.customProgramCacheKey = () => 'pclamp' + px;
  return mat;
}

// Like clampPointSize, but each point also carries a per-sprite size multiplier
// (a required `aSize` attribute). Varying bloom sizes is the other half of the
// de-blob fix (V2.13): a plant reads as several distinct flowers of different
// sizes rather than one uniform coloured disc.
function flowerPointSize(mat, px) {
  mat.onBeforeCompile = (shader) => {
    shader.vertexShader = 'attribute float aSize;\n' + shader.vertexShader.replace(
      'gl_PointSize *= ( scale / - mvPosition.z );',
      'gl_PointSize *= ( scale / - mvPosition.z ) * aSize; '
      + 'gl_PointSize = min( gl_PointSize, ' + px.toFixed(1) + ' );');
  };
  mat.customProgramCacheKey = () => 'fsize' + px;
  return mat;
}

// Per-form bloom size + how many sprites to scatter per plant (denser = the
// plant reads as its flower colour when in bloom).
const _FLOWER_SIZE = { rays: 0.42, plume: 0.34, spike: 0.34, umbel: 0.30,
                       globe: 0.32, trumpet: 0.30, bell: 0.24, daisy: 0.24,
                       cluster: 0.26, cattail: 0.7, pea: 0.34, whorl: 0.30,
                       star: 0.28, cross: 0.22, lily: 0.34 };

function buildFlowers(plants, month, terrain) {
  if (!FLOWER_TEX) {
    FLOWER_TEX = {};
    for (const f of FLOWER_FORMS) FLOWER_TEX[f] = makeFlowerTexture(f);
  }
  const byForm = {}; FLOWER_FORMS.forEach(f => byForm[f] = []);
  for (const p of plants || []) {
    if (!p.flower_color || !byForm[p.flower_form]) continue;
    if ((p.opacity ?? 1) < 0.25) continue;            // not-yet-present plants
    const bs = p.bloom_start || 0, be = p.bloom_end || 0;
    if (!bs || month < bs || month > be) continue;     // out of bloom this month
    byForm[p.flower_form].push(p);
  }
  const _fc = new THREE.Color();
  for (const form of FLOWER_FORMS) {
    const list = byForm[form];
    if (!list.length) continue;
    const isCattail = form === 'cattail';
    const pos = [], col = [], siz = [];
    for (const p of list) {
      const gy = terrainHeightAt(p.x, p.y, terrain);
      const h = Math.max(0.1, p.height_m);
      const top = gy + h * (isCattail ? 0.96 : 0.9);
      const rad = Math.max(0.12, p.canopy_m * 0.5);
      _fc.set(p.flower_color);
      const seed = hashPid(p.plant_id || 1);
      // Fewer, better-spread heads than before: they used to pile into one
      // uniform disc. Now sqrt-spaced across the canopy for even areal density,
      // with real vertical spread + per-bloom size variation so a plant reads as
      // several distinct flowers (V2.13 de-blob).
      const n = isCattail ? 1 + (seed % 3)
              : qn(p.plant_type === 'tree' ? 10
                 : p.plant_type === 'shrub' ? 8
                 : p.plant_type === 'grass' ? 5 : 7);
      for (let k = 0; k < n; k++) {
        const j1 = ((seed + k * 97) % 997) / 997;
        const j2 = ((seed + k * 53) % 991) / 991;
        const j3 = ((seed + k * 29) % 983) / 983;
        const a = j1 * Math.PI * 2;
        const rr = isCattail ? rad * 0.22 * j2
                             : rad * (0.12 + 0.9 * Math.sqrt(j2));  // even areal spread
        const dy = isCattail ? 0 : (j3 - 0.5) * Math.max(0.14, h * 0.3);
        pos.push(p.x + Math.cos(a) * rr, top + dy, -(p.y + Math.sin(a) * rr));
        col.push(_fc.r, _fc.g, _fc.b);
        siz.push(isCattail ? 1 : 0.6 + 0.85 * (((seed + k * 17) % 100) / 100));
      }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
    geo.setAttribute('aSize', new THREE.Float32BufferAttribute(siz, 1));
    const mat = flowerPointSize(new THREE.PointsMaterial({
      map: FLOWER_TEX[form], color: 0xffffff, vertexColors: true,
      transparent: true, alphaTest: 0.4, depthWrite: false,
      // At night the blooms softly luminesce (additive) so they read like
      // moonlit / moth-pollinated flowers instead of vanishing into the dark.
      blending: sceneNight ? THREE.AdditiveBlending : THREE.NormalBlending,
      sizeAttenuation: true, size: (_FLOWER_SIZE[form] || 0.24) * (sceneNight ? 1.25 : 1),
    }), 96);
    plantsGroup.add(new THREE.Points(geo, mat));
  }
}

// ── Fruit / berries (V2.0) ───────────────────────────────────────────────────
// Fleshy-fruited plants (curated fruit_color) show clusters of berries through
// their canopy during the fruit season. A radial-gradient sprite gives each
// berry a highlit, shaded-sphere look once tinted by the real fruit colour.
let BERRY_TEX = null;
function makeBerryTexture() {
  const s = 48, cv = document.createElement('canvas');
  cv.width = cv.height = s;
  const g = cv.getContext('2d');
  const grd = g.createRadialGradient(s * 0.38, s * 0.36, s * 0.04,
                                     s * 0.5, s * 0.5, s * 0.5);
  grd.addColorStop(0, '#ffffff');
  grd.addColorStop(0.4, '#d2d2d2');
  grd.addColorStop(1, '#7e7e7e');
  g.fillStyle = grd;
  g.beginPath(); g.arc(s / 2, s / 2, s * 0.46, 0, Math.PI * 2); g.fill();
  const t = new THREE.CanvasTexture(cv);
  if (THREE.SRGBColorSpace) t.colorSpace = THREE.SRGBColorSpace;
  t.needsUpdate = true;
  return t;
}

function buildFruit(plants, month, terrain) {
  const list = [];
  for (const p of plants || []) {
    if (!p.fruit_color) continue;
    if ((p.opacity ?? 1) < 0.25) continue;
    const fs = p.fruit_start || 0, fe = p.fruit_end || 0;
    if (!fs || month < fs || month > fe) continue;     // not in fruit this month
    list.push(p);
  }
  if (!list.length) return;
  if (!BERRY_TEX) BERRY_TEX = makeBerryTexture();
  const _c = new THREE.Color();
  const pos = [], col = [];
  for (const p of list) {
    const gy = terrainHeightAt(p.x, p.y, terrain);
    const h = Math.max(0.1, p.height_m), rad = Math.max(0.1, p.canopy_m * 0.5);
    _c.set(p.fruit_color);
    const seed = hashPid(p.plant_id || 1);
    const n = qn(p.plant_type === 'tree' ? 18 : p.plant_type === 'shrub' ? 15 : 8);
    for (let k = 0; k < n; k++) {
      const a = ((seed + k * 97) % 628) / 100;
      const rr = rad * (0.2 + 0.7 * (((seed + k * 61) % 100) / 100));
      const yy = gy + h * (0.4 + 0.45 * (((seed + k * 37) % 100) / 100));   // through the canopy
      pos.push(p.x + Math.cos(a) * rr, yy, -(p.y + Math.sin(a) * rr));
      col.push(_c.r, _c.g, _c.b);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
  const mat = clampPointSize(new THREE.PointsMaterial({
    map: BERRY_TEX, color: 0xffffff, vertexColors: true,
    transparent: true, alphaTest: 0.5, depthWrite: false,
    sizeAttenuation: true, size: 0.19,
  }), 72);
  plantsGroup.add(new THREE.Points(geo, mat));
}

function buildScanPoints(group, pts) {
  // The imported yard scan as a height-tinted point layer — ground truth
  // behind the proposed design. Sampled host-side (≤ ~120k points).
  if (!pts || !pts.length) return;
  const pos = new Float32Array(pts.length * 3);
  const col = new Float32Array(pts.length * 3);
  const lo = new THREE.Color(0x4e5d52), hi = new THREE.Color(0xe8f0d8);
  const c = new THREE.Color();
  for (let i = 0; i < pts.length; i++) {
    const [x, y, z] = pts[i];
    pos[i * 3] = x; pos[i * 3 + 1] = z; pos[i * 3 + 2] = -y;
    c.copy(lo).lerp(hi, Math.max(0, Math.min(1, z / 6)));
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  group.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.08, vertexColors: true })));
}

function buildStructures(group, structures) {
  for (const s of structures || []) {
    const size = Math.max(0.3, s.size_m || 1), h = Math.max(0.3, s.height_m || 1);
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(size, h, size),
      new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.9 }));
    mesh.position.set(s.x, h / 2, -s.y);
    mesh.castShadow = mesh.receiveShadow = true;
    group.add(mesh);
  }
}

// ── Gaussian-splat backdrop (Spark) ─────────────────────────────────────────
// The splat lives OUTSIDE designGroup so a year-slider scene rebuild never
// reloads it (a yard splat is tens of MB). It is keyed by URL: ensureSplat
// only re-fetches when the file changes, otherwise just refreshes its world
// matrix + opacity from the latest scene push.

let splatMesh = null;
let splatUrl = null;

function applySplatMatrix(mesh, mat16) {
  // mat16 is column-major (three.js order) from src/splat_backdrop.world_matrix.
  mesh.matrixAutoUpdate = false;
  mesh.matrix.fromArray(mat16);
}

function ensureSplat(spec) {
  if (!spec || !spec.url) { removeSplat(); return; }
  if (!SplatMesh) return;          // Spark not loaded (yet) — skip silently
  ensureSparkRenderer();
  if (spec.url !== splatUrl) {
    removeSplat();
    try {
      splatMesh = new SplatMesh({ url: spec.url });
    } catch (e) {
      splatMesh = null; splatUrl = null;
      return;   // bad splat — design still renders
    }
    splatUrl = spec.url;
    scene.add(splatMesh);
  }
  if (splatMesh) {
    applySplatMatrix(splatMesh, spec.matrix);
    if (typeof spec.opacity === 'number' && 'opacity' in splatMesh) {
      splatMesh.opacity = spec.opacity;
    }
  }
}

function removeSplat() {
  if (splatMesh) { scene.remove(splatMesh); }
  splatMesh = null; splatUrl = null;
}

window.permaClearSplat = function () { removeSplat(); };

// Bake a north-up orthographic photo of the splat for the 2D "yard photo"
// map layer. Returns a PNG data URL synchronously (the host calls this once
// the splat has streamed in) — opts frames an exact scene-metre rectangle so
// the image maps 1:1 onto the splat's lat/lng bbox. Returns '' if not ready.
window.permaCaptureOrtho = function (opts) {
  if (!splatMesh || !opts) return '';
  const wx = Math.max(1e-3, opts.max_x - opts.min_x);
  const dz = Math.max(1e-3, opts.max_y - opts.min_y);   // north span
  const cx = (opts.min_x + opts.max_x) / 2;
  const cz = -(opts.min_y + opts.max_y) / 2;            // north → −z centre
  const cam = new THREE.OrthographicCamera(-wx / 2, wx / 2, dz / 2, -dz / 2,
                                           0.1, 2000);
  cam.position.set(cx, 800, cz);
  cam.up.set(0, 0, -1);          // north (−z) points up in the image
  cam.lookAt(cx, 0, cz);

  // Splat-only frame: hide the design + sky so the layer is just the yard.
  const designVis = designGroup ? designGroup.visible : false;
  if (designGroup) designGroup.visible = false;
  const bg = scene.background; scene.background = null;
  const skyVis = skyDome.visible; skyDome.visible = false;

  const longest = Math.round(Math.max(1, Math.min(4096, opts.width || 2048)));
  const px = wx >= dz ? longest : Math.round(longest * (wx / dz));
  const py = wx >= dz ? Math.round(longest * (dz / wx)) : longest;
  const prev = new THREE.Vector2(); renderer.getSize(prev);
  renderer.setSize(px, py, false);
  renderer.render(scene, cam);
  let url = '';
  try { url = renderer.domElement.toDataURL('image/png'); } catch (e) { url = ''; }

  // Restore the live view.
  renderer.setSize(prev.x, prev.y, false);
  scene.background = bg;
  skyDome.visible = skyVis;
  if (designGroup) designGroup.visible = designVis;
  renderer.render(scene, camera);
  return url;
};

// ── hooks ───────────────────────────────────────────────────────────────────

// Free the GPU resources a scene rebuild leaves behind. Without this the
// per-rebuild instance buffers and fresh ground/boundary/building geometries
// pile up in VRAM on every slider move until a weak GPU runs out and crashes.
// Shared archetype geometry (TREE_CACHE/ARCH/GEO) and materials (MATS) are
// reused across rebuilds, so they are skipped.
function disposeDesignGroup(group) {
  if (!group) return;
  const sharedGeo = new Set();
  for (const a of TREE_CACHE.values()) {
    if (a.branchGeo) sharedGeo.add(a.branchGeo);
    if (a.foliageGeo) sharedGeo.add(a.foliageGeo);
  }
  // Every shared archetype is reused across rebuilds and must NOT be disposed:
  // all ARCH variant arrays (peren/ground/grass/aquatic — iterate so adding or
  // removing a category never breaks this), and the per-genus shrub cache
  // (V1.94: shrubs moved out of ARCH into SHRUB_CACHE).
  if (ARCH) for (const arr of Object.values(ARCH))
    for (const g of arr) sharedGeo.add(g);
  for (const a of SHRUB_CACHE.values()) {
    if (a.foliageGeo) sharedGeo.add(a.foliageGeo);
    if (a.stemGeo) sharedGeo.add(a.stemGeo);
  }
  for (const g of HERB_CACHE.values()) sharedGeo.add(g);
  for (const k in GEO) sharedGeo.add(GEO[k]);
  const sharedMat = new Set(MATS ? Object.values(MATS) : []);
  if (GROUND_MAT) sharedMat.add(GROUND_MAT);   // shared meadow texture lives on
  group.traverse(obj => {
    if (obj.isInstancedMesh) obj.dispose();             // frees instance buffers only
    if (obj.geometry && !sharedGeo.has(obj.geometry)) obj.geometry.dispose();
    const m = obj.material;
    if (m) for (const mm of (Array.isArray(m) ? m : [m]))
      if (mm && !sharedMat.has(mm)) mm.dispose();
  });
}

// Reaching here means the whole module body executed without throwing — the
// hooks are about to register and the 8s "couldn't start" timeout will be
// cancelled. If the log shows 'module-eval-start' but not this line, something
// between the two threw (and should have surfaced via the error handler).
window._pinglog && window._pinglog('registering hooks (boot OK)');

let lastSceneObj = null;     // last full scene, so a quality change can re-render
window.permaSetScene = function (sc) {
  if (!sc || !sc.bounds) return;
  lastSceneObj = sc;
  if (designGroup) { disposeDesignGroup(designGroup); scene.remove(designGroup); }
  designGroup = new THREE.Group();
  scene.add(designGroup);
  lastOrigin = sc.origin || null;
  lastMonth = sc.month || 6;
  sceneMonth = sc.month || 6;         // bloom-gating + the seasonal-tour HUD
  sceneNight = !!sc.is_night;         // set before buildPlants so flowers night-glow
  lastYear = sc.year || 0;
  lastBounds = sc.bounds;
  lastTerrain = sc.terrain || null;

  buildGround(designGroup, sc);
  buildBoundary(designGroup, sc.boundary);
  buildBuildings(designGroup, sc.buildings);
  buildPlants(designGroup, sc.plants, sc.month, sc.year, sc.terrain);
  buildStructures(designGroup, sc.structures);
  buildScanPoints(designGroup, sc.scan_points);
  ensureSplat(sc.splat);
  if (sc.is_night) setNight();
  else { setDay(); if (sc.sun) setSun(sc.sun.azimuth_deg, sc.sun.altitude_deg); }
  fitShadow(sc.bounds);

  // Frame the camera only on first load or when a genuinely different design is
  // opened (origin moved) — a slider re-push of the same design keeps the
  // user's current orbit/zoom.
  const o = sc.origin;
  const moved = !framedOrigin ||
    (o && (Math.abs(o.lat - framedOrigin.lat) > 1e-6 ||
           Math.abs(o.lng - framedOrigin.lng) > 1e-6));
  if (moved) {
    // Don't yank the camera while the user is flying, walking, or in the
    // cinematic flyover — those modes own the camera.
    if (!beeMode && !walkMode && !cinematic) frameCamera(sc.bounds);
    framedOrigin = o ? { lat: o.lat, lng: o.lng } : { lat: 0, lng: 0 };
  }
  // Re-place the bee's flower beacons against the freshly-built scene.
  if (beeMode) rebuildBeacons();
  // Refresh walk obstacles (plants grow/shift with year & season).
  if (walkMode) buildWalkObstacles();

  const n = (sc.plants || []).length;
  document.getElementById('hud').innerHTML =
    `<b>Year ${sc.year}</b> &nbsp;·&nbsp; ${n} plant${n === 1 ? '' : 's'}`
    + ((sc.buildings || []).length ? ` &nbsp;·&nbsp; ${sc.buildings.length} structure footprint(s)` : '')
    + (sc.terrain ? ' &nbsp;·&nbsp; terrain' : '');
};

window.permaSetSun = function (azDeg, altDeg) { setSun(azDeg, altDeg); };

// Detail / quality knob (V1.94): 0 Low · 1 Medium · 2 High. Drops the cached
// archetypes (their density depends on QUALITY) and re-renders the current scene
// at the new detail. Build-time only — per-frame cost is unchanged.
window.permaSetQuality = function (level) {
  const q = Math.max(0, Math.min(2, level | 0));
  if (q === QUALITY) return;
  QUALITY = q;
  TREE_CACHE.clear();
  SHRUB_CACHE.clear();
  HERB_CACHE.clear();
  ARCH = null;
  if (lastSceneObj) permaSetScene(lastSceneObj);   // same origin → camera stays put
};

// Legacy hook: scene3d.placed_plants_3d_state records carry lat/lng — project
// them with the cosLat metric about the last scene origin.
window.permaSetPlants = function (records) {
  if (!designGroup || !lastOrigin) return;
  const mPerDegLat = 111320.0;
  const cosLat = Math.max(1e-9, Math.cos(lastOrigin.lat * Math.PI / 180));
  const plants = (records || []).map(r => ({
    x: (r.lng - lastOrigin.lng) * mPerDegLat * cosLat,
    y: (r.lat - lastOrigin.lat) * mPerDegLat,
    plant_id: r.plant_id,
    height_m: r.height_m, canopy_m: r.canopy_m,
    plant_type: r.plant_type, foliage_type: r.foliage_type,
    scale_factor: r.scale_factor, spread_factor: r.spread_factor,
    spread_rate: r.spread_rate,
    color: r.color, opacity: r.presence_opacity,
    flower_color: r.flower_color, flower_form: r.flower_form,
    bloom_start: r.bloom_start, bloom_end: r.bloom_end,
  }));
  buildPlants(designGroup, plants, lastMonth, lastYear, lastTerrain);
};

// ── "Fly as a bee" first-person mode (F37 increment 2; V2.12 nectar run) ────
// A low fly camera + bee-vision overlay + glowing nectar beacons over the
// chosen bee's floral-host plants. V2.12 turns the flight into a game: brush
// a glowing flower to collect its nectar (sparkle burst + HUD counter, F =
// autopilot to the nearest unvisited flower). Purely additive: when beeMode
// is off nothing here runs and OrbitControls owns the camera as before.
let beeMode = false;
let beeKind = 'bee';                     // 'bee' | 'butterfly' | 'moth' — picks the avatar
let beeApp = null;                       // avatar appearance spec (styles the flyer)
let beeTargetIds = new Set();            // String(plant_id) of the adult nectar plants
let beeHostIds = new Set();              // String(plant_id) of larval host plants (leps)
let beeLabel = '';                       // display name of the chosen creature (HUD)
let beaconGroup = null;
let beeBeacons = [];                     // [{key,name,pos,core,glow,beam,phase,visited}]
let beeHosts = [];                       // [{marker,glow,phase}] caterpillar-host markers
let beeVisited = new Set();              // beacon keys collected this run
let beeBursts = [];                      // live sparkle bursts [{pts,vel,t0}]
let beeAuto = null;                      // autopilot target {key,pos} | null
let tourMode = false;                    // seasonal auto-tour (host advances the month)
let sceneMonth = 6;                      // current scene month — bloom-gating + HUD
let beeMsg = '', beeMsgUntil = 0;        // transient HUD line ("nectar collected!")
let beeHudAt = 0;                        // last HUD refresh (throttled)
let beeGraceUntil = 0;                   // no collection right after spawning
let beeAvatar = null;                    // the visible flyer, parented to camera
let beeAvatarKind = '';                  // which kind the current avatar was built for
let beeBank = 0;                         // eased roll for a bit of life on turns
const beeVel = new THREE.Vector3();      // smoothed velocity (m/s) — glide, not stop
const beeKeys = new Set();
let beeYaw = 0, beePitch = -0.05;        // radians; yaw 0 → looking north (−z)
let beeDragging = false, beeLastX = 0, beeLastY = 0;
let beePrevT = 0;
const BEE_SPEED = 4.0;                    // flyer cruise (m/s) — an unhurried bee (was 7)
let beeNameSprite = null, beeNameText = '';   // floating flower-name label on approach
const _MONTHS3 = ['', 'January', 'February', 'March', 'April', 'May', 'June',
                  'July', 'August', 'September', 'October', 'November', 'December'];

// A small floating text label (canvas → sprite) used to name the flower the
// flyer is approaching. One reusable sprite; its texture is rebuilt only when
// the text changes.
function makeTextSprite() {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({
    transparent: true, depthWrite: false, depthTest: false }));
  s.renderOrder = 999;
  return s;
}
function setSpriteText(sprite, text) {
  const pad = 10, fs = 40;
  const cv = document.createElement('canvas');
  const ctx = cv.getContext('2d');
  ctx.font = '600 ' + fs + 'px system-ui, sans-serif';
  const w = Math.ceil(ctx.measureText(text).width) + pad * 2;
  const h = fs + pad * 2;
  cv.width = w; cv.height = h;
  const g = cv.getContext('2d');
  g.font = '600 ' + fs + 'px system-ui, sans-serif';
  g.textBaseline = 'middle';
  g.fillStyle = 'rgba(20,30,22,0.86)';
  const r = 12;
  g.beginPath();
  g.moveTo(r, 0); g.arcTo(w, 0, w, h, r); g.arcTo(w, h, 0, h, r);
  g.arcTo(0, h, 0, 0, r); g.arcTo(0, 0, w, 0, r); g.closePath(); g.fill();
  g.fillStyle = '#eafaea'; g.fillText(text, pad, h / 2 + 1);
  const tex = new THREE.CanvasTexture(cv);
  if (THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
  if (sprite.material.map) sprite.material.map.dispose();
  sprite.material.map = tex; sprite.material.needsUpdate = true;
  sprite.userData.aspect = w / h;   // scale is set per-frame from the view distance
}

// Is a plant in bloom for the current scene month? Drives bloom-gated nectar
// beacons (V2.12 fix — nectar was collectable even out of bloom).
function inBloomNow(p) {
  const bs = p.bloom_start || 0, be = p.bloom_end || 0;
  return bs > 0 && sceneMonth >= bs && sceneMonth <= be;
}

const _esc = (s) => String(s).replace(/[&<>"]/g,
  (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

// A small procedural bee riding low-forward of the camera — company on the
// flight, not a windshield. Styled by an appearance spec (V2.12) so the avatar
// looks like the chosen species: fuzz/dark colours, abdominal band count, body
// shape (round bumble / slender sweat / stout leafcutter), metallic sheen for
// mason & green sweat bees. Lit + emissive so it reads under any sun; wings are
// swept back, small and mostly transparent (the V2.12 fix — the old wing discs
// covered half the screen).
const _DEF_BEE_APP = { fuzz: '#d99b26', dark: '#201a14', bands: 2,
                       shape: 'round', size: 1.0, metallic: false };
function makeBeeAvatar(app) {
  app = Object.assign({}, _DEF_BEE_APP, app || {});
  const g = new THREE.Group();
  const met = app.metallic ? { metalness: 0.7, roughness: 0.35 } : {};
  const fuzz = new THREE.MeshStandardMaterial(Object.assign({ color: app.fuzz,
                 roughness: 0.9, emissive: 0x241a08, emissiveIntensity: 0.4 }, met));
  const dark = new THREE.MeshStandardMaterial(Object.assign({ color: app.dark,
                 roughness: 0.85, emissive: 0x100c08, emissiveIntensity: 0.4 }, met));
  const sphere = (r) => new THREE.SphereGeometry(r, 14, 10);
  // Body shape: abdomen elongation + girth by growth form.
  const shp = app.shape === 'slender' ? [0.82, 0.8, 1.7]
            : app.shape === 'stout'   ? [1.02, 0.95, 1.2]
            : [0.92, 0.88, 1.45];                                 // round
  const thorax = new THREE.Mesh(sphere(0.5), fuzz); thorax.scale.set(1, 0.9, 1);
  const head = new THREE.Mesh(sphere(0.32), dark); head.position.set(0, 0, -0.62);
  g.add(thorax, head);
  const antGeo = new THREE.CylinderGeometry(0.018, 0.018, 0.4, 5);
  for (const s of [-1, 1]) {
    const a = new THREE.Mesh(antGeo, dark);
    a.position.set(0.1 * s, 0.16, -0.82); a.rotation.set(-0.9, 0, 0.25 * s);
    g.add(a);
  }
  const abdomen = new THREE.Mesh(sphere(0.55), dark);
  abdomen.scale.set(shp[0], shp[1], shp[2]); abdomen.position.set(0, -0.03, 0.8);
  g.add(abdomen);
  // Abdominal bands (0–3): alternating fuzz stripes down the abdomen.
  const nb = Math.max(0, Math.min(3, app.bands | 0));
  for (let i = 0; i < nb; i++) {
    const band = new THREE.Mesh(sphere(0.57), fuzz);
    band.scale.set(shp[0] * 1.02, shp[1] * 1.02, 0.34);
    band.position.set(0, -0.03, 0.5 + i * 0.45);
    g.add(band);
  }
  const tip = new THREE.Mesh(sphere(0.3), app.cuckoo ? fuzz : dark);
  tip.scale.set(0.9, 0.85, 1.1); tip.position.set(0, -0.04, 0.8 + shp[2] * 0.35);
  g.add(tip);
  const wingGeo = new THREE.CircleGeometry(0.55, 12);
  const wingM = new THREE.MeshBasicMaterial({ color: 0xe8f1fa, transparent: true,
                 opacity: 0.22, side: THREE.DoubleSide, depthWrite: false });
  const wings = [];
  for (const s of [-1, 1]) {
    const pivot = new THREE.Group();
    pivot.position.set(0.14 * s, 0.38, 0.05);
    const w = new THREE.Mesh(wingGeo, wingM);
    w.scale.set(0.5, 1.0, 1); w.position.set(0.42 * s, 0.05, 0.18);
    w.rotation.set(-1.15, 0, 0.25 * s);        // swept back, near-flat
    pivot.add(w); g.add(pivot);
    wings.push({ pivot, sign: s });
  }
  g.userData.wings = wings;
  g.userData.flap = { base: 0.2, amp: 0.75, speed: 0.09 };   // fast bee flutter
  g.scale.setScalar(0.2 * (0.82 + 0.32 * (app.size || 1)));
  return g;
}

// A butterfly (or drab moth) riding low-forward of the camera. Two wing pairs
// per side on a slim body; the wings flap up and down with a graceful, slower
// beat than the bee. Colours: butterflies get a warm patterned upper wing, moths
// a muted tan/grey. Lit + emissive so the flyer reads under any sun angle.
function makeButterflyAvatar(moth, app) {
  const g = new THREE.Group();
  const bodyM = new THREE.MeshStandardMaterial({ color: moth ? 0x4a3d2e : 0x2a2320,
                 roughness: 0.85, emissive: 0x140f0a, emissiveIntensity: 0.5 });
  const _c = (hex, fb) => (hex ? new THREE.Color(hex).getHex() : fb);
  const foreCol = _c(app && app.fore, moth ? 0xb8a274 : 0xe6912f);   // upper wing
  const hindCol = _c(app && app.hind, moth ? 0x9c8763 : 0xd8701f);   // lower wing
  const edge = _c(app && app.edge, moth ? 0x5c4a30 : 0x2a1c10);
  const wingMat = (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.7,
                    emissive: c, emissiveIntensity: 0.28, side: THREE.DoubleSide,
                    flatShading: true });
  const sphere = (r) => new THREE.SphereGeometry(r, 12, 9);
  // slim segmented body along -z (head) .. +z (abdomen)
  const thorax = new THREE.Mesh(sphere(0.16), bodyM); thorax.scale.set(1, 1, 1.4);
  const head = new THREE.Mesh(sphere(0.12), bodyM); head.position.set(0, 0.02, -0.28);
  const abd = new THREE.Mesh(sphere(0.13), bodyM);
  abd.scale.set(0.8, 0.8, 2.6); abd.position.set(0, -0.01, 0.4);
  g.add(thorax, head, abd);
  const antGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.32, 4);
  const clubGeo = new THREE.SphereGeometry(0.03, 6, 5);
  for (const s of [-1, 1]) {
    const a = new THREE.Mesh(antGeo, bodyM);
    a.position.set(0.06 * s, 0.08, -0.42); a.rotation.set(-0.7, 0, 0.28 * s);
    g.add(a);
    if (!moth) {                                  // clubbed tips = butterfly
      const c = new THREE.Mesh(clubGeo, bodyM);
      c.position.set(0.13 * s, 0.2, -0.54); g.add(c);
    }
  }
  // A wing = fore + hind lobe, built flat in the XZ plane then hung off a pivot
  // on the body midline so it flaps around the forward (z) axis.
  const foreGeo = new THREE.CircleGeometry(0.42, 16).rotateX(-Math.PI / 2);
  const hindGeo = new THREE.CircleGeometry(0.30, 14).rotateX(-Math.PI / 2);
  const wings = [];
  for (const s of [-1, 1]) {
    const pivot = new THREE.Group();
    const fore = new THREE.Mesh(foreGeo, wingMat(foreCol));
    fore.scale.set(0.85, 1, moth ? 0.7 : 0.95);
    fore.position.set(0.42 * s, 0, -0.1);
    const hind = new THREE.Mesh(hindGeo, wingMat(hindCol));
    hind.scale.set(0.9, 1, 1.05);
    hind.position.set(0.4 * s, -0.01, 0.3);
    const rim = new THREE.Mesh(new THREE.RingGeometry(0.35, 0.42, 18).rotateX(-Math.PI / 2),
                  new THREE.MeshBasicMaterial({ color: edge, side: THREE.DoubleSide,
                    transparent: true, opacity: 0.5 }));
    rim.position.set(0.42 * s, 0.002, -0.1); rim.scale.set(0.85, 1, 0.95);
    pivot.add(fore, hind, rim);
    g.add(pivot);
    wings.push({ pivot, sign: s });
  }
  g.userData.wings = wings;
  // Rest angled downward so the wings frame the lower view rather than fill it;
  // moths beat faster + shallower, butterflies a big slow graceful flap.
  g.userData.flap = moth ? { base: -0.45, amp: 0.75, speed: 0.055 }
                         : { base: -0.6, amp: 1.05, speed: 0.028 };
  g.scale.setScalar(moth ? 0.42 : 0.46);
  return g;
}

// (Re)build the avatar for the current beeKind + appearance and park it
// low-forward of the camera. Cached by a signature so switching creatures
// rebuilds, but a same-creature re-push doesn't.
function ensureAvatar() {
  const sig = beeKind + '|' + (beeApp ? JSON.stringify(beeApp) : '');
  if (beeAvatar && beeAvatarKind === sig) return;
  if (beeAvatar) { camera.remove(beeAvatar); disposeObject(beeAvatar); }
  beeAvatar = beeKind === 'bee' ? makeBeeAvatar(beeApp)
            : makeButterflyAvatar(beeKind === 'moth', beeApp);
  beeAvatar.position.set(0, beeKind === 'bee' ? -0.42 : -0.86,
                            beeKind === 'bee' ? -1.1 : -1.5);
  beeAvatarKind = sig;
  camera.add(beeAvatar);
}

function disposeObject(root) {
  root.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) for (const m of (Array.isArray(o.material) ? o.material : [o.material]))
      m && m.dispose();
  });
}
const _BEE_MOVE_CODES = new Set([
  'KeyW', 'KeyA', 'KeyS', 'KeyD', 'KeyQ', 'KeyE',
  'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'ShiftLeft']);

function groundAtCamera() {
  // terrainHeightAt expects (x_east, y_north); world z = −y_north.
  return terrainHeightAt(camera.position.x, -camera.position.z, lastTerrain);
}

// Soft radial glow sprite texture, shared by beacons + sparkle bursts.
let GLOW_TEX = null;
function makeGlowTexture() {
  const s = 64, cv = document.createElement('canvas');
  cv.width = cv.height = s;
  const g = cv.getContext('2d');
  const grd = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  grd.addColorStop(0, 'rgba(255,255,255,1)');
  grd.addColorStop(0.35, 'rgba(255,255,255,.55)');
  grd.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grd; g.fillRect(0, 0, s, s);
  const t = new THREE.CanvasTexture(cv);
  if (THREE.SRGBColorSpace) t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function disposeBeacons() {
  if (beaconGroup) {
    scene.remove(beaconGroup);
    beaconGroup.traverse(o => {
      // Sprites share one three.js-internal geometry — never dispose that.
      if (o.geometry && !o.isSprite) o.geometry.dispose();
      if (o.material) o.material.dispose();    // GLOW_TEX itself is shared & kept
    });
    beaconGroup = null;
  }
  beeBeacons = [];
  beeHosts = [];
}

// Nectar beacons (V2.12): a small warm core + an additive glow sprite + a faint
// light beam rising over each nectar plant — readable across a meadow without
// looking like a second sun. BLOOM-GATED: a plant only beacons in the months it
// actually flowers (the V2.12 fix — nectar used to be collectable year-round).
// Butterflies/moths also get low green "caterpillar nursery" markers over their
// larval host plants (present-gated, never collectable).
function rebuildBeacons() {
  disposeBeacons();
  if (!beeMode || !lastSceneObj) { updateBeeHud(); return; }
  if (beeTargetIds.size === 0 && beeHostIds.size === 0) { updateBeeHud(); return; }
  if (!GLOW_TEX) GLOW_TEX = makeGlowTexture();
  beaconGroup = new THREE.Group();
  const coreGeo = new THREE.SphereGeometry(0.12, 10, 8);
  const beamGeo = new THREE.CylinderGeometry(0.03, 0.10, 2.6, 6, 1, true);
  const hostGeo = new THREE.IcosahedronGeometry(0.16, 0);
  for (const p of (lastSceneObj.plants || [])) {
    if ((p.opacity ?? 1) < 0.25) continue;     // not yet present this year
    const pid = String(p.plant_id);
    const x = p.x, wy = p.y, z = -wy;
    const gy = terrainHeightAt(x, wy, lastTerrain);
    const isNectar = beeTargetIds.has(pid) && inBloomNow(p);   // BLOOM-GATED
    if (isNectar) {
      const top = gy + Math.max(0.4, p.height_m || 0.6) + 0.35;
      const pos = new THREE.Vector3(x, top, z);
      const core = new THREE.Mesh(coreGeo, new THREE.MeshBasicMaterial({
        color: 0xffd75e, transparent: true, opacity: 0.95 }));
      core.position.copy(pos);
      const glow = new THREE.Sprite(new THREE.SpriteMaterial({
        map: GLOW_TEX, color: 0xffc94d, transparent: true, opacity: 0.75,
        blending: THREE.AdditiveBlending, depthWrite: false }));
      glow.position.copy(pos); glow.scale.setScalar(1.5);
      const beam = new THREE.Mesh(beamGeo, new THREE.MeshBasicMaterial({
        color: 0xffd75e, transparent: true, opacity: 0.10, side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending, depthWrite: false }));
      beam.position.set(x, top + 1.1, z);
      beaconGroup.add(core, glow, beam);
      const b = { key: pid + '@' + x + ',' + wy,
                  name: p.common_name || 'flower', pos, core, glow, beam,
                  phase: (hashPid(p.plant_id) % 100) / 16, visited: false };
      if (beeVisited.has(b.key)) styleBeaconVisited(b);
      beeBeacons.push(b);
    } else if (beeHostIds.has(pid)) {
      // Caterpillar host: a low green faceted marker + soft green glow. (Skip if
      // this plant is also a live nectar beacon this month — that took priority.)
      const top = gy + Math.min(1.4, Math.max(0.35, (p.height_m || 0.6) * 0.6));
      const pos = new THREE.Vector3(x, top, z);
      const marker = new THREE.Mesh(hostGeo, new THREE.MeshStandardMaterial({
        color: 0x6ab04a, roughness: 0.6, emissive: 0x1f4d1a,
        emissiveIntensity: 0.6, flatShading: true }));
      marker.position.copy(pos);
      const glow = new THREE.Sprite(new THREE.SpriteMaterial({
        map: GLOW_TEX, color: 0x8fe06a, transparent: true, opacity: 0.4,
        blending: THREE.AdditiveBlending, depthWrite: false }));
      glow.position.copy(pos); glow.scale.setScalar(0.9);
      beaconGroup.add(marker, glow);
      beeHosts.push({ marker, glow, pos, phase: (hashPid(p.plant_id) % 100) / 16 });
    }
  }
  // A vanished autopilot target (its bloom ended on a month change) is dropped.
  if (beeAuto && !beeBeacons.some(b => b.key === beeAuto.key)) beeAuto = null;
  scene.add(beaconGroup);
  updateBeeHud();
}

function styleBeaconVisited(b) {
  b.visited = true;
  b.core.material.color.set(0x9fd68a);
  b.core.material.opacity = 0.55;
  b.glow.material.color.set(0x9fd68a);
  b.glow.material.opacity = 0.12;
  b.glow.scale.setScalar(0.45);
  b.beam.visible = false;
}

function collectBeacon(b, t) {
  styleBeaconVisited(b);
  beeVisited.add(b.key);
  spawnBurst(b.pos, t);
  if (beeAuto && beeAuto.key === b.key) beeAuto = null;
  const got = beeBeacons.filter(x => x.visited).length;
  if (got < beeBeacons.length) {           // else the standard line celebrates
    beeMsg = '🌼 <b>' + _esc(b.name) + '</b> — nectar collected!';
    beeMsgUntil = t + 2000;
  } else { beeMsg = ''; beeMsgUntil = 0; }
  updateBeeHud(t);
}

// A short-lived sparkle burst where the nectar was collected.
function spawnBurst(pos, t) {
  const n = 26, arr = new Float32Array(n * 3), vel = [];
  for (let i = 0; i < n; i++) {
    arr[i * 3] = pos.x; arr[i * 3 + 1] = pos.y; arr[i * 3 + 2] = pos.z;
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    const sp = 0.8 + Math.random() * 1.6;
    vel.push(new THREE.Vector3(Math.sin(ph) * Math.cos(th) * sp,
                               Math.cos(ph) * sp * 0.8 + 0.6,
                               Math.sin(ph) * Math.sin(th) * sp));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  const pts = new THREE.Points(geo, clampPointSize(new THREE.PointsMaterial({
    map: GLOW_TEX, color: 0xffe28a, size: 0.16, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false,
    sizeAttenuation: true }), 72));
  scene.add(pts);
  beeBursts.push({ pts, vel, t0: t });
}

function stepBursts(t, dt) {
  for (let i = beeBursts.length - 1; i >= 0; i--) {
    const b = beeBursts[i], age = (t - b.t0) / 900;
    if (age >= 1) {
      scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose();
      beeBursts.splice(i, 1);
      continue;
    }
    const pos = b.pts.geometry.attributes.position;
    for (let k = 0; k < b.vel.length; k++) {
      b.vel[k].y -= 2.2 * dt;                          // a little gravity
      pos.setXYZ(k, pos.getX(k) + b.vel[k].x * dt,
                    pos.getY(k) + b.vel[k].y * dt,
                    pos.getZ(k) + b.vel[k].z * dt);
    }
    pos.needsUpdate = true;
    b.pts.material.opacity = 1 - age;
  }
}
function clearBursts() {
  for (const b of beeBursts) {
    scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose();
  }
  beeBursts = [];
}

// ── nectar HUD ──────────────────────────────────────────────────────────────
const _ARROWS = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];

function nearestUnvisited() {
  let best = null, bd = Infinity;
  for (const b of beeBeacons) {
    if (b.visited) continue;
    const d = camera.position.distanceTo(b.pos);
    if (d < bd) { bd = d; best = b; }
  }
  return best ? { b: best, d: bd } : null;
}

const _CREATURE_ICON = { bee: '🐝', butterfly: '🦋', moth: '🌙' };

function updateBeeHud(t) {
  const h = document.getElementById('bee-hint');
  if (!h || !beeMode) return;
  if (beeMsg && (t ?? performance.now()) < beeMsgUntil) { h.innerHTML = beeMsg; return; }
  const icon = _CREATURE_ICON[beeKind] || '🐝';
  const who = _esc(beeLabel) || 'this pollinator';
  const controls = 'WASD fly · Q/E up-down · drag to look';
  const hostHint = beeHosts.length ? ' · 🌿 green = caterpillar host' : '';
  const total = beeBeacons.length;
  const got = beeBeacons.filter(b => b.visited).length;

  // Seasonal tour: show the month and the running nectar tally.
  if (tourMode) {
    h.innerHTML = '🌸 <b>Touring the year</b> — ' + _MONTHS3[sceneMonth]
      + ' · ' + icon + ' ' + who + ' · nectar collected ' + beeVisited.size
      + hostHint + ' · toggle <b>Tour</b> off to fly yourself';
    return;
  }

  if (!total) {
    // No collectable nectar THIS MONTH. Distinguish "not in bloom now" from
    // "adult doesn't feed" (non-feeding moths) from "no nectar plants at all".
    if (beeTargetIds.size > 0) {
      h.innerHTML = icon + ' <b>' + who + '</b> — nothing it drinks from is in bloom in '
        + _MONTHS3[sceneMonth] + '. Try <b>🌸 Tour the year</b> or the season slider.'
        + hostHint;
    } else if (beeHostIds.size > 0) {
      h.innerHTML = icon + ' <b>' + who + '</b> doesn\'t feed as an adult — the 🌿 green '
        + 'markers are its caterpillar host plants. ' + controls;
    } else {
      h.innerHTML = icon + ' <b>' + who + '</b> — no plants for it in this design yet · '
        + controls;
    }
    return;
  }
  if (got >= total) {
    h.innerHTML = '🎉 <b>All ' + total + ' bloom' + (total === 1 ? '' : 's')
      + ' visited!</b> This design feeds ' + who + ' in ' + _MONTHS3[sceneMonth]
      + '.' + hostHint;
    return;
  }
  // Relative bearing to the nearest unvisited flower → an 8-way arrow.
  const nu = nearestUnvisited();
  const dx = nu.b.pos.x - camera.position.x, dz = nu.b.pos.z - camera.position.z;
  const brg = Math.atan2(dx, -dz) - beeYaw;
  const idx = ((Math.round(brg / (Math.PI / 4)) % 8) + 8) % 8;
  h.innerHTML = icon + ' <b>Nectar ' + got + '/' + total + '</b> · nearest '
    + Math.max(1, Math.round(nu.d)) + ' m ' + _ARROWS[idx] + ' · ' + controls
    + ' · <b>F</b> = fly me there' + hostHint;
}

// The overlay tint is a bee-specific "UV goggles" cue; butterflies/moths get a
// plain soft vignette instead (no false claim about their colour vision).
function setBeeVisionUI(on) {
  const v = document.getElementById('bee-vision');
  const h = document.getElementById('bee-hint');
  if (v) {
    v.style.display = on ? 'block' : 'none';
    v.style.background = beeKind === 'bee' ? '' :
      'radial-gradient(ellipse 84% 84% at center,' +
      ' rgba(0,0,0,0) 58%, rgba(20,28,40,.40) 100%)';
  }
  if (h) h.style.display = on ? 'block' : 'none';
}

// Spawn at the design centre, flower height, facing the nearest target so the
// first glowing flower is on screen immediately (also the bee-mode Reset view).
function beeSpawn() {
  if (lastBounds) {
    const cx = (lastBounds.min_x + lastBounds.max_x) / 2;
    const cz = -(lastBounds.min_y + lastBounds.max_y) / 2;
    camera.position.set(cx, 0, cz + 6);
  }
  beeYaw = 0; beePitch = -0.05;
  camera.position.y = groundAtCamera() + 1.6;   // flower-and-a-bit height
  beeVel.set(0, 0, 0);
  beeAuto = null;
  beeGraceUntil = performance.now() + 800;
  const nu = nearestUnvisited();
  if (nu) beeYaw = Math.atan2(nu.b.pos.x - camera.position.x,
                              -(nu.b.pos.z - camera.position.z));
}

function enterBeeMode() {
  controls.enabled = false;
  beeVisited.clear();                 // every flight is a fresh nectar run
  beeMsg = ''; beeMsgUntil = 0;
  beePrevT = 0;
  ensureAvatar();
  beeAvatar.visible = true;
  setBeeVisionUI(true);
  if (!beeNameSprite) { beeNameSprite = makeTextSprite(); scene.add(beeNameSprite); }
  beeNameSprite.visible = false; beeNameText = '';
  if (wildlifeGroup) wildlifeGroup.visible = false;   // focus on the flown creature
  if (spotGroup) spotGroup.visible = false;           // the spotlight is orbit/walk-only
  rebuildBeacons();
  beeSpawn();
  updateBeeHud();
}

function exitBeeMode() {
  beeKeys.clear();
  beeDragging = false;
  beeAuto = null;
  tourMode = false;
  clearBursts();
  if (beeAvatar) beeAvatar.visible = false;
  if (beeNameSprite) beeNameSprite.visible = false;
  setBeeVisionUI(false);
  rebuildBeacons();                 // beeMode is false now → clears the beacons
  if (wildlifeGroup) wildlifeGroup.visible = true;   // wildlife returns in orbit
  if (spotGroup) spotGroup.visible = true;           // spotlight returns too
  controls.enabled = true;
  if (lastBounds) frameCamera(lastBounds);   // back to a sensible orbit
  else controls.update();
}

// F = autopilot: glide to the nearest unvisited flower (any move key cancels).
function startBeeAutopilot() {
  const nu = nearestUnvisited();
  if (!nu) return;
  beeAuto = { key: nu.b.key, pos: nu.b.pos.clone() };
  beeMsg = '🐝 Flying you to <b>' + _esc(nu.b.name) + '</b>…';
  beeMsgUntil = performance.now() + 1400;
  updateBeeHud();
}

// Shortest-arc angle step, capped at maxStep — the autopilot's easing turn.
function _turnToward(a, b, maxStep) {
  let d = (b - a) % (Math.PI * 2);
  if (d > Math.PI) d -= Math.PI * 2;
  if (d < -Math.PI) d += Math.PI * 2;
  return a + Math.max(-maxStep, Math.min(maxStep, d));
}

function beeStep(t) {
  const dt = beePrevT ? Math.min(0.05, (t - beePrevT) / 1000) : 0.016;
  beePrevT = t;

  if (beeAuto && beeKeys.size) beeAuto = null;   // manual input takes over
  // Seasonal tour: keep auto-hopping to the nearest unvisited bloom (silent — the
  // HUD shows the touring state). The host advances the month underneath us.
  if (tourMode && !beeAuto && beeKeys.size === 0) {
    const nu = nearestUnvisited();
    if (nu) beeAuto = { key: nu.b.key, pos: nu.b.pos.clone() };
  }
  const want = new THREE.Vector3();
  let strafe = 0;
  if (beeAuto) {
    // Ease yaw/pitch toward the target flower and fly at it, slowing on approach.
    const d = new THREE.Vector3().subVectors(beeAuto.pos, camera.position);
    const dist = d.length();
    if (dist < 1.2) beeAuto = null;              // collection radius takes it
    else {
      beeYaw = _turnToward(beeYaw, Math.atan2(d.x, -d.z), 1.9 * dt);
      beePitch = _turnToward(beePitch,
        Math.asin(Math.max(-1, Math.min(1, d.y / dist))), 1.3 * dt);
      // Ease right down as it nears the flower so the arrival reads, not blurs.
      want.copy(d).normalize().multiplyScalar(Math.min(BEE_SPEED, 1.1 + dist * 0.7));
    }
  }
  const cp = Math.cos(beePitch), sp = Math.sin(beePitch);
  const dir = new THREE.Vector3(Math.sin(beeYaw) * cp, sp, -Math.cos(beeYaw) * cp);
  if (!beeAuto && want.lengthSq() === 0) {
    const right = new THREE.Vector3().crossVectors(dir, _yAxis).normalize();
    if (beeKeys.has('KeyW') || beeKeys.has('ArrowUp'))    want.add(dir);
    if (beeKeys.has('KeyS') || beeKeys.has('ArrowDown'))  want.addScaledVector(dir, -1);
    if (beeKeys.has('KeyD') || beeKeys.has('ArrowRight')) { want.add(right); strafe += 1; }
    if (beeKeys.has('KeyA') || beeKeys.has('ArrowLeft'))  { want.addScaledVector(right, -1); strafe -= 1; }
    if (beeKeys.has('KeyE') || beeKeys.has('Space'))      want.y += 1;
    if (beeKeys.has('KeyQ') || beeKeys.has('ShiftLeft'))  want.y -= 1;
    if (want.lengthSq() > 0) want.normalize().multiplyScalar(BEE_SPEED);
  }
  // Smoothed velocity: the bee glides and settles instead of stopping dead.
  beeVel.lerp(want, 1 - Math.exp(-6 * dt));
  camera.position.addScaledVector(beeVel, dt);
  camera.position.y += Math.sin(t * 0.004) * 0.006;   // gentle idle bob
  const g = groundAtCamera() + 0.3;                   // never sink below ground
  if (camera.position.y < g) camera.position.y = g;
  camera.lookAt(camera.position.x + dir.x,
                camera.position.y + dir.y,
                camera.position.z + dir.z);
  // Bank into strafes — fully on the bee, softly on the camera for flight feel.
  beeBank += ((-0.35 * strafe) - beeBank) * Math.min(1, dt * 6);
  camera.rotateZ(beeBank * 0.35);

  // Animate the visible flyer: wingbeat (per-kind rate/amplitude) + a hover bob.
  if (beeAvatar && beeAvatar.visible) {
    const fp = beeAvatar.userData.flap;
    const flap = fp.base + (0.5 + 0.5 * Math.sin(t * fp.speed)) * fp.amp;
    for (const { pivot, sign } of beeAvatar.userData.wings) pivot.rotation.z = sign * flap;
    beeAvatar.position.y = (beeKind === 'bee' ? -0.42 : -0.86) + Math.sin(t * 0.006) * 0.03;
    beeAvatar.rotation.z = beeBank;
  }

  // Nectar collection: brush a glowing flower to collect it. A short grace
  // window after spawning stops a flower under the spawn point from being
  // collected before the player has even moved.
  if (t > beeGraceUntil)
    for (const b of beeBeacons)
      if (!b.visited && camera.position.distanceTo(b.pos) < 1.25) collectBeacon(b, t);
  stepBursts(t, dt);

  // Reveal the flower's name as the flyer approaches it: a floating label over
  // the nearest unvisited bloom within ~3.5 m (the flower the flyer is heading
  // for). The collect callout still names it on arrival.
  if (beeNameSprite) {
    const nu = nearestUnvisited();
    if (nu && nu.d < 4.0) {
      if (beeNameText !== nu.b.name) { beeNameText = nu.b.name; setSpriteText(beeNameSprite, nu.b.name); }
      // Constant on-screen size: world height scales with the view distance so
      // the label reads the same near or far (never fills the screen up close).
      const hh = 0.052 * Math.max(1.2, nu.d);
      beeNameSprite.scale.set((beeNameSprite.userData.aspect || 4) * hh, hh, 1);
      beeNameSprite.position.set(nu.b.pos.x, nu.b.pos.y + 0.45 + hh * 0.6, nu.b.pos.z);
      beeNameSprite.material.opacity = Math.max(0, Math.min(1, (4.0 - nu.d) / 1.6));
      beeNameSprite.visible = true;
    } else {
      beeNameSprite.visible = false;
    }
  }

  // Pulse the unvisited glows; float the cores gently. Everything melts away
  // as the bee arrives (nearFade) — a marker 0.6 m from the camera would
  // otherwise fill half the screen — and the additive glow/beam also dim with
  // proximity so a close beacon never washes the view white.
  for (const b of beeBeacons) {
    const d = camera.position.distanceTo(b.pos);
    const nearFade = Math.max(0, Math.min(1, (d - 0.7) / 1.1));
    if (b.visited) {
      b.core.material.opacity = 0.55 * nearFade;
      b.glow.material.opacity = 0.12 * nearFade;
      continue;
    }
    const near = Math.max(0.3, Math.min(1, d / 6));
    b.glow.scale.setScalar(1.5 * near * (1 + 0.16 * Math.sin(t * 0.005 + b.phase)));
    b.glow.material.opacity = 0.75 * Math.max(0.35, Math.min(1, d / 5)) * nearFade;
    b.beam.material.opacity = 0.10 * Math.max(0.25, Math.min(1, d / 6)) * nearFade;
    b.core.material.opacity = 0.95 * nearFade;
    b.core.position.y = b.pos.y + Math.sin(t * 0.0035 + b.phase) * 0.08;
  }
  // Caterpillar-host markers: slow spin + a gentle green pulse.
  for (const hst of beeHosts) {
    hst.marker.rotation.y += dt * 0.7;
    hst.marker.position.y = hst.pos.y + Math.sin(t * 0.003 + hst.phase) * 0.05;
    hst.glow.scale.setScalar(0.9 * (1 + 0.18 * Math.sin(t * 0.004 + hst.phase)));
  }

  if (t - beeHudAt > 200) { beeHudAt = t; updateBeeHud(t); }
}

addEventListener('keydown', (e) => {
  if (!beeMode) return;
  if (e.code === 'KeyF') { startBeeAutopilot(); e.preventDefault(); return; }
  if (_BEE_MOVE_CODES.has(e.code)) { beeKeys.add(e.code); e.preventDefault(); }
});
addEventListener('keyup', (e) => { beeKeys.delete(e.code); });
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (!beeMode) return;
  beeDragging = true; beeLastX = e.clientX; beeLastY = e.clientY;
});
addEventListener('pointerup', () => { beeDragging = false; });
renderer.domElement.addEventListener('pointermove', (e) => {
  if (!beeMode || !beeDragging) return;
  beeAuto = null;                                  // drag-look takes over
  beeYaw += (e.clientX - beeLastX) * 0.005;
  beePitch = Math.max(-1.4, Math.min(1.4, beePitch - (e.clientY - beeLastY) * 0.005));
  beeLastX = e.clientX; beeLastY = e.clientY;
});

window.permaSetBeeMode = function (on) {
  const want = !!on;
  if (want === beeMode) return;
  beeMode = want;
  if (beeMode) enterBeeMode(); else exitBeeMode();
};
// Set the chosen pollinator's plants + avatar kind. ``ids`` are adult nectar
// plants (bloom-gated beacons); ``hostIds`` are larval hosts (butterflies/moths)
// shown as green nursery markers; ``kind`` picks the flying avatar.
window.permaSetBeeTargets = function (ids, label, kind, hostIds, appearance) {
  beeTargetIds = new Set((ids || []).map(String));
  beeHostIds = new Set((hostIds || []).map(String));
  beeLabel = String(label || '');
  beeApp = appearance || null;
  const k = (kind === 'butterfly' || kind === 'moth') ? kind : 'bee';
  beeKind = k;
  if (beeMode) { ensureAvatar(); beeAvatar.visible = true; setBeeVisionUI(true); }
  beeVisited.clear();                 // a new creature starts a fresh nectar run
  beeAuto = null;
  rebuildBeacons();
};

// Toggle the seasonal nectar tour: the flyer auto-hops flower to flower while
// the host advances the scene month, so blooms come and go across the year.
window.permaSetBeeTour = function (on) {
  tourMode = !!on;
  if (!tourMode) beeAuto = null;
  updateBeeHud();
};

// Reset view — registered for BOTH callers (the 3D window's "Reset view"
// button and the sprite gallery); before V2.12 this hook was never defined,
// so the button silently did nothing. In fly mode it re-spawns the flyer.
window.permaResetView = function () {
  if (beeMode) { beeSpawn(); updateBeeHud(); return; }
  if (walkMode) { walkSpawn(); return; }
  if (lastBounds) frameCamera(lastBounds);
};

// ── Ambient wildlife (V2.12) ─────────────────────────────────────────────────
// The animals the design's plants support, placed on/near a plant they use and
// drawn to look like their real species (from src/scene_wildlife.py). Shown in
// the orbit + walk views; hidden while flying as one creature. A separate group
// (like the beacons) so a scene rebuild doesn't dispose it — the host re-pushes
// wildlife after each scene push.
let WILDLIFE = [];
let wildlifeGroup = null;
let wildlifeCritters = [];

function _cmat(hex, opts) {
  opts = opts || {};
  const c = new THREE.Color(hex);
  return new THREE.MeshStandardMaterial({
    color: c, roughness: opts.metal ? 0.35 : 0.82, metalness: opts.metal ? 0.7 : 0.0,
    emissive: c.clone().multiplyScalar(0.28), emissiveIntensity: 0.6,
    flatShading: !!opts.flat });
}
function _wingMat(hex) {
  return new THREE.MeshBasicMaterial({ color: new THREE.Color(hex || 0xeef4f8),
    transparent: true, opacity: 0.3, side: THREE.DoubleSide, depthWrite: false });
}
function flapWings(obj, t) {
  const fp = obj.userData.flap;
  if (!fp || !obj.userData.wings) return;
  const w = fp.base + (0.5 + 0.5 * Math.sin(t * fp.speed)) * fp.amp;
  for (const { pivot, sign } of obj.userData.wings) pivot.rotation.z = sign * w;
}

// Bees + butterflies/moths reuse the (species-styled) avatar bodies, scaled down.
function makeBeeCritter(app) {
  const g = makeBeeAvatar(app); g.scale.multiplyScalar(0.85);
  g.userData.anim = 'flier'; return g;
}
function makeButterflyCritter(app) {
  const g = makeButterflyAvatar(app.kind === 'moth', app);
  g.scale.multiplyScalar(1.15); g.userData.anim = 'flier'; return g;
}

// A perched (or hovering, for hummingbirds) low-poly bird.
function makeBirdCritter(app) {
  const g = new THREE.Group();
  const body = _cmat(app.body, { flat: true }), belly = _cmat(app.belly, { flat: true });
  const wing = _cmat(app.wing, { flat: true });
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), body);
  b.scale.set(0.85, 0.9, 1.35);
  const bel = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 6), belly);
  bel.scale.set(0.7, 0.8, 1.0); bel.position.set(0, -0.05, 0.06);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.11, 9, 7), body);
  head.position.set(0, 0.12, -0.16);
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.03, app.hummer ? 0.22 : 0.09, 5),
                              _cmat('#2a221a', { flat: true }));
  beak.rotation.x = -Math.PI / 2; beak.position.set(0, 0.12, -0.28 - (app.hummer ? 0.08 : 0));
  const tail = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.02, 0.22), wing);
  tail.position.set(0, 0.02, 0.28); tail.rotation.x = 0.3;
  g.add(b, bel, head, beak, tail);
  const wings = [];
  const wg = new THREE.SphereGeometry(0.14, 8, 3);
  for (const s of [-1, 1]) {
    const pivot = new THREE.Group(); pivot.position.set(0.08 * s, 0.04, 0.02);
    const w = new THREE.Mesh(wg, wing); w.scale.set(0.5, 0.14, 1.0);
    w.position.set(0.12 * s, 0, 0.02); pivot.add(w); g.add(pivot);
    wings.push({ pivot, sign: s });
  }
  g.userData.wings = wings;
  if (app.hummer) {
    g.userData.flap = { base: 0, amp: 1.1, speed: 0.4 };   // blur
    g.userData.anim = 'hover';
  } else {
    g.userData.flap = { base: -0.2, amp: 0.0, speed: 0.05 };  // folded
    g.userData.anim = 'perch';
  }
  g.scale.setScalar(0.9 * (app.size || 1));
  return g;
}

// Flower fly / hover fly, or an elongate dragonfly/damselfly.
function makeFlyCritter(app) {
  const g = new THREE.Group();
  const body = _cmat(app.body, { metal: !app.elongate, flat: true });
  const wing = _wingMat(app.wing);
  if (app.elongate) {
    const th = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), body);
    const abd = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.015, 0.5, 6), body);
    abd.rotation.x = Math.PI / 2; abd.position.set(0, 0, 0.28);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6),
                                _cmat('#20242a', { flat: true }));
    head.position.set(0, 0, -0.1);
    g.add(th, abd, head);
    const wings = [];
    for (const s of [-1, 1]) for (const z of [-0.02, 0.12]) {
      const pivot = new THREE.Group(); pivot.position.set(0.04 * s, 0.03, z);
      const w = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.09).rotateX(-Math.PI / 2), wing);
      w.position.set(0.2 * s, 0, 0); pivot.add(w); g.add(pivot);
      if (z < 0) wings.push({ pivot, sign: s });
    }
    g.userData.wings = wings;
    g.userData.flap = { base: 0, amp: 0.25, speed: 0.3 };
    g.userData.anim = 'hover';
  } else {
    const th = new THREE.Mesh(new THREE.SphereGeometry(0.07, 9, 7), body);
    th.scale.set(0.9, 0.8, 1.3);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6),
                                _cmat('#20242a', { flat: true }));
    head.position.set(0, 0.01, -0.12);
    g.add(th, head);
    const wings = [];
    const wg = new THREE.CircleGeometry(0.16, 10);
    for (const s of [-1, 1]) {
      const pivot = new THREE.Group(); pivot.position.set(0.03 * s, 0.05, 0.0);
      const w = new THREE.Mesh(wg, wing); w.scale.set(0.55, 1, 1);
      w.position.set(0.14 * s, 0, 0.03); w.rotation.set(-1.2, 0, 0.2 * s);
      pivot.add(w); g.add(pivot);
      wings.push({ pivot, sign: s });
    }
    g.userData.wings = wings;
    g.userData.flap = { base: 0.1, amp: 0.8, speed: 0.5 };
    g.userData.anim = 'flier';
  }
  g.scale.setScalar(0.9 * (app.size || 1));
  return g;
}

function makeBeetleCritter(app) {
  const g = new THREE.Group();
  const body = _cmat(app.body, { metal: true, flat: true });
  const dome = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8,
                 0, Math.PI * 2, 0, Math.PI / 2), body);
  dome.scale.set(1, 0.7, 1.25);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6),
                              _cmat('#1c1a16', { flat: true }));
  head.position.set(0, 0.01, -0.15);
  g.add(dome, head);
  if (app.spots) {
    const dot = _cmat('#1c1a16', { flat: true });
    for (let i = 0; i < 6; i++) {
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.018, 6, 5), dot);
      const a = i / 6 * Math.PI * 2;
      s.position.set(Math.cos(a) * 0.06, 0.075, Math.sin(a) * 0.08 + 0.02);
      g.add(s);
    }
  }
  g.userData.anim = 'crawl';
  g.scale.setScalar(1.1 * (app.size || 1));
  return g;
}

// A flitting bat: dark body + two membranous wings that flap; flies like the
// other fliers. (Only ever placed at night by scene_wildlife.)
function makeBatCritter(app) {
  const g = new THREE.Group();
  const fur = _cmat(app.body || '#3a2f28', { flat: true });
  const memb = new THREE.MeshStandardMaterial({ color: 0x2a2430, roughness: 0.9,
    emissive: 0x0e0b12, emissiveIntensity: 0.5, side: THREE.DoubleSide, flatShading: true });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 6), fur);
  body.scale.set(0.8, 0.9, 1.3);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6), fur);
  head.position.set(0, 0.03, -0.1);
  for (const s of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.02, 0.06, 4), fur);
    ear.position.set(0.03 * s, 0.09, -0.11); g.add(ear);
  }
  g.add(body, head);
  const wingShape = new THREE.Shape();
  wingShape.moveTo(0, 0); wingShape.lineTo(0.34, 0.06);
  wingShape.lineTo(0.32, -0.05); wingShape.lineTo(0.18, -0.08);
  wingShape.lineTo(0.1, -0.12); wingShape.lineTo(0, 0);
  const wingGeo = new THREE.ShapeGeometry(wingShape);
  const wings = [];
  for (const s of [-1, 1]) {
    const pivot = new THREE.Group(); pivot.position.set(0.02 * s, 0.02, 0);
    const w = new THREE.Mesh(wingGeo, memb);
    w.scale.x = s; w.rotation.x = -Math.PI / 2;
    pivot.add(w); g.add(pivot);
    wings.push({ pivot, sign: s });
  }
  g.userData.wings = wings;
  g.userData.flap = { base: 0, amp: 0.9, speed: 0.28 };
  g.userData.anim = 'flier';
  g.scale.setScalar(1.1 * (app.size || 1));
  return g;
}

function makeMammalCritter(app) {
  if (app.form === 'bat') return makeBatCritter(app);
  const g = new THREE.Group();
  const fur = _cmat(app.body, { flat: true });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 8), fur);
  body.scale.set(0.9, 0.85, 1.5);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.09, 9, 7), fur);
  head.position.set(0, 0.04, -0.17);
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.08, 5), fur);
