<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PermaDesign Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet Draw CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; }
    #map { width: 100%; height: 100%; }

    .plant-marker-label {
      background: rgba(30, 40, 30, 0.85);
      border: 1px solid #5a8a5a;
      border-radius: 4px;
      color: #c8e6c9;
      font-size: 11px;
      padding: 2px 6px;
      white-space: nowrap;
      pointer-events: none;
    }

    .zone-circle-label {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 0 3px #000;
    }

    .measure-label {
      background: rgba(253, 216, 53, 0.9);
      border: 1px solid #f9a825;
      border-radius: 4px;
      color: #1a1a2e;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .annotation-label span {
      background: rgba(30, 40, 30, 0.85);
      border: 1px solid #7cb342;
      border-radius: 4px;
      color: #e8f5e9;
      font-size: 12px;
      padding: 3px 8px;
      white-space: nowrap;
      cursor: move;
    }

    /* ── Map legend ─────────────────────────────────────────────────── */
    #map-legend {
      position: absolute;
      bottom: 30px;
      left: 10px;
      z-index: 1000;
      background: rgba(26, 42, 26, 0.92);
      border: 1px solid #4a7a4a;
      border-radius: 6px;
      padding: 8px 12px;
      color: #c8e6c9;
      font-size: 11px;
      max-width: 200px;
      display: none;
    }
    #map-legend.visible { display: block; }
    #map-legend h4 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #a5d6a7;
      border-bottom: 1px solid #2e4a2e;
      padding-bottom: 4px;
    }
    #map-legend .legend-section {
      margin-bottom: 6px;
    }
    #map-legend .legend-section-title {
      font-size: 10px;
      color: #78909c;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    #map-legend .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 1px 0;
    }
    #map-legend .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    #map-legend .legend-swatch.outline-only {
      background: transparent !important;
      border: 2px dashed;
    }
    #legend-toggle {
      position: absolute;
      bottom: 30px;
      left: 10px;
      z-index: 1001;
      background: rgba(26, 42, 26, 0.9);
      border: 1px solid #4a7a4a;
      border-radius: 4px;
      color: #a5d6a7;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
    }
    #legend-toggle:hover { background: rgba(46, 74, 46, 0.95); }
    #legend-toggle.active { display: none; }

    /* ── Structure labels ───────────────────────────────────────── */
    .structure-label {
      background: rgba(30, 42, 30, 0.88);
      border: 1px solid #78909c;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 11px;
      padding: 2px 6px;
      white-space: nowrap;
      text-align: center;
    }
    .structure-label .struct-icon {
      font-size: 14px;
    }

    /* ── Hedgerow labels ────────────────────────────────────────── */
    .hedgerow-label {
      background: rgba(30, 50, 30, 0.85);
      border: 1px solid #66bb6a;
      border-radius: 4px;
      color: #c8e6c9;
      font-size: 11px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    /* ── Custom shape labels ────────────────────────────────────── */
    .shape-label {
      background: rgba(30, 42, 30, 0.85);
      border: 1px solid #78909c;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      font-weight: bold;
      padding: 3px 8px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <button id="legend-toggle" onclick="toggleLegend()">Legend</button>
  <div id="map-legend">
    <h4>Legend <span style="float:right;cursor:pointer;font-size:14px;" onclick="toggleLegend()">&times;</span></h4>
    <div class="legend-section">
      <div class="legend-section-title">Plant Types</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#2e7d32;"></span> Tree</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#558b2f;"></span> Shrub</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#7cb342;"></span> Herb</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#c6a817;"></span> Groundcover</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#00838f;"></span> Vine</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#6d4c41;"></span> Root</div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Guild Roles</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#1b5e20;"></span> Canopy</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#388e3c;"></span> Understory</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#66bb6a;"></span> Groundcover</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#43a047;"></span> N-Fixer</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#aed581;"></span> Pollinator</div>
      <div class="legend-item"><span class="legend-swatch outline-only" style="border-color:#a5d6a7;"></span> Guild outline</div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Structures</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#42a5f5;"></span> Water</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#8d6e63;"></span> Growing</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ffca28;"></span> Animal</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#795548;"></span> Storage</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#90a4ae;"></span> Infrastructure</div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Other</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#66bb6a; border-radius:2px;"></span> Boundary</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#4caf50; border-radius:2px;"></span> Hedgerow</div>
      <div class="legend-item"><span class="legend-swatch outline-only" style="border-color:#78909c;"></span> Custom shape</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#fdd835;"></span> Measurement</div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Analysis</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#ffb300;"></span> Sun path</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#455a64;"></span> Shadow</div>
      <div class="legend-item"><span class="legend-swatch outline-only" style="border-color:#ff9800;"></span> Sector wedge</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#795548;"></span> Contour</div>
      <div class="legend-item"><span class="legend-swatch" style="background:#42a5f5;"></span> Wind</div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Draw -->
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <!-- Qt WebChannel -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    var map, osmLayer, satelliteLayer, drawnItems, drawControl;
    var boundaryLayer = null;
    var plantMarkers  = {};   // id -> marker
    var zoneCircles   = [];
    var bridge        = null; // Python QObject exposed via QWebChannel
    var currentMode   = 'none'; // 'none' | 'boundary' | 'plant' | 'zone' | 'measure' | 'annotate' | 'structure' | 'hedgerow' | 'shape'
    var currentPlant  = null;   // {id, common_name} when in plant-placement mode

    // Structure state
    var structureMarkers = {};  // id -> L.layerGroup
    var currentStructure = null; // structure def when in structure-placement mode

    // Hedgerow state
    var hedgerowLayers  = {};   // id -> L.layerGroup
    var hedgerowPoints  = [];   // points being drawn
    var hedgerowPreview = null; // preview polyline
    var currentHedgerow = null; // hedgerow config when drawing

    // Custom shape state
    var shapeLayers     = {};   // id -> L.layerGroup
    var shapePoints     = [];   // points being drawn
    var shapePreview    = null; // preview polyline
    var currentShape    = null; // shape config when drawing

    // Measurement state
    var measureStart  = null;   // L.latLng or null
    var measureLine   = null;   // L.polyline
    var measureLabel  = null;   // L.tooltip
    var measureMarkers = [];    // start/end markers

    // Annotation state
    var annotations   = {};     // id -> {marker, text}

    // Polygon drawing state (manual mode)
    var drawingPolygon  = false;
    var polygonPoints   = [];
    var polygonPolyline = null;
    var polygonPreview  = null;

    // ── Map init ─────────────────────────────────────────────────────────────
    function initMap() {
      map = L.map('map', {
        center: [53.5461, -113.4938],
        zoom: 12,
        maxZoom: 22,
        zoomControl: true
      });

      osmLayer = L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 22,
          maxNativeZoom: 19
        }
      ).addTo(map);

      satelliteLayer = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        { attribution: '© Esri', maxZoom: 22, maxNativeZoom: 19 }
      );

      drawnItems = new L.FeatureGroup().addTo(map);

      // Map click handler
      map.on('click', onMapClick);
      map.on('mousemove', onMapMouseMove);
      map.on('dblclick', onMapDblClick);
    }

    // ── Click / move handlers ────────────────────────────────────────────────
    function onMapClick(e) {
      var lat = e.latlng.lat;
      var lng = e.latlng.lng;

      // Apply snap if enabled and in a placement mode
      if (snapEnabled && (currentMode === 'plant' || currentMode === 'zone')) {
        var snapped = snapLatLng(lat, lng);
        lat = snapped[0];
        lng = snapped[1];
      }

      if (bridge) {
        bridge.onMapClick(lat, lng);
      }

      if (currentMode === 'boundary') {
        handleBoundaryClick(lat, lng);
      } else if (currentMode === 'plant' && currentPlant) {
        var qty = currentPlant.quantity || 1;
        var cc  = currentPlant.custom_color || null;
        if (qty > 1) {
          placeGroupMarkers(currentPlant.id, currentPlant.common_name, lat, lng,
                            currentPlant.spacing_m, currentPlant.plant_type, cc, qty);
        } else {
          placePlantMarker(currentPlant.id, currentPlant.common_name, lat, lng,
                           currentPlant.spacing_m, currentPlant.plant_type, cc);
          if (bridge) bridge.onPlantPlaced(currentPlant.id, currentPlant.common_name, lat, lng);
        }
        // Stay in plant mode so user can place multiple
      } else if (currentMode === 'zone') {
        placeZoneCircles(lat, lng);
        if (bridge) bridge.onZoneCenterPlaced(lat, lng);
        setMode('none');
      } else if (currentMode === 'contour') {
        handleContourClick(lat, lng);
      } else if (currentMode === 'structure' && currentStructure) {
        placeStructureOnMap(currentStructure, lat, lng);
        if (bridge) bridge.onStructurePlaced(currentStructure.id, currentStructure.name, lat, lng, currentStructure.size_m);
        // Stay in structure mode for multiple placements
      } else if (currentMode === 'hedgerow') {
        handleHedgerowClick(lat, lng);
      } else if (currentMode === 'shape') {
        handleShapeClick(lat, lng);
      } else if (currentMode === 'measure') {
        handleMeasureClick(lat, lng);
      } else if (currentMode === 'annotate') {
        handleAnnotateClick(lat, lng);
      }
    }

    function onMapMouseMove(e) {
      if (bridge) {
        bridge.onMouseMove(e.latlng.lat, e.latlng.lng);
      }
      if (currentMode === 'boundary' && drawingPolygon && polygonPoints.length > 0) {
        updatePolygonPreview(e.latlng);
      }
      if (currentMode === 'hedgerow' && hedgerowPoints.length > 0) {
        updateHedgerowPreview(e.latlng);
      }
      if (currentMode === 'shape' && shapePoints.length > 0) {
        updateShapePreview(e.latlng);
      }
      if (currentMode === 'contour' && contourPoints.length > 0) {
        updateContourPreview(e.latlng);
      }
    }

    function onMapDblClick(e) {
      L.DomEvent.stop(e);
      if (currentMode === 'boundary' && drawingPolygon) {
        finishBoundaryPolygon();
      } else if (currentMode === 'hedgerow' && hedgerowPoints.length >= 2) {
        finishHedgerow();
      } else if (currentMode === 'shape' && shapePoints.length >= 3) {
        finishShape();
      } else if (currentMode === 'contour' && contourPoints.length >= 2) {
        finishContour();
      }
    }

    // ── Boundary drawing (manual polygon) ────────────────────────────────────
    function handleBoundaryClick(lat, lng) {
      // If clicking near the first point, close the polygon
      if (polygonPoints.length >= 3) {
        var first = polygonPoints[0];
        var firstPx = map.latLngToContainerPoint(L.latLng(first));
        var clickPx = map.latLngToContainerPoint(L.latLng(lat, lng));
        var dist = Math.sqrt(Math.pow(firstPx.x - clickPx.x, 2) + Math.pow(firstPx.y - clickPx.y, 2));
        if (dist < 12) {
          finishBoundaryPolygon();
          return;
        }
      }

      polygonPoints.push([lat, lng]);
      drawingPolygon = true;
      refreshPolygonPolyline();
    }

    function refreshPolygonPolyline() {
      if (polygonPolyline) { map.removeLayer(polygonPolyline); }
      if (polygonPoints.length >= 2) {
        polygonPolyline = L.polyline(polygonPoints, {
          color: '#66bb6a', weight: 2, dashArray: '6 4', opacity: 0.9
        }).addTo(map);
      }
      // Draw a circle on first point so user knows they can close it
      if (polygonPoints.length === 1) {
        L.circleMarker(polygonPoints[0], {
          radius: 6, color: '#66bb6a', fillColor: '#66bb6a', fillOpacity: 0.7
        }).addTo(drawnItems);
      }
    }

    function updatePolygonPreview(latlng) {
      if (polygonPreview) { map.removeLayer(polygonPreview); }
      var pts = polygonPoints.concat([[latlng.lat, latlng.lng]]);
      polygonPreview = L.polyline(pts, {
        color: '#66bb6a', weight: 2, dashArray: '4 4', opacity: 0.5
      }).addTo(map);
    }

    function finishBoundaryPolygon() {
      if (polygonPoints.length < 3) return;

      // Cleanup drawing helpers
      if (polygonPolyline) { map.removeLayer(polygonPolyline); polygonPolyline = null; }
      if (polygonPreview)  { map.removeLayer(polygonPreview);  polygonPreview  = null; }
      drawnItems.clearLayers();

      // Remove existing boundary
      if (boundaryLayer) { map.removeLayer(boundaryLayer); }

      boundaryLayer = L.polygon(polygonPoints, {
        color: '#66bb6a', weight: 2,
        fillColor: '#388e3c', fillOpacity: 0.15
      }).addTo(map);

      // Zoom to fit the drawn boundary
      map.fitBounds(boundaryLayer.getBounds(), { padding: [30, 30] });

      // Notify Python
      if (bridge) {
        bridge.onBoundaryComplete(JSON.stringify(polygonPoints));
      }

      drawingPolygon = false;
      polygonPoints  = [];
      setMode('none');
    }

    // ── Plant type colours ───────────────────────────────────────────────────
    var TYPE_COLORS = {
      'tree':        '#2e7d32',
      'shrub':       '#558b2f',
      'herb':        '#7cb342',
      'groundcover': '#c6a817',
      'vine':        '#00838f',
      'root':        '#6d4c41'
    };

    // ── Plant labels state ───────────────────────────────────────────────────
    var labelsVisible = false;
    var plantLabels   = {};   // markerId -> L.tooltip (permanent)

    // ── Plant markers ────────────────────────────────────────────────────────
    // spacingM    : plant spacing in metres (used as circle diameter on the map)
    // plantType   : 'tree' | 'shrub' | 'herb' | 'groundcover' | 'vine' | 'root'
    // customColor : optional hex colour override (e.g. '#ff5722')
    function placePlantMarker(plantId, commonName, lat, lng, spacingM, plantType, customColor) {
      var markerId = plantId + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
      var radius   = Math.max((spacingM || 1.0) / 2, 1.0);   // half-diameter, min 1 m
      var color    = customColor || TYPE_COLORS[plantType] || '#66bb6a';

      var circle = L.circle([lat, lng], {
        radius:      radius,
        color:       color,
        weight:      1.5,
        fillColor:   color,
        fillOpacity: 0.35
      }).bindTooltip(commonName + '<br><span style="color:#78909c;font-size:10px">Right-click to remove</span>',
          { permanent: false, className: 'plant-marker-label' })
        .addTo(map);

      // Store metadata on the circle for later use
      circle._pd = { plantId: plantId, commonName: commonName, lat: lat, lng: lng,
                      spacingM: spacingM, plantType: plantType, customColor: customColor };

      circle.on('click', function() {
        if (bridge) bridge.onPlantMarkerClick(markerId, plantId, lat, lng);
      });

      circle.on('contextmenu', function(e) {
        L.DomEvent.stop(e);
        map.removeLayer(circle);
        // Remove permanent label if any
        if (plantLabels[markerId]) {
          map.removeLayer(plantLabels[markerId]);
          delete plantLabels[markerId];
        }
        delete plantMarkers[markerId];
        if (bridge) bridge.onPlantRemoved(markerId, plantId, lat, lng);
      });

      plantMarkers[markerId] = circle;

      // Add permanent label if labels are turned on
      if (labelsVisible) {
        _addPermanentLabel(markerId, circle, commonName);
      }

      return markerId;
    }

    // Place a group of plants in a hex cluster pattern
    function placeGroupMarkers(plantId, commonName, lat, lng, spacingM, plantType, customColor, quantity) {
      if (quantity <= 1) {
        placePlantMarker(plantId, commonName, lat, lng, spacingM, plantType, customColor);
        if (bridge) bridge.onPlantPlaced(plantId, commonName, lat, lng);
        return;
      }
      var spacing = spacingM || 1.0;
      // Place in concentric hex rings around centre
      var placed = 0;
      var ring = 0;
      var positions = [[lat, lng]];
      while (positions.length < quantity) {
        ring++;
        for (var side = 0; side < 6; side++) {
          for (var step = 0; step < ring; step++) {
            if (positions.length >= quantity) break;
            var angle = (side * 60 + step * (60 / ring)) * Math.PI / 180;
            var dLat = (ring * spacing * Math.cos(angle)) / 111320;
            var dLng = (ring * spacing * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI / 180));
            positions.push([lat + dLat, lng + dLng]);
          }
        }
      }
      for (var i = 0; i < quantity && i < positions.length; i++) {
        var p = positions[i];
        placePlantMarker(plantId, commonName, p[0], p[1], spacingM, plantType, customColor);
        if (bridge) bridge.onPlantPlaced(plantId, commonName, p[0], p[1]);
      }
    }

    // ── Label management ──────────────────────────────────────────────────────
    function _addPermanentLabel(markerId, circle, name) {
      var label = L.tooltip({
        permanent: true,
        direction: 'top',
        offset: [0, -8],
        className: 'plant-marker-label',
        opacity: 0.9
      }).setContent(name).setLatLng(circle.getLatLng());
      label.addTo(map);
      plantLabels[markerId] = label;
    }

    function setLabelsVisible(visible) {
      labelsVisible = visible;
      if (visible) {
        // Add permanent labels to all existing markers
        Object.keys(plantMarkers).forEach(function(mid) {
          if (!plantLabels[mid]) {
            var c = plantMarkers[mid];
            _addPermanentLabel(mid, c, c._pd ? c._pd.commonName : '');
          }
        });
      } else {
        // Remove all permanent labels
        Object.keys(plantLabels).forEach(function(mid) {
          map.removeLayer(plantLabels[mid]);
        });
        plantLabels = {};
      }
    }

    // ── Update marker colour (called from Python) ─────────────────────────────
    function updateMarkerColor(plantId, newColor) {
      Object.keys(plantMarkers).forEach(function(mid) {
        var c = plantMarkers[mid];
        if (c._pd && c._pd.plantId === plantId) {
          c.setStyle({ color: newColor, fillColor: newColor });
          c._pd.customColor = newColor;
        }
      });
    }

    // ── Zone circles ─────────────────────────────────────────────────────────
    function placeZoneCircles(lat, lng) {
      // Clear existing zone circles
      zoneCircles.forEach(function(c) { map.removeLayer(c); });
      zoneCircles = [];

      var radii  = [10, 30, 60, 120, 240];  // metres (visual reference)
      var colors = ['#ef5350','#ff9800','#ffee58','#66bb6a','#42a5f5'];
      var labels = ['Z0','Z1','Z2','Z3','Z4'];

      radii.forEach(function(r, i) {
        var circle = L.circle([lat, lng], {
          radius: r,
          color: colors[i], weight: 1.5,
          fillColor: colors[i], fillOpacity: 0.04,
          interactive: false
        }).addTo(map);

        var labelIcon = L.divIcon({
          className: 'zone-circle-label',
          html: labels[i],
          iconSize: [20, 12]
        });
        var lm = L.marker([lat, lng + metresToLng(r, lat)], { icon: labelIcon, interactive: false }).addTo(map);

        zoneCircles.push(circle);
        zoneCircles.push(lm);  // track labels so they toggle/clear with the circles
      });
    }

    function metresToLng(metres, lat) {
      return (metres / 111320) / Math.cos(lat * Math.PI / 180);
    }

    // ── Snap to grid ──────────────────────────────────────────────────────────
    var snapEnabled  = false;
    var snapGridSize = 1.0;  // metres
    var gridOverlay  = null;

    function setSnapEnabled(enabled, gridSize) {
      snapEnabled  = enabled;
      snapGridSize = gridSize || 1.0;
      if (enabled) {
        drawGridOverlay();
        map.on('moveend', drawGridOverlay);
        map.on('zoomend', drawGridOverlay);
      } else {
        if (gridOverlay) { map.removeLayer(gridOverlay); gridOverlay = null; }
        map.off('moveend', drawGridOverlay);
        map.off('zoomend', drawGridOverlay);
      }
    }

    function snapLatLng(lat, lng) {
      if (!snapEnabled) return [lat, lng];
      var gridLat = snapGridSize / 111320;
      var gridLng = snapGridSize / (111320 * Math.cos(lat * Math.PI / 180));
      return [
        Math.round(lat / gridLat) * gridLat,
        Math.round(lng / gridLng) * gridLng
      ];
    }

    function drawGridOverlay() {
      if (gridOverlay) { map.removeLayer(gridOverlay); gridOverlay = null; }
      if (!snapEnabled || map.getZoom() < 17) return; // only show grid when zoomed in

      var bounds = map.getBounds();
      var gridLat = snapGridSize / 111320;
      var centerLat = bounds.getCenter().lat;
      var gridLng = snapGridSize / (111320 * Math.cos(centerLat * Math.PI / 180));
      var lines = [];

      var startLat = Math.floor(bounds.getSouth() / gridLat) * gridLat;
      var startLng = Math.floor(bounds.getWest() / gridLng) * gridLng;

      for (var lt = startLat; lt <= bounds.getNorth(); lt += gridLat) {
        lines.push([[lt, bounds.getWest()], [lt, bounds.getEast()]]);
      }
      for (var ln = startLng; ln <= bounds.getEast(); ln += gridLng) {
        lines.push([[bounds.getSouth(), ln], [bounds.getNorth(), ln]]);
      }

      gridOverlay = L.layerGroup(lines.map(function(pts) {
        return L.polyline(pts, { color: '#4a7a4a', weight: 0.5, opacity: 0.4, interactive: false });
      })).addTo(map);
    }

    // ── Canopy preview ───────────────────────────────────────────────────────
    var canopyVisible = false;
    var canopyCircles = [];

    function setCanopyVisible(visible) {
      canopyVisible = visible;
      if (visible) {
        drawCanopies();
      } else {
        canopyCircles.forEach(function(c) { map.removeLayer(c); });
        canopyCircles = [];
      }
    }

    function drawCanopies() {
      canopyCircles.forEach(function(c) { map.removeLayer(c); });
      canopyCircles = [];
      if (!canopyVisible) return;

      Object.keys(plantMarkers).forEach(function(mid) {
        var m = plantMarkers[mid];
        if (!m._pd) return;
        var radius = Math.max((m._pd.spacingM || 1.0) / 2, 0.5);
        var c = L.circle(m.getLatLng(), {
          radius: radius,
          color: '#a5d6a7', weight: 1, dashArray: '4 3',
          fillColor: '#a5d6a7', fillOpacity: 0.08,
          interactive: false
        }).addTo(map);
        canopyCircles.push(c);
      });
    }

    // ── Measurement tool ───────────────────────────────────────────────────────
    function handleMeasureClick(lat, lng) {
      if (!measureStart) {
        // First click — set start point
        clearMeasure();
        measureStart = L.latLng(lat, lng);
        var mk = L.circleMarker([lat, lng], {
          radius: 5, color: '#fdd835', fillColor: '#fdd835', fillOpacity: 1
        }).addTo(map);
        measureMarkers.push(mk);
      } else {
        // Second click — draw line + show distance
        var end = L.latLng(lat, lng);
        var dist = measureStart.distanceTo(end);
        var label = dist < 1000
          ? dist.toFixed(1) + ' m'
          : (dist / 1000).toFixed(2) + ' km';

        measureLine = L.polyline([measureStart, end], {
          color: '#fdd835', weight: 2, dashArray: '8 4', opacity: 0.9
        }).addTo(map);

        var mk = L.circleMarker([lat, lng], {
          radius: 5, color: '#fdd835', fillColor: '#fdd835', fillOpacity: 1
        }).addTo(map);
        measureMarkers.push(mk);

        // Midpoint label
        var mid = L.latLng(
          (measureStart.lat + end.lat) / 2,
          (measureStart.lng + end.lng) / 2
        );
        measureLabel = L.tooltip({
          permanent: true, direction: 'top', offset: [0, -10],
          className: 'measure-label', opacity: 0.95
        }).setContent(label).setLatLng(mid).addTo(map);

        measureStart = null; // ready for next measurement
      }
    }

    function clearMeasure() {
      if (measureLine)  { map.removeLayer(measureLine);  measureLine  = null; }
      if (measureLabel) { map.removeLayer(measureLabel); measureLabel = null; }
      measureMarkers.forEach(function(m) { map.removeLayer(m); });
      measureMarkers = [];
      measureStart = null;
    }

    // ── Annotations ───────────────────────────────────────────────────────────
    function handleAnnotateClick(lat, lng) {
      if (bridge) bridge.onAnnotateRequested(lat, lng);
    }

    function placeAnnotation(id, lat, lng, text) {
      var icon = L.divIcon({
        className: 'annotation-label',
        html: '<span>' + text + '</span>',
        iconSize: [0, 0],
        iconAnchor: [0, 0]
      });
      var marker = L.marker([lat, lng], { icon: icon, draggable: true }).addTo(map);
      marker.on('contextmenu', function(e) {
        L.DomEvent.stop(e);
        map.removeLayer(marker);
        delete annotations[id];
        if (bridge) bridge.onAnnotationRemoved(id);
      });
      marker.on('dragend', function() {
        var pos = marker.getLatLng();
        annotations[id].lat = pos.lat;
        annotations[id].lng = pos.lng;
      });
      annotations[id] = { marker: marker, text: text, lat: lat, lng: lng };
    }

    function clearAnnotations() {
      Object.keys(annotations).forEach(function(id) {
        map.removeLayer(annotations[id].marker);
      });
      annotations = {};
    }

    // ── Structure placement (S1) ───────────────────────────────────────────
    function placeStructureOnMap(structDef, lat, lng) {
      var id = 'struct_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
      var group = L.layerGroup().addTo(map);
      var sizeM = structDef.size_m || 3.0;
      var widthM = structDef.width_m || sizeM;
      var color = structDef.color || '#78909c';
      var fillColor = structDef.fill_color || color;
      var fillOpacity = structDef.fill_opacity || 0.35;
      var shape = structDef.shape || 'rectangle';
      var name = structDef.name || 'Structure';
      var icon = structDef.icon || '';

      var mainLayer;

      if (shape === 'circle' || shape === 'ellipse' || shape === 'spiral' || shape === 'keyhole') {
        // Render as circle
        mainLayer = L.circle([lat, lng], {
          radius: sizeM / 2,
          color: color,
          weight: 2,
          fillColor: fillColor,
          fillOpacity: fillOpacity
        }).addTo(group);

        // Spiral: add decorative inner arcs
        if (shape === 'spiral') {
          var innerR = sizeM / 4;
          L.circle([lat, lng], {
            radius: innerR,
            color: color,
            weight: 1.5,
            fillOpacity: 0,
            dashArray: '4 3'
          }).addTo(group);
        }

        // Keyhole: add a small notch indicator
        if (shape === 'keyhole') {
          var notchLat = lat - (sizeM * 0.3) / 111320;
          L.circle([notchLat, lng], {
            radius: sizeM / 6,
            color: '#5d4037',
            weight: 1.5,
            fillColor: '#8d6e63',
            fillOpacity: 0.5
          }).addTo(group);
        }

      } else {
        // Rectangle: use L.rectangle
        var halfLen = sizeM / 2;
        var halfWid = widthM / 2;
        var dLat = halfLen / 111320;
        var dLng = halfWid / (111320 * Math.cos(lat * Math.PI / 180));
        var bounds = [[lat - dLat, lng - dLng], [lat + dLat, lng + dLng]];
        mainLayer = L.rectangle(bounds, {
          color: color,
          weight: 2,
          fillColor: fillColor,
          fillOpacity: fillOpacity
        }).addTo(group);
      }

      // Label with icon
      var labelIcon = L.divIcon({
        className: 'structure-label',
        html: '<span class="struct-icon">' + icon + '</span> ' + name,
        iconSize: [0, 0],
        iconAnchor: [0, 12]
      });
      L.marker([lat, lng], { icon: labelIcon, interactive: false }).addTo(group);

      // Tooltip on hover
      mainLayer.bindTooltip(
        '<b>' + icon + ' ' + name + '</b><br>' +
        '<span style="color:#78909c;font-size:10px">' + (sizeM) + 'm' +
        (structDef.maintenance_hours_year ? ' · ~' + structDef.maintenance_hours_year + ' hrs/yr' : '') +
        '<br>Right-click to remove</span>',
        { className: 'plant-marker-label' }
      );

      // Store metadata
      mainLayer._struct = {
        id: id,
        structId: structDef.id,
        name: name,
        icon: icon,
        lat: lat,
        lng: lng,
        sizeM: sizeM,
        widthM: widthM,
        maintenance: structDef.maintenance_hours_year || 0
      };

      // Right-click to remove
      mainLayer.on('contextmenu', function(e) {
        L.DomEvent.stop(e);
        map.removeLayer(group);
        delete structureMarkers[id];
        if (bridge) bridge.onStructureRemoved(id, structDef.id, lat, lng);
      });

      structureMarkers[id] = group;
      return id;
    }

    // Load a structure from saved project
    function loadStructure(structDef, lat, lng) {
      placeStructureOnMap(structDef, lat, lng);
    }

    // ── Hedgerow drawing (S2) ────────────────────────────────────────────────
    function handleHedgerowClick(lat, lng) {
      hedgerowPoints.push([lat, lng]);

      // Draw vertex marker
      L.circleMarker([lat, lng], {
        radius: 4,
        color: currentHedgerow ? currentHedgerow.color : '#4caf50',
        fillColor: currentHedgerow ? currentHedgerow.color : '#4caf50',
        fillOpacity: 1
      }).addTo(drawnItems);

      refreshHedgerowPolyline();
    }

    function refreshHedgerowPolyline() {
      if (hedgerowPreview) { map.removeLayer(hedgerowPreview); hedgerowPreview = null; }
      if (hedgerowPoints.length >= 2) {
        var color = currentHedgerow ? currentHedgerow.color : '#4caf50';
        hedgerowPreview = L.polyline(hedgerowPoints, {
          color: color, weight: 3, opacity: 0.7, dashArray: '6 4'
        }).addTo(map);
      }
    }

    function updateHedgerowPreview(latlng) {
      if (hedgerowPreview) { map.removeLayer(hedgerowPreview); }
      var color = currentHedgerow ? currentHedgerow.color : '#4caf50';
      var pts = hedgerowPoints.concat([[latlng.lat, latlng.lng]]);
      hedgerowPreview = L.polyline(pts, {
        color: color, weight: 3, opacity: 0.5, dashArray: '4 4'
      }).addTo(map);
    }

    function finishHedgerow() {
      if (hedgerowPoints.length < 2) return;
      if (hedgerowPreview) { map.removeLayer(hedgerowPreview); hedgerowPreview = null; }
      drawnItems.clearLayers();

      var id = 'hedge_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
      var cfg = currentHedgerow || {};
      var color   = cfg.color    || '#4caf50';
      var widthM  = cfg.width_m  || 1.5;
      var spacing = cfg.spacing_m || 1.0;
      var style   = cfg.style    || 'hedge';
      var species = cfg.species  || '';
      var group   = L.layerGroup().addTo(map);

      // Style definitions
      var styleMap = {
        'hedge':       { weight: 6, opacity: 0.6, dashArray: null,    fillDots: true },
        'fence':       { weight: 3, opacity: 0.8, dashArray: '8 6',  fillDots: false },
        'living_fence':{ weight: 5, opacity: 0.6, dashArray: '12 4', fillDots: true },
        'windbreak':   { weight: 8, opacity: 0.5, dashArray: null,    fillDots: true }
      };
      var s = styleMap[style] || styleMap['hedge'];

      // Main polyline
      var mainLine = L.polyline(hedgerowPoints, {
        color: color,
        weight: s.weight,
        opacity: s.opacity,
        dashArray: s.dashArray,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(group);

      // Plant markers along the line
      if (s.fillDots) {
        var totalLen = 0;
        var segments = [];
        for (var i = 1; i < hedgerowPoints.length; i++) {
          var from = L.latLng(hedgerowPoints[i-1]);
          var to   = L.latLng(hedgerowPoints[i]);
          var segLen = from.distanceTo(to);
          segments.push({ from: from, to: to, len: segLen });
          totalLen += segLen;
        }
        var numPlants = Math.floor(totalLen / spacing) + 1;
        var distAlong = 0;
        var segIdx = 0;
        var segDist = 0;
        for (var p = 0; p < numPlants; p++) {
          var target = p * spacing;
          while (segIdx < segments.length - 1 && segDist + segments[segIdx].len < target) {
            segDist += segments[segIdx].len;
            segIdx++;
          }
          var seg = segments[segIdx];
          var frac = seg.len > 0 ? (target - segDist) / seg.len : 0;
          frac = Math.max(0, Math.min(1, frac));
          var ptLat = seg.from.lat + (seg.to.lat - seg.from.lat) * frac;
          var ptLng = seg.from.lng + (seg.to.lng - seg.from.lng) * frac;

          var dotColor = style === 'living_fence' ?
            (p % 2 === 0 ? color : shiftColor(color, 30)) : color;
          L.circleMarker([ptLat, ptLng], {
            radius: 3.5,
            color: dotColor,
            fillColor: dotColor,
            fillOpacity: 0.8,
            weight: 1
          }).addTo(group);
        }
      }

      // Label at midpoint
      var midIdx = Math.floor(hedgerowPoints.length / 2);
      var labelText = species || (style.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }));
      var labelIcon = L.divIcon({
        className: 'hedgerow-label',
        html: labelText,
        iconSize: [0, 0],
        iconAnchor: [0, 12]
      });
      L.marker(hedgerowPoints[midIdx], { icon: labelIcon, interactive: false }).addTo(group);

      // Tooltip
      var tooltipText = '<b>Hedgerow</b>';
      if (species) tooltipText += '<br>' + species;
      tooltipText += '<br><span style="color:#78909c;font-size:10px">~' + numPlants + ' plants · ' +
        totalLen.toFixed(1) + 'm<br>Right-click to remove</span>';
      mainLine.bindTooltip(tooltipText, { className: 'plant-marker-label' });

      // Store metadata
      mainLine._hedge = {
        id: id,
        points: hedgerowPoints.slice(),
        style: style,
        color: color,
        widthM: widthM,
        spacingM: spacing,
        species: species,
        lengthM: totalLen,
        numPlants: numPlants
      };

      // Right-click to remove
      mainLine.on('contextmenu', function(e) {
        L.DomEvent.stop(e);
        map.removeLayer(group);
        delete hedgerowLayers[id];
        if (bridge) bridge.onHedgerowRemoved(id, JSON.stringify(hedgerowPoints));
      });

      hedgerowLayers[id] = group;

      // Notify Python
      if (bridge) bridge.onHedgerowComplete(id, JSON.stringify(hedgerowPoints.slice()), species, style, totalLen, numPlants);

      hedgerowPoints = [];
      setMode('none');
    }

    // Load a hedgerow from saved project
    function loadHedgerow(hedgeDef) {
      hedgerowPoints = hedgeDef.points || [];
      currentHedgerow = hedgeDef;
      if (hedgerowPoints.length >= 2) {
        finishHedgerow();
      }
      hedgerowPoints = [];
    }

    // ── Custom shape drawing (S3) ────────────────────────────────────────────
    function handleShapeClick(lat, lng) {
      // Close polygon if clicking near first point
      if (shapePoints.length >= 3) {
        var first = shapePoints[0];
        var firstPx = map.latLngToContainerPoint(L.latLng(first));
        var clickPx = map.latLngToContainerPoint(L.latLng(lat, lng));
        var dist = Math.sqrt(Math.pow(firstPx.x - clickPx.x, 2) + Math.pow(firstPx.y - clickPx.y, 2));
        if (dist < 12) {
          finishShape();
          return;
        }
      }

      shapePoints.push([lat, lng]);

      // Draw vertex marker
      var strokeColor = currentShape ? currentShape.stroke_color : '#2e7d32';
      L.circleMarker([lat, lng], {
        radius: 4, color: strokeColor,
        fillColor: strokeColor, fillOpacity: 1
      }).addTo(drawnItems);

      // Show close indicator on first point
      if (shapePoints.length === 1) {
        L.circleMarker([lat, lng], {
          radius: 6, color: strokeColor,
          fillColor: strokeColor, fillOpacity: 0.5
        }).addTo(drawnItems);
      }

      refreshShapePolyline();
    }

    function refreshShapePolyline() {
      if (shapePreview) { map.removeLayer(shapePreview); shapePreview = null; }
      if (shapePoints.length >= 2) {
        var color = currentShape ? currentShape.stroke_color : '#2e7d32';
        shapePreview = L.polyline(shapePoints, {
          color: color, weight: 2, opacity: 0.7, dashArray: '6 4'
        }).addTo(map);
      }
    }

    function updateShapePreview(latlng) {
      if (shapePreview) { map.removeLayer(shapePreview); }
      var color = currentShape ? currentShape.stroke_color : '#2e7d32';
      var pts = shapePoints.concat([[latlng.lat, latlng.lng]]);
      // Close preview polygon
      if (pts.length >= 3) {
        pts.push(pts[0]);
      }
      shapePreview = L.polyline(pts, {
        color: color, weight: 2, opacity: 0.5, dashArray: '4 4'
      }).addTo(map);
    }

    function finishShape() {
      if (shapePoints.length < 3) return;
      if (shapePreview) { map.removeLayer(shapePreview); shapePreview = null; }
      drawnItems.clearLayers();

      var id = 'shape_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
      var cfg = currentShape || {};
      var fillColor   = cfg.fill_color   || '#4caf50';
      var strokeColor = cfg.stroke_color || '#2e7d32';
      var fillOpacity = cfg.fill_opacity !== undefined ? cfg.fill_opacity : 0.25;
      var dashArray   = cfg.dash_array   || '';
      var label       = cfg.label        || '';
      var shapeType   = cfg.shape_type   || 'Custom';

      var group = L.layerGroup().addTo(map);

      // Main polygon
      var polygon = L.polygon(shapePoints, {
        color: strokeColor,
        weight: 2,
        fillColor: fillColor,
        fillOpacity: fillOpacity,
        dashArray: dashArray || null
      }).addTo(group);

      // Calculate area
      var areaM2 = _polygonArea(shapePoints);
      var areaStr = areaM2 < 10000 ?
        areaM2.toFixed(1) + ' m²' :
        (areaM2 / 10000).toFixed(2) + ' ha';

      // Centre label
      var center = polygon.getBounds().getCenter();
      if (label || shapeType !== 'Custom') {
        var displayLabel = label || shapeType;
        var labelIcon = L.divIcon({
          className: 'shape-label',
          html: displayLabel,
          iconSize: [0, 0],
          iconAnchor: [0, 8]
        });
        L.marker(center, { icon: labelIcon, interactive: false }).addTo(group);
      }

      // Tooltip
      polygon.bindTooltip(
        '<b>' + (label || shapeType) + '</b><br>' +
        '<span style="color:#78909c;font-size:10px">Area: ' + areaStr + '<br>Right-click to remove</span>',
        { className: 'plant-marker-label' }
      );

      // Metadata
      polygon._shape = {
        id: id,
        points: shapePoints.slice(),
        shapeType: shapeType,
        label: label,
        fillColor: fillColor,
        strokeColor: strokeColor,
        fillOpacity: fillOpacity,
        dashArray: dashArray,
        areaM2: areaM2
      };

      // Right-click to remove
      polygon.on('contextmenu', function(e) {
        L.DomEvent.stop(e);
        map.removeLayer(group);
        delete shapeLayers[id];
        if (bridge) bridge.onShapeRemoved(id);
      });

      shapeLayers[id] = group;

      // Notify Python
      if (bridge) bridge.onShapeComplete(id, JSON.stringify(shapePoints.slice()), label, shapeType, fillColor, strokeColor, fillOpacity, dashArray, areaM2);

      shapePoints = [];
      setMode('none');
    }

    // Load a shape from saved project
    function loadShape(shapeDef) {
      var pts = shapeDef.points || [];
      if (pts.length < 3) return;
      shapePoints = pts;
      currentShape = shapeDef;
      finishShape();
      shapePoints = [];
    }

    // Approximate polygon area in m² using the Shoelace formula
    function _polygonArea(pts) {
      if (pts.length < 3) return 0;
      // Convert to metres relative to first point
      var refLat = pts[0][0];
      var refLng = pts[0][1];
      var mPts = pts.map(function(p) {
        return [
          (p[1] - refLng) * 111320 * Math.cos(refLat * Math.PI / 180),
          (p[0] - refLat) * 111320
        ];
      });
      var area = 0;
      for (var i = 0; i < mPts.length; i++) {
        var j = (i + 1) % mPts.length;
        area += mPts[i][0] * mPts[j][1];
        area -= mPts[j][0] * mPts[i][1];
      }
      return Math.abs(area / 2);
    }

    // Utility: shift a hex colour's hue slightly
    function shiftColor(hex, amount) {
      var r = parseInt(hex.slice(1,3), 16);
      var g = parseInt(hex.slice(3,5), 16);
      var b = parseInt(hex.slice(5,7), 16);
      r = Math.min(255, r + amount);
      g = Math.max(0, g - amount / 2);
      return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    // ── Guild visualisation ─────────────────────────────────────────────────
    // Guilds are drawn as overlapping canopy circles (like the oak guild diagram).
    // The canopy tree is the largest circle; understory/groundcover nest inside.
    var guildGroups = [];  // array of L.layerGroup

    var ROLE_COLORS = {
      'canopy':              '#1b5e20',
      'understory':          '#388e3c',
      'groundcover':         '#66bb6a',
      'nitrogen_fixer':      '#43a047',
      'dynamic_accumulator': '#2e7d32',
      'pest_repellent':      '#7cb342',
      'pollinator':          '#aed581',
      'windbreak':           '#558b2f',
      'other':               '#81c784'
    };

    function placeGuildOnMap(guildData, centerLat, centerLng) {
      var members = guildData.members || [];
      var group = L.layerGroup().addTo(map);

      // Sort members: canopy first (largest), then by descending height
      var sorted = members.slice().sort(function(a, b) {
        if (a.role === 'canopy' && b.role !== 'canopy') return -1;
        if (b.role === 'canopy' && a.role !== 'canopy') return 1;
        return (b.mature_height_meters || 1) - (a.mature_height_meters || 1);
      });

      // Find the biggest canopy radius (based on spacing of the canopy tree)
      var maxRadius = 2;
      sorted.forEach(function(m) {
        var r = Math.max((m.spacing_meters || 1) / 2, 0.5);
        if (r > maxRadius) maxRadius = r;
      });

      sorted.forEach(function(m) {
        var latOff = (m.offset_y || 0) / 111320;
        var lngOff = (m.offset_x || 0) / (111320 * Math.cos(centerLat * Math.PI / 180));
        var mlat = centerLat + latOff;
        var mlng = centerLng + lngOff;

        var role = m.role || 'other';
        var color = ROLE_COLORS[role] || '#81c784';
        var radius = Math.max((m.spacing_meters || 1) / 2, 0.5);

        // Draw filled canopy circle
        var canopy = L.circle([mlat, mlng], {
          radius: radius,
          color: color,
          weight: 1.5,
          fillColor: color,
          fillOpacity: 0.30,
          className: 'guild-canopy'
        }).addTo(group);

        canopy.bindTooltip(
          '<b>' + (guildData.name || 'Guild') + '</b><br>' +
          m.common_name + ' <span style="color:#aaa">(' + role.replace(/_/g, ' ') + ')</span>',
          { className: 'plant-marker-label' }
        );

        // Store metadata for undo/project tracking
        canopy._pd = {
          plantId: m.plant_id, commonName: m.common_name,
          lat: mlat, lng: mlng,
          spacingM: m.spacing_meters, plantType: m.plant_type,
          guildName: guildData.name
        };

        // Also register in plantMarkers so labels/canopy-toggle works
        var mid = m.plant_id + '_g_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
        plantMarkers[mid] = canopy;

        canopy.on('contextmenu', function(e) {
          L.DomEvent.stop(e);
          // Remove entire guild group on right-click
          map.removeLayer(group);
          // Clean up plantMarkers references
          group.eachLayer(function(layer) {
            Object.keys(plantMarkers).forEach(function(k) {
              if (plantMarkers[k] === layer) delete plantMarkers[k];
            });
          });
          var idx = guildGroups.indexOf(group);
          if (idx >= 0) guildGroups.splice(idx, 1);
          // Notify Python so project state is cleaned up
          if (bridge) bridge.onGuildRemoved(guildData.name || '', centerLat, centerLng);
        });
      });

      // Draw a dashed outline around the whole guild footprint
      var outline = L.circle([centerLat, centerLng], {
        radius: maxRadius * 1.1,
        color: '#a5d6a7',
        weight: 1.5,
        dashArray: '6 4',
        fillOpacity: 0,
        interactive: false
      }).addTo(group);

      // Add guild name label at center
      var labelIcon = L.divIcon({
        className: 'plant-marker-label',
        html: '<b>' + (guildData.name || 'Guild') + '</b>',
        iconSize: [0, 0],
        iconAnchor: [0, -8]
      });
      L.marker([centerLat, centerLng], { icon: labelIcon, interactive: false }).addTo(group);

      guildGroups.push(group);
      return group;
    }

    // ── Mode control (called from Python) ────────────────────────────────────
    function setMode(mode, data) {
      currentMode  = mode;
      currentPlant = null;
      currentStructure = null;
      currentHedgerow  = null;
      currentShape     = null;

      switch (mode) {
        case 'boundary':
          map.getContainer().style.cursor = 'crosshair';
          drawingPolygon = false;
          polygonPoints  = [];
          drawnItems.clearLayers();
          break;
        case 'plant':
          currentPlant = data || null;
          map.getContainer().style.cursor = 'cell';
          break;
        case 'zone':
          map.getContainer().style.cursor = 'crosshair';
          break;
        case 'measure':
          map.getContainer().style.cursor = 'crosshair';
          clearMeasure();
          break;
        case 'annotate':
          map.getContainer().style.cursor = 'text';
          break;
        case 'structure':
          currentStructure = data || null;
          map.getContainer().style.cursor = 'crosshair';
          break;
        case 'hedgerow':
          currentHedgerow = data || null;
          hedgerowPoints = [];
          map.getContainer().style.cursor = 'crosshair';
          break;
        case 'shape':
          currentShape = data || null;
          shapePoints = [];
          map.getContainer().style.cursor = 'crosshair';
          break;
        case 'contour':
          currentContour = data || null;
          contourPoints = [];
          map.getContainer().style.cursor = 'crosshair';
          break;
        default:
          map.getContainer().style.cursor = '';
          if (polygonPolyline) { map.removeLayer(polygonPolyline); polygonPolyline = null; }
          if (polygonPreview)  { map.removeLayer(polygonPreview);  polygonPreview  = null; }
          if (hedgerowPreview) { map.removeLayer(hedgerowPreview); hedgerowPreview = null; }
          if (shapePreview)    { map.removeLayer(shapePreview);    shapePreview    = null; }
          if (contourPreview)  { map.removeLayer(contourPreview);  contourPreview  = null; }
          drawingPolygon = false;
          polygonPoints  = [];
          hedgerowPoints = [];
          shapePoints    = [];
          contourPoints  = [];
          drawnItems.clearLayers();
      }
    }

    // ── Layer visibility ──────────────────────────────────────────────────────
    function setSatelliteVisible(visible) {
      if (visible) {
        satelliteLayer.addTo(map);
        osmLayer.remove();
      } else {
        osmLayer.addTo(map);
        satelliteLayer.remove();
      }
    }

    function setBoundaryVisible(visible) {
      if (boundaryLayer) {
        if (visible) boundaryLayer.addTo(map); else map.removeLayer(boundaryLayer);
      }
    }

    function setZonesVisible(visible) {
      zoneCircles.forEach(function(c) {
        if (visible) c.addTo(map); else map.removeLayer(c);
      });
    }

    function setPlantsVisible(visible) {
      Object.values(plantMarkers).forEach(function(m) {
        if (visible) m.addTo(map); else map.removeLayer(m);
      });
    }

    // ── Project load/clear ────────────────────────────────────────────────────
    function clearAll() {
      if (boundaryLayer) { map.removeLayer(boundaryLayer); boundaryLayer = null; }
      zoneCircles.forEach(function(c) { map.removeLayer(c); });
      zoneCircles = [];
      Object.values(plantMarkers).forEach(function(m) { map.removeLayer(m); });
      plantMarkers = {};
      Object.values(plantLabels).forEach(function(l) { map.removeLayer(l); });
      plantLabels = {};
      guildGroups.forEach(function(g) { map.removeLayer(g); });
      guildGroups = [];
      Object.values(structureMarkers).forEach(function(g) { map.removeLayer(g); });
      structureMarkers = {};
      Object.values(hedgerowLayers).forEach(function(g) { map.removeLayer(g); });
      hedgerowLayers = {};
      Object.values(shapeLayers).forEach(function(g) { map.removeLayer(g); });
      shapeLayers = {};
      clearSunPath();
      clearSectors();
      clearContours();
      clearWindOverlay();
      drawnItems.clearLayers();
    }

    function loadBoundary(coordsJson) {
      var coords = JSON.parse(coordsJson);
      if (boundaryLayer) { map.removeLayer(boundaryLayer); }
      boundaryLayer = L.polygon(coords, {
        color: '#66bb6a', weight: 2,
        fillColor: '#388e3c', fillOpacity: 0.15
      }).addTo(map);
      map.fitBounds(boundaryLayer.getBounds());
    }

    function loadPlantMarker(plantId, commonName, lat, lng, spacingM, plantType, customColor) {
      placePlantMarker(plantId, commonName, lat, lng, spacingM, plantType, customColor || null);
    }

    function loadZoneCenter(lat, lng) {
      placeZoneCircles(lat, lng);
    }

    function setView(lat, lng, zoom) {
      map.setView([lat, lng], zoom || 14);
    }

    function cancelDraw() {
      setMode('none');
    }

    // ── A1: Sun path / shadow overlay ──────────────────────────────────────
    var sunPathLayer = null;  // L.layerGroup

    function drawSunPath(data) {
      clearSunPath();
      sunPathLayer = L.layerGroup().addTo(map);
      var center = map.getCenter();
      var lat = center.lat;
      var lng = center.lng;
      var positions = data.positions || [];  // [{altitude, azimuth, hour}, ...]
      var dateLabel = data.date_label || '';
      var showShadows = data.show_shadows !== false;
      var showShadowLength = data.show_shadow_length || false;
      var sunriseHour = data.sunrise_hour || 6;
      var sunsetHour = data.sunset_hour || 18;

      if (positions.length < 2) return;

      // Draw sun arc as a series of colored dots on the map
      // Map azimuth/altitude to screen positions around the centre
      var arcRadius = 80; // metres from centre for arc display
      var arcPoints = [];
      var keyPositions = []; // morning, noon, evening

      positions.forEach(function(pos, i) {
        if (pos.altitude < 0) return;
        // Place dot on map at azimuth direction from centre
        var azRad = (pos.azimuth) * Math.PI / 180;
        var dist = arcRadius * (1 - pos.altitude / 90 * 0.3); // higher sun = closer to centre
        var dLat = dist * Math.cos(azRad) / 111320;
        var dLng = dist * Math.sin(azRad) / (111320 * Math.cos(lat * Math.PI / 180));
        var ptLat = lat + dLat;
        var ptLng = lng + dLng;
        arcPoints.push([ptLat, ptLng]);

        // Color gradient: sunrise orange → noon yellow → sunset orange
        var frac = positions.indexOf(pos) / (positions.length - 1);
        var r = Math.round(255);
        var g = Math.round(200 + 55 * (1 - Math.abs(frac - 0.5) * 2));
        var b = Math.round(50 * (1 - Math.abs(frac - 0.5) * 2));
        var color = 'rgb(' + r + ',' + g + ',' + b + ')';

        var size = 3 + pos.altitude / 15;
        L.circleMarker([ptLat, ptLng], {
          radius: size,
          color: color,
          fillColor: color,
          fillOpacity: 0.8,
          weight: 1,
          interactive: false
        }).addTo(sunPathLayer);

        // Mark key times
        if (Math.abs(pos.hour - sunriseHour) < 0.5 ||
            Math.abs(pos.hour - 12) < 0.3 ||
            Math.abs(pos.hour - sunsetHour) < 0.5) {
          keyPositions.push(pos);
          var timeStr = Math.floor(pos.hour) + ':' + ('0' + Math.round((pos.hour % 1) * 60)).slice(-2);
          var altStr = pos.altitude.toFixed(0) + '°';
          var labelIcon = L.divIcon({
            className: 'measure-label',
            html: '<span style="font-size:10px">' + timeStr + ' ☀ ' + altStr + '</span>',
            iconSize: [0, 0],
            iconAnchor: [0, 14]
          });
          L.marker([ptLat, ptLng], { icon: labelIcon, interactive: false }).addTo(sunPathLayer);
        }
      });

      // Connect arc points with a smooth line
      if (arcPoints.length >= 2) {
        L.polyline(arcPoints, {
          color: '#ffb300',
          weight: 2.5,
          opacity: 0.7,
          dashArray: '6 3',
          interactive: false
        }).addTo(sunPathLayer);
      }

      // Shadow direction arrows at key times
      if (showShadows) {
        var shadowTimes = [
          { hour: sunriseHour + 1, label: 'Morning' },
          { hour: 12, label: 'Noon' },
          { hour: sunsetHour - 1, label: 'Evening' }
        ];
        shadowTimes.forEach(function(st) {
          var closest = null;
          var minDiff = 999;
          positions.forEach(function(p) {
            var diff = Math.abs(p.hour - st.hour);
            if (diff < minDiff && p.altitude > 0) { minDiff = diff; closest = p; }
          });
          if (!closest) return;

          // Shadow goes opposite to sun
          var shadowAz = (closest.azimuth + 180) % 360;
          var shadowRad = shadowAz * Math.PI / 180;
          var arrowLen = 40; // metres
          if (showShadowLength && closest.altitude > 0) {
            arrowLen = Math.min(80, 20 / Math.tan(closest.altitude * Math.PI / 180));
          }
          var dLat = arrowLen * Math.cos(shadowRad) / 111320;
          var dLng = arrowLen * Math.sin(shadowRad) / (111320 * Math.cos(lat * Math.PI / 180));

          // Draw shadow arrow
          var arrowLine = L.polyline(
            [[lat, lng], [lat + dLat, lng + dLng]],
            { color: '#455a64', weight: 3, opacity: 0.6, interactive: false }
          ).addTo(sunPathLayer);

          // Arrowhead
          var headLen = 8 / 111320;
          var headAngle = Math.PI / 6;
          var endLat = lat + dLat;
          var endLng = lng + dLng;
          var angle = Math.atan2(dLng, dLat);
          L.polyline([
            [endLat - headLen * Math.cos(angle - headAngle),
             endLng - headLen * Math.sin(angle - headAngle)],
            [endLat, endLng],
            [endLat - headLen * Math.cos(angle + headAngle),
             endLng - headLen * Math.sin(angle + headAngle)]
          ], { color: '#455a64', weight: 2.5, opacity: 0.6, interactive: false }).addTo(sunPathLayer);

          // Label
          var labelIcon = L.divIcon({
            className: 'structure-label',
            html: '<span style="font-size:10px">' + st.label + ' shadow</span>',
            iconSize: [0, 0],
            iconAnchor: [0, -4]
          });
          L.marker([lat + dLat, lng + dLng], { icon: labelIcon, interactive: false }).addTo(sunPathLayer);
        });
      }

      // Centre marker
      L.circleMarker([lat, lng], {
        radius: 4, color: '#ff6f00', fillColor: '#ffb300', fillOpacity: 1,
        weight: 2, interactive: false
      }).addTo(sunPathLayer);

      // Title label
      var titleIcon = L.divIcon({
        className: 'measure-label',
        html: '☀ ' + dateLabel,
        iconSize: [0, 0],
        iconAnchor: [0, 24]
      });
      L.marker([lat, lng], { icon: titleIcon, interactive: false }).addTo(sunPathLayer);
    }

    function clearSunPath() {
      if (sunPathLayer) { map.removeLayer(sunPathLayer); sunPathLayer = null; }
    }

    // ── A2: Sector analysis wedges ──────────────────────────────────────────
    var sectorLayer = null;

    function drawSectors(data) {
      clearSectors();
      sectorLayer = L.layerGroup().addTo(map);
      var center = map.getCenter();
      var lat = center.lat;
      var lng = center.lng;
      var sectors = data.sectors || [];
      var radiusM = data.radius_m || 80;

      sectors.forEach(function(sec) {
        var azimuth = sec.azimuth || 0;     // centre of wedge, degrees from N
        var spread  = sec.spread || 45;     // total wedge width in degrees
        var color   = sec.color || '#ff9800';
        var name    = sec.name || 'Sector';

        var startAngle = azimuth - spread / 2;
        var endAngle   = azimuth + spread / 2;

        // Build polygon points for the wedge
        var pts = [[lat, lng]]; // centre
        var steps = Math.max(12, Math.round(spread / 3));
        for (var i = 0; i <= steps; i++) {
          var angle = (startAngle + (endAngle - startAngle) * i / steps) * Math.PI / 180;
          var dLat = radiusM * Math.cos(angle) / 111320;
          var dLng = radiusM * Math.sin(angle) / (111320 * Math.cos(lat * Math.PI / 180));
          pts.push([lat + dLat, lng + dLng]);
        }
        pts.push([lat, lng]); // close back to centre

        var wedge = L.polygon(pts, {
          color: color,
          weight: 1.5,
          fillColor: color,
          fillOpacity: 0.15,
          interactive: false
        }).addTo(sectorLayer);

        // Label at the outer midpoint
        var midAngle = azimuth * Math.PI / 180;
        var labelDist = radiusM * 0.65;
        var labelLat = lat + labelDist * Math.cos(midAngle) / 111320;
        var labelLng = lng + labelDist * Math.sin(midAngle) / (111320 * Math.cos(lat * Math.PI / 180));

        var labelIcon = L.divIcon({
          className: 'structure-label',
          html: '<span style="color:' + color + ';font-size:11px;font-weight:bold">' + name + '</span>',
          iconSize: [0, 0],
          iconAnchor: [0, 8]
        });
        L.marker([labelLat, labelLng], { icon: labelIcon, interactive: false }).addTo(sectorLayer);
      });

      // Centre marker
      L.circleMarker([lat, lng], {
        radius: 5, color: '#fff', fillColor: '#263238', fillOpacity: 0.8,
        weight: 2, interactive: false
      }).addTo(sectorLayer);
    }

    function clearSectors() {
      if (sectorLayer) { map.removeLayer(sectorLayer); sectorLayer = null; }
    }

    // ── A3: Contour lines ───────────────────────────────────────────────────
    var contourLayers = [];  // array of L.layerGroup (one per contour line)

    // Contour drawing state
    var contourPoints  = [];
    var contourPreview = null;
    var currentContour = null;

    function handleContourClick(lat, lng) {
      contourPoints.push([lat, lng]);
      var color = currentContour ? currentContour.color : '#795548';
      L.circleMarker([lat, lng], {
        radius: 3, color: color, fillColor: color, fillOpacity: 1
      }).addTo(drawnItems);
      refreshContourPreview();
    }

    function refreshContourPreview() {
      if (contourPreview) { map.removeLayer(contourPreview); contourPreview = null; }
      if (contourPoints.length >= 2) {
        var color = currentContour ? currentContour.color : '#795548';
        contourPreview = L.polyline(contourPoints, {
          color: color, weight: 2, opacity: 0.6, dashArray: '6 4'
        }).addTo(map);
      }
    }

    function updateContourPreview(latlng) {
      if (contourPreview) { map.removeLayer(contourPreview); }
      var color = currentContour ? currentContour.color : '#795548';
      var pts = contourPoints.concat([[latlng.lat, latlng.lng]]);
      contourPreview = L.polyline(pts, {
        color: color, weight: 2, opacity: 0.5, dashArray: '4 4'
      }).addTo(map);
    }

    function finishContour() {
      if (contourPoints.length < 2) return;
      if (contourPreview) { map.removeLayer(contourPreview); contourPreview = null; }
      drawnItems.clearLayers();

      var cfg = currentContour || {};
      var color = cfg.color || '#795548';
      var elevation = cfg.elevation_m || 0;
      var showLabels = cfg.show_labels !== false;
      var showSlope = cfg.show_slope_arrows || false;

      var group = L.layerGroup().addTo(map);

      // Main contour line (interactive for right-click delete)
      var line = L.polyline(contourPoints, {
        color: color,
        weight: 2.5,
        opacity: 0.7,
        interactive: true
      }).addTo(group);

      // Elevation labels along the line
      if (showLabels && contourPoints.length >= 2) {
        var labelPositions = [0, Math.floor(contourPoints.length / 2), contourPoints.length - 1];
        labelPositions.forEach(function(idx) {
          if (idx >= contourPoints.length) return;
          var pt = contourPoints[idx];
          var labelIcon = L.divIcon({
            className: 'structure-label',
            html: '<span style="font-size:9px;color:' + color + '">' + elevation.toFixed(1) + 'm</span>',
            iconSize: [0, 0],
            iconAnchor: [0, 8]
          });
          L.marker(pt, { icon: labelIcon, interactive: false }).addTo(group);
        });
      }

      // Slope arrows (perpendicular to contour, pointing downhill)
      if (showSlope && contourPoints.length >= 2) {
        var midIdx = Math.floor(contourPoints.length / 2);
        var p1 = contourPoints[Math.max(0, midIdx - 1)];
        var p2 = contourPoints[Math.min(contourPoints.length - 1, midIdx + 1)];
        // Perpendicular direction (right-hand rule → downhill assumed to the right)
        var dx = p2[1] - p1[1];
        var dy = p2[0] - p1[0];
        var perpAngle = Math.atan2(dx, dy) - Math.PI / 2;
        var arrowLen = 15; // metres
        var mid = contourPoints[midIdx];
        var dLat = arrowLen * Math.cos(perpAngle) / 111320;
        var dLng = arrowLen * Math.sin(perpAngle) / (111320 * Math.cos(mid[0] * Math.PI / 180));

        L.polyline(
          [mid, [mid[0] + dLat, mid[1] + dLng]],
          { color: color, weight: 2, opacity: 0.5, dashArray: '4 2', interactive: false }
        ).addTo(group);
        // Small arrowhead
        var endLat = mid[0] + dLat;
        var endLng = mid[1] + dLng;
        var headLen = 5 / 111320;
        var headAngle = Math.PI / 5;
        L.polyline([
          [endLat - headLen * Math.cos(perpAngle - headAngle),
           endLng - headLen * Math.sin(perpAngle - headAngle)],
          [endLat, endLng],
          [endLat - headLen * Math.cos(perpAngle + headAngle),
           endLng - headLen * Math.sin(perpAngle + headAngle)]
        ], { color: color, weight: 2, opacity: 0.5, interactive: false }).addTo(group);

        var arrowLabel = L.divIcon({
          className: 'structure-label',
          html: '<span style="font-size:9px;color:' + color + '">▼ downhill</span>',
          iconSize: [0, 0],
          iconAnchor: [0, -2]
        });
        L.marker([endLat, endLng], { icon: arrowLabel, interactive: false }).addTo(group);
      }

      // Save a copy of points for the removal signal
      var savedPoints = contourPoints.slice();

      // Right-click to delete individual contour
      line.bindTooltip(
        '<b>Contour: ' + elevation.toFixed(1) + 'm</b>' +
        '<br><span style="color:#78909c;font-size:10px">Right-click to remove</span>',
        { className: 'plant-marker-label' }
      );
      line.on('contextmenu', function(e) {
        L.DomEvent.stop(e);
        map.removeLayer(group);
        var idx = contourLayers.indexOf(group);
        if (idx >= 0) contourLayers.splice(idx, 1);
        if (bridge) bridge.onContourRemoved(
          JSON.stringify(savedPoints), elevation, color
        );
      });

      contourLayers.push(group);

      // Notify Python
      if (bridge) bridge.onContourComplete(
        JSON.stringify(contourPoints.slice()),
        elevation, color
      );

      contourPoints = [];
      setMode('none');
    }

    function clearContours() {
      contourLayers.forEach(function(g) { map.removeLayer(g); });
      contourLayers = [];
    }

    // ── A4: Wind overlay ────────────────────────────────────────────────────
    var windLayer = null;

    function drawWindOverlay(data) {
      clearWindOverlay();
      windLayer = L.layerGroup().addTo(map);
      var center = map.getCenter();
      var lat = center.lat;
      var lng = center.lng;
      var dirFrom  = data.direction_from || 315; // degrees (where wind comes FROM)
      var speedLabel = data.speed_label || 'Moderate';
      var showShelter = data.show_shelter !== false;
      var showArrows  = data.show_arrows !== false;

      // Wind blows FROM dirFrom TOWARDS dirFrom+180
      var windToward = (dirFrom + 180) % 360;
      var windRad = windToward * Math.PI / 180;

      // Speed-based visual parameters
      var speedMap = { 'Light': 1, 'Moderate': 2, 'Strong': 3, 'Very Strong': 4 };
      var speedLevel = speedMap[speedLabel] || 2;

      if (showArrows) {
        // Draw a grid of wind flow arrows across the map view
        var bounds = map.getBounds();
        var stepLat = (bounds.getNorth() - bounds.getSouth()) / 6;
        var stepLng = (bounds.getEast() - bounds.getWest()) / 6;
        var arrowLen = stepLat * 111320 * 0.3; // metres

        for (var r = 1; r < 6; r++) {
          for (var c = 1; c < 6; c++) {
            var aLat = bounds.getSouth() + r * stepLat;
            var aLng = bounds.getWest() + c * stepLng;
            var dLat = arrowLen * Math.cos(windRad) / 111320;
            var dLng = arrowLen * Math.sin(windRad) / (111320 * Math.cos(aLat * Math.PI / 180));

            var opacity = 0.15 + speedLevel * 0.08;
            var weight = 1 + speedLevel * 0.5;

            L.polyline(
              [[aLat, aLng], [aLat + dLat, aLng + dLng]],
              { color: '#42a5f5', weight: weight, opacity: opacity, interactive: false }
            ).addTo(windLayer);

            // Arrowhead
            var endLat = aLat + dLat;
            var endLng = aLng + dLng;
            var headLen = arrowLen * 0.25 / 111320;
            var headAngle = Math.PI / 5;
            L.polyline([
              [endLat - headLen * Math.cos(windRad - headAngle),
               endLng - headLen * Math.sin(windRad - headAngle)],
              [endLat, endLng],
              [endLat - headLen * Math.cos(windRad + headAngle),
               endLng - headLen * Math.sin(windRad + headAngle)]
            ], { color: '#42a5f5', weight: weight, opacity: opacity, interactive: false }).addTo(windLayer);
          }
        }
      }

      // Direction indicator at centre
      var indicatorLen = 60;
      var fromRad = dirFrom * Math.PI / 180;
      var fromLat = lat + indicatorLen * Math.cos(fromRad) / 111320;
      var fromLng = lng + indicatorLen * Math.sin(fromRad) / (111320 * Math.cos(lat * Math.PI / 180));

      L.polyline(
        [[fromLat, fromLng], [lat, lng]],
        { color: '#1565c0', weight: 3, opacity: 0.8, interactive: false }
      ).addTo(windLayer);

      var dirLabel = L.divIcon({
        className: 'measure-label',
        html: '<span style="font-size:10px">Wind from ' + dirFrom + '° (' + speedLabel + ')</span>',
        iconSize: [0, 0],
        iconAnchor: [0, 14]
      });
      L.marker([fromLat, fromLng], { icon: dirLabel, interactive: false }).addTo(windLayer);

      // Show shelter zones behind windbreak hedgerows/structures
      if (showShelter) {
        drawWindShelterZones(windRad, speedLevel);
      }
    }

    function drawWindShelterZones(windRad, speedLevel) {
      // Check hedgerows
      Object.keys(hedgerowLayers).forEach(function(hid) {
        var group = hedgerowLayers[hid];
        group.eachLayer(function(layer) {
          if (layer._hedge) {
            var pts = layer._hedge.points;
            if (!pts || pts.length < 2) return;
            // Average height estimate for hedgerow: 2-4m
            var height = (layer._hedge.style === 'windbreak') ? 6 : 3;
            var shelterLen = height * 10; // 10× height
            _drawShelterBehindLine(pts, windRad, shelterLen);
          }
        });
      });

      // Check structures that are windbreaks
      Object.keys(structureMarkers).forEach(function(sid) {
        var group = structureMarkers[sid];
        group.eachLayer(function(layer) {
          if (layer._struct && (layer._struct.name === 'Fence / Wall' || layer._struct.name === 'Tool Shed')) {
            var height = 2.0;
            var lat = layer._struct.lat;
            var lng = layer._struct.lng;
            var shelterLen = height * 10;
            // Simple shelter rectangle behind the structure
            var dLat = shelterLen * Math.cos(windRad) / 111320;
            var dLng = shelterLen * Math.sin(windRad) / (111320 * Math.cos(lat * Math.PI / 180));
            var halfW = (layer._struct.sizeM || 3) / 2;
            var perpRad = windRad + Math.PI / 2;
            var pLat = halfW * Math.cos(perpRad) / 111320;
            var pLng = halfW * Math.sin(perpRad) / (111320 * Math.cos(lat * Math.PI / 180));

            var shelterPoly = L.polygon([
              [lat - pLat, lng - pLng],
              [lat + pLat, lng + pLng],
              [lat + pLat + dLat, lng + pLng + dLng],
              [lat - pLat + dLat, lng - pLng + dLng]
            ], {
              color: '#81d4fa',
              weight: 1,
              fillColor: '#81d4fa',
              fillOpacity: 0.12,
              dashArray: '4 3',
              interactive: false
            }).addTo(windLayer);
          }
        });
      });
    }

    function _drawShelterBehindLine(pts, windRad, shelterLen) {
      // Create a shelter polygon behind the hedgerow line
      if (pts.length < 2) return;
      var shelterPts = [];
      // Forward side (the hedgerow itself)
      pts.forEach(function(p) { shelterPts.push(p); });
      // Back side (offset in wind direction)
      for (var i = pts.length - 1; i >= 0; i--) {
        var p = pts[i];
        var dLat = shelterLen * Math.cos(windRad) / 111320;
        var dLng = shelterLen * Math.sin(windRad) / (111320 * Math.cos(p[0] * Math.PI / 180));
        shelterPts.push([p[0] + dLat, p[1] + dLng]);
      }

      L.polygon(shelterPts, {
        color: '#81d4fa',
        weight: 1,
        fillColor: '#b3e5fc',
        fillOpacity: 0.10,
        dashArray: '4 3',
        interactive: false
      }).addTo(windLayer);

      // Label
      var mid = pts[Math.floor(pts.length / 2)];
      var dLat = shelterLen * 0.5 * Math.cos(windRad) / 111320;
      var dLng = shelterLen * 0.5 * Math.sin(windRad) / (111320 * Math.cos(mid[0] * Math.PI / 180));
      var labelIcon = L.divIcon({
        className: 'structure-label',
        html: '<span style="font-size:9px;color:#81d4fa">Shelter zone (' + shelterLen.toFixed(0) + 'm)</span>',
        iconSize: [0, 0],
        iconAnchor: [0, 8]
      });
      L.marker([mid[0] + dLat, mid[1] + dLng], { icon: labelIcon, interactive: false }).addTo(windLayer);
    }

    function clearWindOverlay() {
      if (windLayer) { map.removeLayer(windLayer); windLayer = null; }
    }

    // ── Legend toggle ──────────────────────────────────────────────────────
    function toggleLegend() {
      var legend = document.getElementById('map-legend');
      var btn    = document.getElementById('legend-toggle');
      var show   = !legend.classList.contains('visible');
      legend.classList.toggle('visible', show);
      btn.classList.toggle('active', show);
    }

    function setLegendVisible(visible) {
      var legend = document.getElementById('map-legend');
      var btn    = document.getElementById('legend-toggle');
      legend.classList.toggle('visible', visible);
      btn.classList.toggle('active', visible);
    }

    // ── QWebChannel bootstrap ─────────────────────────────────────────────────
    function initChannel() {
      if (typeof QWebChannel === 'undefined') {
        // Running outside Qt (browser dev) — skip channel
        initMap();
        return;
      }
      new QWebChannel(qt.webChannelTransport, function(channel) {
        bridge = channel.objects.bridge;
        initMap();
        if (bridge && bridge.onMapReady) bridge.onMapReady();
      });
    }

    window.addEventListener('load', initChannel);
  </script>
</body>
